      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft)">
        <h3>Strava連携 <span class="hint" style="font-weight:400">· Worker経由・手動選択インポート</span></h3>
        <div class="hint" style="margin-bottom:10px">Strava tokenはWorker側KVで扱います。選択した活動だけを既存save()経由で保存し、<span class="mono">meridian.v1</span> へ直接書き込みません。</div>
        <div class="field"><label>Strava Worker URL（別localStorageキーに保存）</label><input id="stravaWorkerUrl" value="${escapeHTML(getStravaWorkerUrl())}" autocomplete="off" inputmode="url"></div>
        <div class="row-actions" style="margin-top:10px">
          <button class="btn ghost" id="stravaWorkerSave">URL保存</button>
          <button class="btn" id="stravaAuthStart">接続開始</button>
          <button class="btn ghost" id="stravaCheckAthlete">接続確認</button>
          <button class="btn ghost" id="stravaFetchActivities">活動取得</button>
        </div>
        <div id="stravaWorkerStatus" class="hint" style="margin-top:10px">未確認。接続開始後、Strava認可を完了してから接続確認してください。</div>
        <div id="stravaAthleteBox" style="margin-top:12px"></div>
        <div id="stravaActivitiesBox" style="margin-top:12px"></div>
        <div class="hint" style="margin-top:10px">自動同期ではありません。活動取得後にチェックしたランニング活動だけを取り込みます。</div>
      </div>
    </div>
    <div class="card gb" data-gb="reconcile" style="margin-top:16px">
      <h3>レース結果・自己ベスト <span class="hint" style="font-weight:400">· 走力の最優先アンカー</span></h3>
      <div class="hint" style="margin-bottom:12px">実際のレースやタイムトライアルの結果を入れると、それを走力の最も確かな基準として採用します。1本入れるだけで、ペース・ゾーン・レース予測すべてが実測に沿って正確になります。</div>
      ${(()=>{ const rs=(DB.races||[]).slice().sort((a,b)=>(b.date||'')<(a.date||'')?-1:1);
        if(!rs.length) return '';
        return `<div class="shoe-list" style="margin-bottom:12px">${rs.map(r=>`<div class="shoe-row">
          <div class="shoe-main"><div class="shoe-name">${round(r.m/1000,r.m%1000?1:0)}km <span class="mono" style="color:var(--gold)">${hms(r.sec)}</span></div>
            <div class="shoe-brand">${r.date?fmtDate(r.date):''} · ${paceStr(r.sec/(r.m/1000))}/km · 推定VO2 ${round(vo2FromEffort(r.m,r.sec),1)}</div></div>
          <div class="shoe-meta"><button class="shoe-x" data-delrace="${r.id}">削除</button></div></div>`).join('')}</div>`; })()}
      <div class="formgrid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="field"><label>距離</label><select id="race-dist">
          <option value="3000">3km</option><option value="5000" selected>5km</option>
          <option value="10000">10km</option><option value="21097.5">ハーフ</option>
          <option value="42195">フル</option></select></div>
        <div class="field"><label>タイム (h:mm:ss)</label><input id="race-time" placeholder="21:30 / 1:35:00"></div>
        <div class="field"><label>日付</label><input type="date" id="race-date" value="${todayISO()}"></div>
      </div>
      <button class="btn" id="raceAddBtn" style="width:100%;margin-top:4px">結果を追加</button>
    </div>
    <div class="card gb" data-gb="reconcile" style="margin-top:16px">
      <h3>フィールドテスト · 20分走 <span class="hint" style="font-weight:400">· レース無しで走力を実測</span></h3>
      <div class="hint" style="margin-bottom:10px">十分なアップの後、<strong>20分間を「ギリギリ保てる一定ペース」</strong>で走り、距離を入力。結果は最優先の走力アンカーとして採用され、閾値・全ペース・予測が実測基準になります（レースが遠い時期の定点観測に最適。4〜6週ごと推奨）。</div>
      <div class="formgrid" style="grid-template-columns:2fr 1fr">
        <div class="field"><label>20分で走れた距離 (km)</label><input type="number" step="0.01" id="ft-dist" placeholder="例 4.85"></div>
        <div class="field"><label>&nbsp;</label><button class="btn" id="ftAddBtn" style="width:100%">記録する</button></div>
      </div>
      ${(()=>{ const tp=vdotPaces(); return tp?`<div class="hint" style="margin-top:6px">目安: 現在の推定なら20分で約 ${round(1200/tp.T.mid,2)}km（T ${paceStr(tp.T.mid)}/km）。これを上回れば走力更新です。</div>`:''; })()}
    </div>`;
  el('saveProfile').onclick=()=>{ const t=el('p-thr').value.split(':').map(Number);
    const gi=id=>{ const v=parseInt(el(id).value); return isNaN(v)?null:v; };
    const gf=id=>{ const v=parseFloat(el(id).value); return isNaN(v)?null:v; };
    DB.profile={ ...DB.profile, name:el('p-name').value, sex:el('p-sex').value,
      age:gi('p-age')||DB.profile.age, heightCm:gf('p-height')||DB.profile.heightCm,
      weightKg:parseFloat(el('p-weight').value)||62, hrMax:parseInt(el('p-hrmax').value)||189,
      hrRest:parseInt(el('p-hrrest').value)||44, ltHr:gi('p-lthr'),
      experience:el('p-exp').value, vo2maxLab:gf('p-vo2lab'), injuryProne:el('p-injury').checked,
      thresholdPaceSec: t.length===2? t[0]*60+t[1] : 255 };
    notifySaveResult(save(),'プロフィールを保存しました'); renderToday(); };
  el('exportBtn').onclick=()=>exportRunosBackup();
  el('csvBtn').onclick=()=>{
    const head='date,type,km,durSec,pace_sec_per_km,hrAvg,hrMax,avgPwr,cadence,elevM,decoupling,TRIMP\n';
    const lines=DB.activities.map(a=>[a.date,a.type,round(a.km,2),Math.round(a.durSec),Math.round(a.durSec/a.km),
      a.hrAvg||'',a.hrMax||'',a.avgPwr||'',a.cadence||'',a.elevM||'',a.decoupling!=null?round(a.decoupling,1):'',round(trimp(a),0)].join(',')).join('\n');
    const blob=new Blob([head+lines],{type:'text/csv'});
    const u=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=u; a.download='runos-v77-meridian-activities.csv'; a.click(); URL.revokeObjectURL(u); };
  el('importBtn').onclick=()=>el('importFile').click();
  el('importFile').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ DB=JSON.parse(r.result); const saved=save(); route(); notifySaveResult(saved,'取り込みました'); }catch(err){ alert('読み込めませんでした'); } }; r.readAsText(f); };
  { const sb=el('seedBtn2'); if(sb) sb.onclick=()=>{ if(confirm('デモデータを再生成します。現在のデータは上書きされます。')){ const saved=seedDemo(); route(); notifySaveResult(saved,'デモデータを再生成しました'); } };
    const wb=el('wipeBtn2'); if(wb) wb.onclick=()=>{ if(confirm('全データを消去します。よろしいですか？')){ DB={profile:{...DEFAULT_PROFILE},activities:[],wellness:[],plan:null,planOverrides:{},adjustLog:[],shoes:[],env:{temp:20,humidity:50,altitude:0},races:[]}; const saved=save(); route(); notifySaveResult(saved,'消去しました'); } }; }
  { const ab=el('shoeAddBtn'); if(ab) ab.onclick=()=>{ const v=el('shoeAdd').value; if(v==='')return; const res=addShoeFromCatalog(parseInt(v)); notifySaveResult(!!(res&&res.saved),'シューズを追加しました'); renderSettings(); };
    document.querySelectorAll('[data-retire]').forEach(b=>b.onclick=()=>{ const s=(DB.shoes||[]).find(x=>x.id===b.dataset.retire); if(s){ s.active=s.active===false; save(); renderSettings(); } }); }
  { const es=el('envSave'); if(es) es.onclick=()=>{ const gi=id=>{const v=parseFloat(el(id).value);return isNaN(v)?null:v;};
    DB.env={temp:gi('env-temp')??20, humidity:gi('env-hum')??50, altitude:gi('env-alt')??0}; notifySaveResult(save(),'環境補正を適用しました'); renderSettings(); renderCoach&&0; }; }
  { const g=el('envGeo'); if(g) g.onclick=async()=>{ try{ await saveGeo(); flash('現在地を保存しました'); renderSettings(); }catch(e){ flash(e.message); } };
    const w=el('envWx'); if(w) w.onclick=async()=>{ try{ if(DB.env.lat==null) await saveGeo(); await fetchWeatherNow(); flash(`天気: ${round(DB.env.temp,0)}℃ / ${DB.env.humidity}%`); renderSettings(); }catch(e){ flash(e.message||'取得できませんでした'); } };
    const sb=el('stravaCsvBtn'); if(sb) sb.onclick=()=>el('stravaCsvFile').click();
    const sf=el('stravaCsvFile'); if(sf) sf.onchange=e=>{ const f=e.target.files[0]; if(!f)return;
      const r=new FileReader(); r.onload=()=>{ const res=importStravaCSV(r.result);
        if(res.error) flash(res.error); else { notifySaveResult(res.saved,`Strava: ${res.added}件取込 (${res.skipped}件スキップ)`); route(); } };
      r.readAsText(f); };
    wireStravaWorkerUI(); }
  { const rb=el('raceAddBtn'); if(rb) rb.onclick=()=>{
      const parts=el('race-time').value.trim().split(':').map(Number);
      if(parts.some(isNaN)||!parts.length){ alert('タイムを h:mm:ss か mm:ss で入力してください'); return; }
      let sec=0; parts.forEach(x=>sec=sec*60+x);
      if(sec<=0){ alert('タイムが不正です'); return; }
      const m=parseFloat(el('race-dist').value);
      DB.races=DB.races||[]; DB.races.push({id:'race_'+Date.now().toString(36), m, sec, date:el('race-date').value||todayISO()});
      notifySaveResult(save(),'レース結果を追加しました'); renderSettings(); };
    document.querySelectorAll('[data-delrace]').forEach(b=>b.onclick=()=>{ DB.races=(DB.races||[]).filter(r=>r.id!==b.dataset.delrace); save(); renderSettings(); });
    const ft=el('ftAddBtn'); if(ft) ft.onclick=()=>{
      const km=parseFloat(el('ft-dist').value);
      if(isNaN(km)||km<2||km>8){ alert('20分の距離を 2〜8km で入力してください'); return; }
      DB.races=DB.races||[]; DB.races.push({id:'ft_'+Date.now().toString(36), m:Math.round(km*1000), sec:1200, date:todayISO(), ft:true});
      notifySaveResult(save(),'フィールドテストを走力アンカーとして採用しました'); renderSettings(); }; }
  wireGB();
}

/* ============================================================
   GLASS-BOX drawer — every metric explains itself
   ============================================================ */
const GB={
  readiness:()=>{ const r=readiness();
    return {label:'GLASS-BOX', title:'Readiness score',
      lede:'今日のトレーニング可否を1つの数字に統合します。各下位スコアと重みは完全公開—ブラックボックスにしません。',
      means:'「今日どれくらい攻めていいか」の総合信号です。高ければ質の練習、低ければ回復優先。体調・疲労・負荷の3側面をまとめた一目の指標。',
      formula:`readiness = form×${r.weights.form} ${r.weights.rec?`+ recovery×${r.weights.rec} `:''}+ loadRisk×${r.weights.load}`,
      inputs:[['Form score', Math.round(r.fs)],['Recovery score', r.recScore!=null?Math.round(r.recScore):'—(データ待ち)'],['Load-risk score', Math.round(r.loadScore)],['合成スコア', r.score]],
      drivers:[['Form', r.fs, r.weights.form],['Recovery', r.recScore||0, r.weights.rec],['Load-risk', r.loadScore, r.weights.load]]
        .filter(d=>d[2]>0).map(d=>[d[0], d[1], d[1]*d[2]/ (r.weights.form+r.weights.rec+r.weights.load)]) }; },
  form:()=>{ const r=readiness();
    return {label:'SUB-SCORE', title:'Form (TSB由来)',
      lede:'TSB(Training Stress Balance)からフォームの鮮度を評価。+2〜+15を最良域とし、疲労側でも過度の休養側でも下がります。',
      formula:`TSB = CTL(昨日) − ATL(昨日) = ${round(r.tsb,1)}\nformScore = f(TSB) → sweet spot +2..+15`,
      inputs:[['現在のTSB', round(r.tsb,1)],['Form score', Math.round(r.fs)]] }; },
  recovery:()=>{ const r=readiness(); if(!r.recBits) return {label:'SUB-SCORE',title:'Recovery',lede:'HRV・安静時心拍・睡眠のデータが蓄積されると有効になります。',formula:'recovery = 72 + hrvZ×11 + rhrZ×7 + sleepZ×8'};
    const b=r.recBits;
    return {label:'SUB-SCORE', title:'Recovery',
      lede:'HRV・安静時心拍・睡眠を各自のベースラインと比較したZスコアで合成。生理的な回復状態を表します。',
      formula:'recovery = 72 + hrvZ×11 + rhrZ×7 + sleepZ×8',
      inputs:[['HRV(今朝 / 基準)', `${b.w.hrv} / ${round(b.base.hrv,0)}`],['安静時心拍(今朝 / 基準)', `${b.w.rhr} / ${round(b.base.rhr,0)}`],['睡眠(今朝 / 基準)', `${b.w.sleep} / ${round(b.base.sleep,1)}h`],['Recovery score', Math.round(r.recScore)]],
      drivers:[['HRV', (b.hrvZ+2)/4*100, 0.45],['安静時心拍', (b.rhrZ+2)/4*100, 0.3],['睡眠', (b.sleepZ+2)/4*100, 0.25]].map(d=>[d[0],d[1],d[1]*d[2]]) }; },
  acwr:()=>{ const ratio=acwr();
    return {label:'SUB-SCORE', title:'Load-risk (ACWR)',
      lede:'急性負荷(7日)と慢性負荷(28日)の比。急に増やしすぎると故障リスクが上がります。0.8–1.3が最適域。',
      formula:`ACWR = mean(load, 7d) / mean(load, 28d) = ${ratio.toFixed(2)}`,
      inputs:[['ACWR', ratio.toFixed(2)],['最適域', '0.80 – 1.30'],['判定', ratio<0.8?'負荷不足':ratio<=1.3?'最適':ratio<=1.5?'やや過負荷':'過負荷']] }; },
  ctl:()=>{ const c=currentPMC();
    return {label:'FITNESS', title:'CTL — Chronic Training Load',
      lede:'長期(42日)の指数加重平均で「積み上げた体力」を表します。TrainingPeaksのFitnessと同じ概念。',
      means:'あなたが積み上げてきた「体力の貯金」。急に上げると故障、下げすぎると走力が落ちる。緩やかな右肩上がりが理想です。',
      formula:'CTL_today = CTL_yesterday + (load_today − CTL_yesterday) / 42',
      inputs:[['現在CTL', round(c.ctl,1)],['時定数', '42日'],['週間ランプ', `${ctlRamp()>=0?'+':''}${round(ctlRamp(),1)}/週`]] }; },
  tsb:()=>{ const c=currentPMC();
    return {label:'FORM', title:'TSB — Training Stress Balance',
      lede:'CTL−ATL。プラスは疲労が抜けてキレる状態、マイナスは負荷を積んで疲労している状態。',
      means:'今日の「キレ具合」。プラスなら疲れが抜けて動ける、大きなマイナスなら疲労で重い。レース当日は+の状態に持っていきます。',
      formula:`TSB = CTL_yesterday − ATL_yesterday = ${round(c.ctl,1)} − ${round(c.atl,1)} = ${round(c.tsb,1)}`,
      inputs:[['CTL', round(c.ctl,1)],['ATL', round(c.atl,1)],['TSB', round(c.tsb,1)]] }; },
  evo2:()=>{ const e=effectiveVO2max();
    return {label:'PERFORMANCE', title:'Effective VO2max',
      lede:'ラボ値ではなく、各ランの心拍とペースの関係から推定した「実効」VO2max。走効率も織り込まれ、レース予測の土台になります。',
      means:'あなたの「エンジンの大きさ」。同じ心拍でどれだけ速く走れるか。上がれば全距離のタイムが底上げされます。',
      formula:'VO2(v) = −4.60 + 0.182258·v + 0.000104·v²\neVO2max_run = VO2(v) / %HRR\n現在値 = 直近6週の 質×新しさ 加重平均',
      inputs:[['現在eVO2max', round(e.value,1)],['採用サンプル', `${e.samples}本`],['最大寄与ラン', e.contribs[0]?fmtDate(e.contribs[0].date):'—']],
      drivers:e.contribs.slice(0,5).map(c=>[fmtDate(c.date), c.w*100, c.w]) }; },
  pmc:()=>({label:'CHART', title:'Performance Management Chart',
    lede:'CTL(体力)・ATL(疲労)・TSB(調子)の時系列。棒は日々のTRIMP負荷。これがトレーニング周期の設計図です。',
    formula:'CTL:42d EWMA · ATL:7d EWMA · TSB=CTL−ATL',
    inputs:[['CTL', round(currentPMC().ctl,1)],['ATL', round(currentPMC().atl,1)],['TSB', round(currentPMC().tsb,1)]]}),
  mshape:()=>{ const ms=marathonShape(effectiveVO2max().value);
    return {label:'SIGNATURE', title:'Marathon Shape',
      lede:'VO2maxが同じでも走り込み量が足りなければフルは失速します。この持久特異性を数値化し、長距離予測だけを補正するのが本アプリ独自の要です(Runalyzeの発想を自前係数で再構成)。',
      formula:'reqWeekly = 1.889·VO2 − 8.2\nreqLong = 0.267·VO2 + 15.3\nshape% = 100·(⅔·週間/必要 + ⅓·ロング/必要)',
      inputs:[['Shape', `${round(ms.shape,0)}%`],['週間距離 / 必要', `${round(ms.weeklyKm,0)} / ${round(ms.reqWeekly,0)} km`],['ロング / 必要', `${round(ms.longRun,0)} / ${round(ms.reqLong,0)} km`]] }; },
  injury:()=>{ const {monotony,strain}=monotonyStrain(); const ratio=acwr();
    return {label:'RISK', title:'Injury signals',
      lede:'3つの独立した過負荷シグナルを監視します。単一指標より頑健に「やりすぎ」を捉えます。',
      formula:'ACWR = 急性7d/慢性28d\nMonotony = 週平均/週SD\nStrain = 週総負荷 × Monotony',
      inputs:[['ACWR', ratio.toFixed(2)],['Monotony', monotony.toFixed(2)],['Strain', round(strain,0)]] }; },
  pacecurve:()=>({label:'CHART', title:'Pace Curve',
    lede:'各持続時間で実際に出せた最速ペース。強み(短距離型/持久型)と伸びしろが一目でわかります。',
    formula:'各時間窓 w で max( movingAvg(speed, w) ) を全ストリームから抽出 → ペース換算'}),
  powercurve:()=>({label:'CHART', title:'Power Curve',
    lede:'各持続時間で出せた最大平均ランニングパワー。短時間の爆発力と長時間の維持力を同じ図で捉えます。eFTP的な閾値推定の土台にもなります。',
    formula:'各時間窓 w で max( movingAvg(power, w) ) を全ストリームから抽出'}),
  decoupling:()=>{ const dc=DB.activities.filter(a=>a.decoupling!=null).sort((a,b)=>a.date<b.date?1:-1); const l=dc[0];
    return {label:'DURABILITY', title:'Aerobic Decoupling (Pa:Hr)',
      lede:'ラン後半で「心拍あたりのGAP速度」がどれだけ落ちたか。低いほど疲労に強く、長距離の準備ができています。ベース構築やロング走で下がっていきます。',
      formula:'eff = GAP速度 / 心拍\\ndecoupling% = (前半平均eff − 後半平均eff) / 前半平均eff × 100',
      inputs:[['最新ラン', l?fmtDate(l.date):'—'],['最新値', l&&l.decoupling!=null?round(l.decoupling,1)+'%':'—'],['理想', '< 5%'],['対象データ', dc.length+'本']]}; },
  ef:()=>({label:'DURABILITY', title:'Aerobic Efficiency',
    lede:'効率係数 EF = 速度(m/min) / 平均心拍。同じ心拍でより速い=有酸素能力の発達。トレンドが右肩上がりなら順調です。',
    formula:'EF = (m/min) / HRavg  （イージー・ロング走のみ）'}),
  cp:()=>{ const cp=criticalPower(), cs=criticalSpeed(); const p=DB.profile;
    return {label:'MODEL', title:'Critical Power / Speed',
      lede:'平均最大曲線に2パラメータ双曲線モデル P = CP + W′/t を回帰。CPは疲労せず維持できる出力(≒閾値)、W′はそれを超えて使える有限の「貯金」。無酸素・有酸素の両輪を1つのモデルで定量化します。',
      formula:'P(t) = CP + W′/t  （1/t で線形回帰）\\nCS版: D = CS·t + D′',
      inputs:[ cp?['CP', `${round(cp.cp,0)} W (${round(cp.cp/p.weightKg,2)} W/kg)`]:['CP','—'],
        cp?['W′', `${round(cp.wprime/1000,1)} kJ`]:['W′','—'],
        cs?['CS', `${paceStr(1000/cs.cs)}/km`]:['CS','—'],
        cs?['D′', `${round(cs.dprime,0)} m`]:['D′','—'],
        cp?['適合 R²', round(cp.r2,3)]:(cs?['適合 R²', round(cs.r2,3)]:['R²','—']) ]}; },
  polar:()=>{ const d=intensityDistribution(42);
    return {label:'DISTRIBUTION', title:'Intensity Distribution & Polarization',
      lede:'全ストリームの心拍を1秒単位で3強度帯(楽・閾値・高強度)に振り分け、Seilerの二極化理論で配分を評価。中強度に偏る「グレーゾーン」を可視化し、80/20の理想配分へ導きます。',
      formula:'各サンプルを %HRR で LOW(<60–80%)·MID(閾値)·HIGH(>90%) に分類\\nPolarization Index = log10( low% · high% / mid%² )',
      inputs: d?[['LOW', `${round(d.low*100,0)}%`],['THRESHOLD', `${round(d.mid*100,0)}%`],['HIGH', `${round(d.high*100,0)}%`],['PI', d.PI!=null?round(d.PI,2):'—'],['解析時間', `${round(d.hours,1)} h · ${d.activities}本`]]:[['データ','不足']] }; },
  intervals:()=>({label:'EXECUTION', title:'Interval Execution',
    lede:'ストリームからパワー(なければペース)の疾走区間を自動抽出し、本数・各本の強度・そして「揃い具合」を採点。CV(変動係数)が小さく後半の落ちが少ないほど高得点です。',
    formula:'work = 平滑値 ≥ p50 + 0.45·(p85−p50)\\nCV = SD/平均 ×100\\nスコア = 100 − 4·CV − 2·max(0, 後半フェード%)'}),
  status:()=>{ const st=trainingStatus();
    return {label:'STATUS', title:'Training Status',
      lede:st.desc,
      formula:'CTL傾き(14日) と TSB・ACWR・Monotony の組み合わせで7状態に分類\n生産的: 傾き>+3 かつ TSB>−25 / ピーキング: 傾き±3内 かつ TSB≥15 / など',
      inputs:[['判定', st.label],['CTL変化(14日)', (st.slope>=0?'+':'')+round(st.slope,1)],['TSB', round(st.tsb,1)],['ACWR', st.ratio!=null?st.ratio.toFixed(2):'—']]}; },
  te:()=>{ const rec=recoveryState(); if(!rec) return {label:'LOAD',title:'Training Effect',lede:'記録がありません。',formula:''};
    return {label:'LOAD', title:'Training Effect & 回復時間',
      lede:'そのランが現在の体力(CTL)に対してどれだけの刺激だったかを0.5〜5.0で表し、必要回復時間に変換します。同じ練習でも体力が高いほどTEは小さくなる=相対評価です。',
      formula:'TE = 5·(1 − e^(−TRIMP/(CTL+40)))\n回復時間 = TE^1.6 × 6h (4〜72hに制限)',
      inputs:[['最新ラン', fmtDate(rec.last.date)],['TE', `${round(rec.te,1)} (${teLabel(rec.te)})`],['推奨回復', rec.rh+'h'],['経過', Math.floor(rec.since)+'h'],['残り', rec.remaining>0?Math.ceil(rec.remaining)+'h':'完了']]}; },
  reco:()=>{ const r=recommendWorkout();
    return {label:'COACH', title:'今日の推奨ワークアウト',
      lede:'ブラックボックスAIではなく、明示的なルールで決定しています: ①回復時間が残っていれば回復 ②Readiness<42なら休養 ③週末×ロング未実施ならロング ④Readiness≥72×質セッション枠が残っていればキー練習 ⑤それ以外はイージー。ペースは全てあなたのeVO2max由来。',
      formula:'優先順位付きルールエンジン (回復 > 安全 > 計画 > 積み上げ)',
      inputs:[['判定', r.title],...r.reasons.map((x,i)=>[`根拠${i+1}`, x])]}; },
  pr:()=>({label:'RECORDS', title:'Personal Records',
    lede:'各ランのストリームに対し「その距離を最速でカバーした区間」を全走行から抽出した実測ベストエフォート。レース以外の練習中の記録も漏れなく拾います(Stravaのベストエフォートと同方式)。',
    formula:'各距離Dについて two-pointer で min( t[j]−t[i] | d[j]−d[i] ≥ D ) を全ストリームから探索'}),
  plan:()=>{ const p=DB.plan; if(!p) return {label:'PLAN',title:'練習計画',lede:'目標レースを設定すると生成されます。',formula:''};
    return {label:'PLAN', title:'自動練習計画',
      lede:'現在の週間距離から目標レースに向けて漸進。4週ごとに吸収週(-22%)、レース前はテーパー。キーワークアウトのペースはeVO2max由来で、走力が変われば「再生成」で更新できます。',
      formula:'peak = min(距離別上限, max(現在×1.35, 現在+12km))\nramp: 現在→peak を線形×1.15 / 吸収週 ×0.78 / テーパー ×0.62→0.45',
      inputs:[['レース', `${p.race.label} · ${p.race.date}`],['週数', p.weeks.length],['ピーク週', Math.max(...p.weeks.map(w=>w.target))+' km']]}; },
  paces:()=>{ const tp=vdotPaces();
    return {label:'ZONES', title:'トレーニングペース (Daniels)',
      lede:'eVO2maxからvVO2max(最大酸素摂取速度)を逆算し、Daniels係数で各強度のペースを導出。E=62-74%、M=82%、T=87%、I=97.5%、R=107%。',
      formula:'vVO2max: 0.000104v² + 0.182258v − 4.60 = eVO2max を解く\nペース = 60000 / (vVO2max × 係数) 秒/km',
      inputs: tp?[['eVO2max', round(tp.vo2,1)],['E', paceStr(tp.E.hi)+'–'+paceStr(tp.E.lo)],['T', paceStr(tp.T.mid)],['I', paceStr(tp.I.mid)]]:[['データ','不足']]}; },
  limiter:()=>{ const l=limiterDiagnosis(); if(!l) return {label:'DIAGNOSIS',title:'律速診断',lede:'データが不足しています。',formula:''};
    return {label:'DIAGNOSIS', title:'Performance Limiter · 律速診断',
      lede:'目標距離ごとに重要度の異なる4つの能力(有酸素上限・乳酸閾値・持久基盤・スピード)を0〜1で採点し、「重要度×伸びしろ」が最大の系統を今のボトルネックと判定します。強みを伸ばすより弱点を埋める方がレースタイムへの効果が大きい、という原則に基づきます。',
      formula:'各系のgap = 重み(距離別) × (1 − スコア)\n律速 = gap最大の系',
      inputs:[['対象距離', RACE_DEFS[l.dist]?RACE_DEFS[l.dist].label:l.dist],['律速', l.limiter.label],['最大の強み', l.strength.label],...l.systems.map(s=>[s.label, Math.round(s.score*100)+'/100'])]}; },
  threshold:()=>{ const th=thresholdDetect(); if(!th) return {label:'THRESHOLD',title:'臨界速度',lede:'全力持続走のデータが不足しています。',formula:''};
    return {label:'THRESHOLD', title:'Threshold Detection · 臨界速度',
      lede:'複数の全力持続走(2〜20分)の最速区間を全ランから集め、距離-時間の直線回帰にかけます。傾きが臨界速度(CS=維持可能な最高速度の近似)、切片がD′(無酸素的な有限容量)。ラボの乳酸測定なしに閾値を実測できます。',
      formula:"距離 = CS × 時間 + D′ (最小二乗回帰)\nT ペース = 1000 / CS 秒/km",
      inputs:[['臨界速度', th.csKmh.toFixed(2)+' km/h'],['閾値ペース', paceStr(th.tPaceSec)+'/km'],['D′', th.dPrime!=null?round(th.dPrime,0)+' m':'—'],['推定LT心拍', th.ltHr?th.ltHr+' bpm':'—'],['信頼度', `${th.conf} (${th.samples}点)`]]}; },
  loadfocus:()=>{ const f=trainingLoadFocus(); if(!f) return {label:'FOCUS',title:'負荷フォーカス',lede:'データ不足。',formula:''};
    return {label:'FOCUS', title:'Training Load Focus',
      lede:'直近28日のTRIMPを、各ランの心拍ゾーン滞在(ストリームがあれば実測)で低強度・高強度・無酸素に按分。負荷の「量」でなく「質のバランス」を可視化します。Garminのロードフォーカスに相当。',
      formula:'各ランのTRIMPをゾーン時間割合で3系統に配分し28日合計',
      inputs:[['低強度', Math.round(f.pLow*100)+'%'],['高強度', Math.round(f.pHigh*100)+'%'],['無酸素', Math.round(f.pAna*100)+'%'],['総負荷', round(f.tot,0)+' TRIMP']]}; },
  durability:()=>{ const d=durabilityScore(); if(!d) return {label:'DURABILITY',title:'距離耐性',lede:'8km以上のラン記録が不足しています。',formula:''};
    return {label:'DURABILITY', title:'距離耐性スコア',
      lede:'8km以上のランで、後半に「速度÷心拍」効率がどれだけ落ちたか(デカップリング)の平均から算出。落ちが小さいほど、その距離に対する有酸素的準備ができています。ロング走を積むと改善します。',
      formula:'スコア = 100 − (平均デカップリング% / 12) × 100',
      inputs:[['スコア', round(d.score,0)],['平均デカップリング', round(d.avgDec,1)+'%'],['最長距離', round(d.longest,0)+' km'],['対象', d.samples+'本']]}; },
  form_dyn:()=>{ const f=formDynamics(); if(!f) return {label:'FORM',title:'フォーム',lede:'ケイデンスデータが不足しています。',formula:''};
    return {label:'FORM', title:'フォーム・ダイナミクス',
      lede:'速度 = ケイデンス(歩/分) × ストライド長。ケイデンスから接地・上下動の傾向を推定します。過度に低いケイデンス(オーバーストライド)は接地衝撃と傷害に関連。',
      formula:'ストライド長 = 速度(m/分) / ケイデンス(spm)',
      inputs:[['平均ケイデンス', round(f.meanCad,0)+' spm'],['平均ストライド', f.meanStride.toFixed(2)+' m'],['対象', f.samples+'本']]}; },
  economy:()=>{ const e=runningEconomy(); if(!e) return {label:'ECONOMY',title:'経済性',lede:'パワーデータが不足しています。',formula:''};
    return {label:'ECONOMY', title:'ランニング経済性',
      lede:'あるペースを保つのに要するパワー(W/kg)を速度で割った指標。同じVO2maxでも経済性が高い(値が低い)ほど速く走れます。プライオメトリクスやヒルスプリント、走り込みで改善。',
      formula:'効率指数 = (平均パワー / 体重) / 速度(m/s)',
      inputs:[['効率指数', e.eco.toFixed(3)],['対象', e.samples+'本'],['体重', (DB.profile.weightKg||62)+' kg']]}; },
  weekahead:()=>{ const wa=weekAheadPlan();
    return {label:'HYBRID', title:'Week Ahead · 自動処方スケジュール',
      lede:'今日1日だけの処方を7日先まで延長した自動スケジューラです。週の残り目標距離を、回復ウィンドウ・質練習の48時間間隔・週末ロング・鮮度(TSB)予測・本日の安全ゲートという制約に従って各日へ配分します。各日は「実行するとTSBがどこへ動くか」をEWMAで前進計算して表示。ブラックボックスの提案ではなく、すべてルールで説明できます。',
      formula:'各日: 制約充足 → 種別決定 → 距離配分\nCTL,ATL を日次TRIMPでEWMA前進 (τ=42,7)\nTSB = CTL − ATL',
      inputs:[['週目標', wa.target+' km'],['配分合計', round(wa.totalKm,0)+' km'],['質セッション', wa.qCount+' / '+wa.qCap],['休養日', wa.restCount+'日'],['週末TSB予測', (wa.endTsb>=0?'+':'')+round(wa.endTsb,0)],['局面', wa.phase||'—']]}; },
  loadrisk:()=>{ const r=loadRiskV77();
    return {label:'SAFETY GATE', title:'Load & Risk Gate · 成分別リスク',
      lede:'故障は「総負荷」より「特定組織への急な負荷変化」で起きます。そこで負荷を脚(機械的)・心肺・神経筋の3成分に分け、それぞれ独立に急性:慢性比(ACWR)を監視。さらに主観の張り・回復残り・Readinessを加点し、GO/短縮/保護/停止の4段ゲートを出します。',
      formula:'成分ACWR = 直近7日平均 / 直近28日平均\nrisk = Σ(成分別・主観・回復の加点), 0–100\ngate: ≥76 STOP, ≥55 PROTECT, ≥34 SHORTEN',
      inputs:[['ゲート', r.gate+' · '+r.label],['総合リスク', r.risk+'/100'],['脚部ACWR', r.mechanicalACWR?r.mechanicalACWR.toFixed(2):'—'],['心肺ACWR', r.cardioACWR?r.cardioACWR.toFixed(2):'—'],['神経筋比', r.neuroRatio?r.neuroRatio.toFixed(2):'—'],['直近質距離', round(r.quality7,1)+' km'],['張り入力', r.soreness||'—']]}; },
  composition:()=>{ const s=loadCompositionSeries(28);
    const sum=arr=>arr.reduce((a,b)=>a+b,0);
    const m=sum(s.mech),c=sum(s.card),n=sum(s.neuro),t=m+c+n||1;
    return {label:'ANALYTICS', title:'Load Composition · 負荷の成分分解',
      lede:'各ランを、脚にかかる機械的仕事(距離×種別×斜度×速度)、心肺負荷(TRIMP)、高速動作の神経筋負荷に分解して積み上げます。TRIMP一本では「同じ負荷」に見える2日が、実は片方は脚破壊・片方は心肺刺激ということが起こります。この分解が偏りと故障前兆を早期に見せます。',
      formula:'機械的 = km×種別係数×斜度係数×速度係数\n心肺 = TRIMP\n神経筋 = km×高速係数(種別)×速度係数',
      inputs:[['機械的(28日)', round(m,0)],['心肺(28日)', round(c,0)],['神経筋(28日)', round(n,0)],['機械的比率', Math.round(m/t*100)+'%'],['神経筋比率', Math.round(n/t*100)+'%']]}; },
  forecast:()=>{ const f=fitnessForecast(8); const last=f.proj[f.proj.length-1];
    return {label:'FORECAST', title:'Fitness Forecast · 走力トラジェクトリ',
      lede:'直近のeVO2max週次推移を最小二乗で外挿し、8週後の走力を予測します。伸び率は生理的にありえる範囲(±0.6/週)で丸め、CTLは減衰込みで前進。「今の練習を続けたらどこへ行くか」を可視化し、レース日までに目標へ届くかを事前に判断できます。',
      means:'今の練習を続けたら数週間後にどれくらい速くなるかの見通しです。伸びが止まっていれば刺激の種類を変える合図。',
      formula:'eVO2max傾き = 直近推移の最小二乗回帰(週)\n予測 = 現在値 + 傾き×週 (生理上限でclamp)',
      inputs:[['現在eVO2max', round(f.curVo2,1)],['週あたり傾き', (f.slope>=0?'+':'')+round(f.slope,2)],['8週後予測', round(last.vo2,1)],['CTL傾き', (f.ramp>=0?'+':'')+round(f.ramp,1)+'/週']]}; },
  coach:()=>{ const b=coachBrief();
    return {label:'PRIVATE COACH', title:'あなた専用ブリーフの作り方',
      lede:'プロフィール(年齢・体重・身長・最大心拍・LT心拍・経験)、現在の走力(eVO2max/CTL/TSB)、律速診断、トレーニング局面、当日のReadinessと安全ゲートを一つに統合し、「今のあなたに最も効く一手」を選びます。',
      means:'市販のコーチアプリが隠すロジックを全部開示します。あなたの体と今の状態から、次にやるべき練習と、その理由を導いています。',
      formula:'狙う系統 = 律速診断の最優先(テーパー期は鮮度維持)\nセッション = 系統別の最適刺激 × 個人ペース/心拍',
      inputs:[['経験', b.expJP],['狙う系統', b.lim?b.lim.limiter.label:'有酸素基盤'],['推奨頻度', b.daysByExp],['局面', b.phase||'—']]}; },
  zones:()=>{ const z=personalZones();
    return {label:'ZONES', title:'あなたの個人ゾーン',
      lede:`${z.basis==='LTHR'?'LT心拍(乳酸閾値心拍)を基準にしたFriel式の心拍ゾーン':'安静時〜最大心拍の予備(Karvonen)から算出した心拍ゾーン'}と、実効VO2max由来のペース帯です。`,
      means:'どの強度が体の何を鍛えるかの地図。楽な日を本当に楽に(Z1–2)、狙う日をしっかり(Z4–5)。中途半端なZ3の走り過ぎが伸び悩みの元凶です。',
      formula:z.basis==='LTHR'?'各ゾーン = LT心拍 × 係数(Friel)\nペース = eVO2max由来vVO2max × Daniels係数':'各ゾーン = 安静時 + %HRR ×(最大−安静時)',
      inputs:z.hrZones.map(x=>[x.z+' '+x.name, x.lo+'–'+x.hi+' bpm'])}; },
  hrr:()=>{ const h=heartRateRecovery(); if(!h) return {label:'HRR',title:'心拍回復',lede:'追い込んだセッションのストリームが必要です。',formula:''};
    return {label:'AUTONOMIC', title:'心拍回復 HRR60',
      lede:'高強度の直後、60秒間で心拍が何拍下がるかです。副交感神経(回復系)の働きが強いほど大きく下がり、フィットネスと自律神経の健康度を反映します。',
      means:'追い込んだあとスッと心拍が下がるほど、体の回復力が高い証拠。低い日が続くなら疲労やストレスのサインです。',
      formula:'HRR60 = ピーク心拍 − 60秒後の心拍',
      inputs:[['心拍低下', '−'+h.drop+' bpm'],['評価', h.rating],['計測', h.from+'→'+h.to+' bpm'],['日付', fmtDate(h.date)]]}; },
  body:()=>{ const b=bodyMetrics(); if(!b) return {label:'BODY',title:'身体組成',lede:'身長・体重が必要です。',formula:''};
    return {label:'BODY', title:'身体組成',
      lede:'身長と体重からBMIを、ケイデンス付きランからストライド長を算出します。数値は事実の把握のためのもので、減量目標ではありません。',
      means:'体格の客観指標です。ランでは体重よりも「今の体で無理なく積める練習量」の方がずっと重要。数値に一喜一憂しないでください。',
      formula:'BMI = 体重 / 身長(m)²\nストライド = 速度(m/分) / ケイデンス',
      inputs:[['BMI', round(b.bmi,1)+' ('+b.cat+')'],['身長', b.heightCm+' cm'],['体重', b.weightKg+' kg'],['ストライド', b.stride?b.stride.toFixed(2)+' m':'—']]}; },
  hrmax:()=>{ const h=hrProfile();
    return {label:'HEART', title:'心拍プロフィール',
      lede:'最大心拍・安静時心拍から予備心拍(HRR)を、LT心拍から閾値の位置(%HRR)を求めます。実走で観測された最大心拍が設定より高ければ、更新を促します。',
      means:'あなたの心臓の「レンジ」。ここが正確だと全ゾーンとTRIMPの精度が上がります。実走で設定より高い心拍が出たら更新しましょう。',
      formula:'予備心拍 = 最大 − 安静時\nLT位置 = (LT心拍 − 安静時) / 予備心拍',
      inputs:[['最大心拍(設定)', h.hrMax],['実走の最大', h.obsMax||'—'],['安静時', h.hrRest],['予備心拍', h.reserve],['LT位置', h.ltPct?h.ltPct+'%HRR':'—'],['年齢推定最大', h.ageMax||'—']]}; },
  fuel:()=>{ const b=coachBrief(); const longKm=b.pw?Math.max(14,Math.round(b.pw.target*0.32)):16; const f=fuelingPlan(longKm,'long');
    return {label:'FUELING', title:'補給プラン',
      lede:'体重と予定時間から、ロング走・レースで必要な糖質量と水分量の目安を出します。90分を超える運動で失速を防ぐ鍵になります。',
      means:'長い距離では体の糖質が尽きると急に失速します(いわゆる30kmの壁)。走りながら糖質を入れると後半を守れます。',
      formula:'糖質 = 45〜75 g/時 × 予定時間\n消費 ≈ 1.036 kcal × 体重 × km',
      inputs:f.need?[['予定時間', Math.round(f.mins)+'分'],['糖質', f.gPerH+' g/時 (~'+f.total+'g)'],['水分', '~'+f.ml+' ml']]:[['予定時間', Math.round(f.mins)+'分'],['補給', '不要(75分未満)']]}; },
  wbal:()=>({label:'ANAEROBIC', title:"W′ バランス（無酸素予備）",

/* ============================================================
   RUNOS v78 — HYBRID INTELLIGENCE LAYER
   Extends the v77 component load-model & safety-gate from a
   single-day verdict into: (1) a transparent multi-day
   auto-regulated schedule, (2) a load-composition analytics
   surface, (3) an auto-regulation adherence ledger, and
   (4) a forward fitness-trajectory forecast.
   Everything is glass-box and derived from the athlete's own
   history — no black boxes, no external calls.
   ============================================================ */

/* ---- weekly-target helper: what's left to run this week ---- */
function weekProgress(){
  const wk=weekKey(todayISO());
  let doneKm=0, hardDone=0, longDone=false, days=new Set();
  DB.activities.forEach(a=>{ if(weekKey(a.date)===wk){ doneKm+=a.km; days.add(a.date);
    const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
    if(cat==='interval'||cat==='tempo'||cat==='race') hardDone++;
    if(cat==='long'||a.km>=16) longDone=true; } });
  const pw=currentPlanWeek();
  const recentAvg=(()=>{ const w=weeklyAgg(4); const v=w.slice(0,3).map(x=>x.km).filter(x=>x>0);
    return v.length? v.reduce((s,x)=>s+x,0)/v.length : 0; })();
  const target = pw? pw.target : Math.round(Math.max(20, recentAvg||24));
  return {wk,doneKm,hardDone,longDone,daysRun:days.size,target,remaining:Math.max(0,target-doneKm),pw};
}

/* ---- per-km TRIMP from recent history (for forward load sim) ---- */
function perKmTrimpEst(){
  const rec=DB.activities.filter(a=>a.km>0).slice(-12);
  if(!rec.length) return 6.5;
  return rec.reduce((s,a)=>s+trimp(a)/a.km,0)/rec.length;
}

/* ---- 7-day auto-regulated schedule ------------------------------
   Distributes the (remaining) weekly target across the coming 7
   days honouring: recovery window, ≥48h spacing between quality,
   long-run on the nearest weekend, phase-appropriate quality
   count, one genuine rest day, and today's live safety gate. It
   then simulates CTL/ATL/TSB forward so each day shows projected
   freshness. Fully rule-based & inspectable. ----------------------*/
function weekAheadPlan(){
  const paces=vdotPaces(); const wp=weekProgress(); const pw=wp.pw;
  const rec=recoveryState(); const risk=loadRiskV77();
  const perKm=perKmTrimpEst();
  const phase = pw? pw.phase : '';
  const isTaper = /テーパー/.test(phase);
  const qCap = isTaper?1 : /ピーク|ビルド/.test(phase)?2 : phase?1 : (wp.target>=45?2:1);

  const base=new Date(todayISO()+'T00:00');
  const qGapDays=(typeof personalQualityGapDays==='function')?personalQualityGapDays():2;
  // last hard session age (from history) for quality spacing (personalized)
  let lastHardAgo=99;
  { const wkActs=[...DB.activities].sort((a,b)=>a.date<b.date?1:-1);
    for(const a of wkActs){ const age=dayDiff(a.date,todayISO()); if(age<0) continue;
      const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
      if(cat==='interval'||cat==='tempo'||cat==='race'){ lastHardAgo=age; break; } } }

  let qLeft=Math.max(0, qCap - wp.hardDone);
  let needLong = !wp.longDone && !isTaper && wp.target>=24;

  // nearest weekend for the long run
  let longIdx=-1;
  for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(d.getDate()+i); const dow=d.getDay();
    if(dow===6||dow===0){ longIdx=i; break; } }
  if(longIdx<0) longIdx=5;

  // ---- PASS 1: decide the type skeleton for each of the 7 days ----
  const skel=[]; let hardAgo=lastHardAgo;
  for(let i=0;i<7;i++){
    const d=new Date(base); d.setDate(d.getDate()+i); const dow=d.getDay(); const daysLeft=7-i;
    let cat='easy';
    if(i===0 && risk.gate==='STOP'){ cat='rest'; }
    else if(i===0 && rec && rec.remaining>10){ cat='recovery'; }
    else if(i===longIdx && needLong){ cat='long'; needLong=false; }
    else if(qLeft>0 && hardAgo>=qGapDays && daysLeft>1 && !(dow===6||dow===0)){ cat='tempoOrInt'; qLeft--; hardAgo=0; }
    else { cat='easy'; hardAgo++; }
    skel.push({i,dow,cat});
  }
  // ensure at least one rest/recovery day when we ended up running all 7
  if(!skel.some(x=>x.cat==='rest'||x.cat==='recovery')){
    // pick the easy day adjacent to the long run (day after long, else Monday-most)
    const afterLong=skel.find(x=>x.cat==='easy' && skel[x.i-1] && skel[x.i-1].cat==='long');
    const monday=skel.find(x=>x.cat==='easy' && x.dow===1);
    const victim=afterLong||monday||[...skel].reverse().find(x=>x.cat==='easy');
    if(victim) victim.cat='recovery';
  }

  // ---- PASS 2: assign km from the weekly budget ----
  const perQualKm = Math.max(8, Math.round(wp.target*(/ピーク/.test(phase)?0.16:0.17)));
  const longKm = skel.some(x=>x.cat==='long')? Math.max(10,Math.round(wp.target*0.32)) : 0;
  const nQual = skel.filter(x=>x.cat==='tempoOrInt').length;
  const nEasy = skel.filter(x=>x.cat==='easy').length;
  const nRecovery = skel.filter(x=>x.cat==='recovery').length;
  let easyBudget = Math.max(0, (wp.remaining>0?wp.remaining:Math.round(wp.target*0.6)) - longKm - nQual*perQualKm);
  // recovery days take a small fixed slice; the rest goes to easy days
  const recoveryKm = Math.min(6, Math.max(3, Math.round(wp.target*0.08)));
  easyBudget = Math.max(0, easyBudget - nRecovery*recoveryKm);
  const easyKm = nEasy? clamp(Math.round(easyBudget/nEasy),5,Math.max(6,Math.round(wp.target*0.24))) : 0;

  // ---- simulate CTL/ATL/TSB forward and build day objects ----
  const s=pmc(); let ctl=(s.length?s[s.length-1].ctl:0), atl=(s.length?s[s.length-1].atl:0);
  const kC=1-Math.exp(-1/42), kA=1-Math.exp(-1/7);
  const days=[];
  for(const sk of skel){
    const d=new Date(base); d.setDate(d.getDate()+sk.i); const iso=isoLocal(d);
    let cat=sk.cat, km=0, label, why, pace=null;
    const gate0=(sk.i===0)?risk.gate:'GO';
    if(cat==='rest'){ km=0; label=gate0==='STOP'?'休養 / Bike':'休養 / モビリティ';
      why=gate0==='STOP'?`本日ゲート STOP（リスク${risk.risk}）`:'週の回復日'; }
    else if(cat==='recovery'){ km=recoveryKm; label=`回復ジョグ ${km}km`;
      why=(sk.i===0&&rec&&rec.remaining>10)?`前回の回復まで約${Math.ceil(rec.remaining)}h`:'疲労を抜く回復日'; pace=paces?paces.E.hi:null; }
    else if(cat==='long'){ km=longKm; label=`ロング走 ${km}km`; why='週末×ロング未実施'; pace=paces?paces.E.mid:null; }
    else if(cat==='tempoOrInt'){
      // season-aware: use the plan week's actual quality workouts in order
      const pwWk=pw&&pw.workouts?pw.workouts.filter(w=>['tempo','interval','sharpen','race','strides'].includes(w.kind)):[];
      const qIdx=days.filter(x=>x.cat==='tempo'||x.cat==='interval').length;
      const sw=pwWk[qIdx]||null;
      if(sw){ cat=(sw.kind==='sharpen'||sw.kind==='strides')?'interval':(sw.kind==='race'?'tempo':sw.kind);
        km=perQualKm; label=sw.label.split(' (')[0].split('/km')[0].replace(/ \d:\d\d$/,''); if(label.length>26) label=label.slice(0,26)+'…';
        pace=paces?(sw.kind==='tempo'||sw.kind==='race'?paces.T.mid:paces.I.mid):null;
        why=`Season 第${pw.n}週「${pw.phase}」のキー練習`; }
      else if(/ピーク/.test(phase)){ cat='interval'; km=perQualKm; label='インターバル 5×3分'; pace=paces?paces.I.mid:null; why='ピーク期の鍵練習・48h間隔で配置'; }
      else { cat='tempo'; km=perQualKm; label='テンポ 20–30分 @T'; pace=paces?paces.T.mid:null; why=`質セッション・鮮度TSB ${round(ctl-atl,0)}`; }
    } else { // easy
      km=easyKm;
      if(gate0==='PROTECT'){ km=Math.max(4,Math.round(km*0.55)); label=`Protected Easy ${km}km`; why='本日ゲート PROTECT'; }
      else if(gate0==='SHORTEN'){ km=Math.max(5,Math.round(km*0.75)); label=`短縮Easy ${km}km`; why='本日ゲート SHORTEN'; }
      else { label=`イージー ${km}km`; why='有酸素土台・週目標へ充当'; }
      pace=paces?paces.E.mid:null;
    }
    const dayTrimp = km*perKm*({recovery:.7,easy:1,long:1.05,tempo:1.25,interval:1.5}[cat]||1);
    ctl=ctl+(dayTrimp-ctl)*kC; atl=atl+(dayTrimp-atl)*kA;
    days.push({i:sk.i,iso,dow:sk.dow,cat,km,label,why,pace,ctl,atl,tsb:ctl-atl,
      dname:['日','月','火','水','木','金','土'][sk.dow]});
  }
  const totalKm=days.reduce((s,x)=>s+x.km,0);
  const qCount=days.filter(x=>x.cat==='tempo'||x.cat==='interval').length;
  const restCount=days.filter(x=>x.cat==='rest'||x.cat==='recovery').length;
  const out={days,totalKm,qCount,restCount,target:wp.target,phase,endCtl:ctl,endTsb:ctl-atl,qCap,perKm};
  try{ const r=coachRecommendationV77();
    const m={recovery:'recovery',easy:'easy',long:'long',tempo:'tempo',interval:'interval',race:'race'};
    if(r&&m[r.cat]&&out.days&&out.days[0]&&out.days[0].cat!=='rest'){
      const d0=out.days[0]; d0.cat=m[r.cat]; d0.km=Math.round(r.km||d0.km);
      d0.label=r.title; d0.why=r.override?'本日の手動調整と同期':'本日の推奨と同期'; d0.pace=null; } }catch(e){}
  WA_LAST=out;
  return out;
}

/* ---- forward fitness trajectory forecast ---- */
function fitnessForecast(weeks){
  weeks=weeks||8;
  const hist=vo2History(12).filter(h=>h.vo2>0);
  const c=currentPMC();
  // eVO2max slope per week from last up-to-8 samples (least squares)
  let slope=0;
  if(hist.length>=3){ const pts=hist.slice(-8); const n=pts.length;
    let sx=0,sy=0,sxx=0,sxy=0; pts.forEach((p,i)=>{ sx+=i; sy+=p.vo2; sxx+=i*i; sxy+=i*p.vo2; });
    const den=n*sxx-sx*sx; if(den!==0) slope=(n*sxy-sx*sy)/den; }
  slope=clamp(slope,-0.6,0.6); // physiological sanity per week
  const curVo2=hist.length?hist[hist.length-1].vo2:effectiveVO2max().value;
  const ramp=ctlRamp(); // CTL change/week
  const out=[]; let vo2=curVo2, ctl=c.ctl;
  for(let w=1;w<=weeks;w++){ vo2=clamp(vo2+slope,20,85); ctl=Math.max(0,ctl+ramp*0.6*Math.pow(0.9,w));
    out.push({week:w, vo2, ctl}); }
  return {curVo2, slope, ramp, proj:out};
}

/* ---- HR profile: reconcile profile HRmax with observed data ---- */
function hrProfile(){
  const p=DB.profile;
  let obsMax=0, obsDate=null;
  DB.activities.forEach(a=>{ if(a.hrMax && a.hrMax>obsMax){ obsMax=a.hrMax; obsDate=a.date; } });
  const ageMax = p.age? Math.round(208-0.7*p.age) : null; // Tanaka
  const reserve = p.hrMax-p.hrRest;

  return {obsMax, obsDate, ageMax, reserve, ltPct, flagHigh, hrMax:p.hrMax, hrRest:p.hrRest, ltHr:p.ltHr};
}

/* ---- body metrics (factual, non-prescriptive) ---- */

/* ---- heart-rate recovery (HRR): best 60s HR drop after a peak ---- */
function hrr60For(a){
  const s=a.stream; if(!s||s.length<10) return null;
  let smax=0; s.forEach(pt=>{ if(pt[4]!=null&&pt[4]>smax) smax=pt[4]; });
  if(smax<100) return null;
  let best=null;
  for(let i=0;i<s.length;i++){ const hr=s[i][4]; if(hr==null||hr<smax*0.9) continue;
    const t0=s[i][0]; let j=i; while(j<s.length && s[j][0]-t0<60) j++;
    if(j<s.length && s[j][4]!=null){ const drop=hr-s[j][4];
      if(drop>0 && (best==null||drop>best)) best=drop; } }
  return best;
}
function hrrTrend(weeks){
  weeks=weeks||12;
  const cut=(()=>{const d=new Date(todayISO()+'T00:00');d.setDate(d.getDate()-weeks*7);return isoLocal(d);})();
  const pts=[];
  DB.activities.forEach(a=>{ if(a.date<cut) return;
    if(!(a.type==='interval'||a.type==='tempo'||a.type==='race')) return;
    const d=hrr60For(a); if(d!=null) pts.push({date:a.date, drop:d}); });
  pts.sort((x,y)=>x.date<y.date?-1:1);
  return pts;
}
function hrrTrendChart(pts){
  if(pts.length<2) return '';
  const W=760,H=150,padL=34,padR=10,padT=12,padB=24;
  const lo=Math.min(...pts.map(p=>p.drop))-4, hi=Math.max(...pts.map(p=>p.drop))+4;
  const X=i=>padL+(i/(pts.length-1))*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  let d=''; pts.forEach((p,i)=>{ d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.drop).toFixed(1)+' '; });
  let dots=''; pts.forEach((p,i)=>{ const c=p.drop>=40?'#33E1C4':p.drop>=25?'#9BD860':'#F5B23E';
    dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.drop).toFixed(1)}" r="3" fill="${c}"/>`; });
  let grid=''; [25,40].forEach(v=>{ if(v>lo&&v<hi){ const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#1B2436" stroke-dasharray="3 3"/>
      <text x="4" y="${(y+3).toFixed(1)}" fill="#5E6A82" font-size="9.5" font-family="IBM Plex Mono">${v}</text>`; } });
  let labels=''; pts.forEach((p,i)=>{ if(i%Math.ceil(pts.length/6)===0) labels+=`<text x="${X(i).toFixed(1)}" y="${H-8}" fill="#5E6A82" font-size="9" text-anchor="middle" font-family="IBM Plex Mono">${p.date.slice(5)}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:150px">${grid}${labels}
    <path d="${d}" fill="none" stroke="#33E1C4" stroke-width="1.8" opacity="0.7"/>${dots}</svg>`;
}
function heartRateRecovery(){
  const hard=DB.activities.filter(a=>a.stream && (a.type==='interval'||a.type==='tempo'||a.type==='race')).slice(-8);
  let best=null;
  const scan=(a)=>{ const s=a.stream; if(!s||s.length<10) return;
    let smax=0; s.forEach(pt=>{ if(pt[4]!=null&&pt[4]>smax) smax=pt[4]; });
    if(smax<100) return;
    for(let i=0;i<s.length;i++){ const hr=s[i][4]; if(hr==null||hr<smax*0.9) continue;
      const t0=s[i][0];
      // find HR ~60s later
      let j=i; while(j<s.length && s[j][0]-t0<60) j++;
      if(j<s.length && s[j][4]!=null){ const drop=hr-s[j][4];
        if(drop>0 && (!best||drop>best.drop)) best={drop, from:hr, to:s[j][4], date:a.date}; }
    } };
  hard.forEach(scan);
  if(!best) return null;
  let rating = best.drop>=40?'優秀':best.drop>=25?'良好':best.drop>=15?'標準':'低め';
  return {...best, rating};
}

/* ---- energy expenditure + fueling (uses body weight) ---- */
function energyProfile(a){
  const p=DB.profile; const kg=p.weightKg||62;
  // net running energy ≈ ~1.036 kcal per kg per km, mild intensity bump
  const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
  const intens={recovery:.98,easy:1.0,long:1.02,tempo:1.06,interval:1.1,race:1.1}[cat]||1.0;
  const kcal=Math.round(kg*a.km*1.036*intens);
  // carbohydrate fraction rises with intensity
  const carbFrac={recovery:.45,easy:.5,long:.55,tempo:.7,interval:.8,race:.8}[cat]||.55;
  const carbG=Math.round(kcal*carbFrac/4);
  return {kcal, carbG, cat};
}
function fuelingPlan(km, cat){
  const p=DB.profile; const kg=p.weightKg||62;
  const paceGuess = (typeof vdotPaces==='function' && vdotPaces())? (cat==='long'?vdotPaces().E.mid:vdotPaces().M.mid) : 330;
  const mins = km*paceGuess/60;
  if(mins<75) return {mins, need:false, note:'75分未満は基本的に途中補給不要。前後の食事で十分です。'};
  const gPerH = mins<150?45:75; // 30–60 up to ~90 g/h for very long
  const total=Math.round(gPerH*mins/60);
  const ml=Math.round((kg*8)*(mins/60)); // rough 8 ml/kg/h baseline (adjust by heat)
  return {mins, need:true, gPerH, total, ml,
    note:`${Math.round(mins)}分の予定。糖質を${gPerH}g/時(合計~${total}g)、水分~${ml}mlを目安に。ジェル1個≈糖質20〜25g。`};
}

/* ---- W'bal for a quality session (anaerobic reserve dynamics) ---- */
function wPrimeSession(a){
  const cs=(typeof criticalSpeed==='function')?criticalSpeed():null;
  if(!cs||!a.stream) return null;
  const CS=cs.cs, Dp=cs.dprime; // m/s, m
  let bal=Dp, minBal=Dp;
  const s=a.stream;
  for(let i=1;i<s.length;i++){ const v=s[i][2]; if(v==null) continue;
    const dt=Math.max(0,s[i][0]-s[i-1][0])||1;
    if(v>CS){ bal-=(v-CS)*dt; }                 // deplete above CS
    else { bal+=(CS-v)*(dt)*(bal<Dp?0.35:0); }  // slow recharge below CS
    bal=Math.min(Dp,bal); if(bal<minBal) minBal=bal;
  }
  const usedPct=clamp((1-minBal/Dp)*100,0,100);
  return {dPrime:Dp, minBal, usedPct};
}

/* ---- single "your threshold" verdict reconciling sources ---- */
function thresholdVerdict(){
  const p=DB.profile; const th=(typeof thresholdDetect==='function')?thresholdDetect():null;
  const detected = th? th.tPaceSec : null;
  const profilePace = p.thresholdPaceSec||null;
  const ltHr = p.ltHr||null;
  let suggestion=null;
  if(detected && profilePace && Math.abs(detected-profilePace)>=8){
    suggestion = detected<profilePace
      ? `実走データはプロフィールより速い閾値(${paceStr(detected)}/km)を示しています。設定を更新すると全ペースが最新化されます。`
      : `実走データはプロフィールより遅い閾値(${paceStr(detected)}/km)を示しています。疲労や環境の影響かもしれません。`;
  }
  return {detected, profilePace, ltHr, conf:th?th.conf:null, suggestion};
}

  const p=DB.profile;

  const lim=(typeof limiterDiagnosis==='function')?limiterDiagnosis():null;
  const zones=personalZones(); const th=thresholdVerdict();
  const pw=currentPlanWeek(); const phase=pw?pw.phase:'';
  const tp=vdotPaces();
  const expJP={beginner:'初級',intermediate:'中級',advanced:'上級'}[p.experience]||'中級';

  // HR target for a given pace-zone letter, from personal zones
  const hrFor = zLetter => { const map={E:'Z2',M:'Z3',T:'Z4',I:'Z5',R:'Z5'}[zLetter];
    const z=zones.hrZones.find(x=>x.z===map); return z?`${z.lo}–${z.hi}`:null; };

  // ---- narrative ----
  const who=[];
  who.push(`${expJP}ランナー・${p.age?p.age+'歳':''}${p.sex==='f'?'女性':'男性'}。`);
  who.push(`現在の走力 eVO2max ${round(evo.value,1)}${evo.source?`（${evo.source}）`:''}、体力CTL ${round(c.ctl,0)}、調子TSB ${c.tsb>=0?'+':''}${round(c.tsb,0)}。`);
  if(lim) who.push(`最大のボトルネックは「${lim.limiter.label}」です。`);

  // ---- this week's priority (limiter-driven, phase-aware) ----
  let focusKey = lim? lim.limiter.key : 'aerobic';
  if(/テーパー/.test(phase)) focusKey='taper';
  const sessionByFocus = {
    aerobic:{ title:'VO2max インターバル', detail: tp?`3〜5分 × 5本 @I ${paceStr(tp.I.mid)}/km（HR ${hrFor('I')||'Z5'}）、つなぎは同時間のジョグ`:'3〜5分×5本 @I、つなぎ同時間ジョグ',
      why:'有酸素の天井を直接押し上げます。あなたの律速がここなので費用対効果が最大。' },
    thresholdQ:{ title:'クルーズ・インターバル（閾値）', detail: tp?`1km × 5〜6本 @T ${paceStr(tp.T.mid)}/km（HR ${hrFor('T')||'Z4'}）、休息1分`:'1km×5〜6本 @T、休息1分',
      why:'「速いのに保てる」領域を広げます。閾値が律速のあなたに最適。' },
    endurance:{ title:'漸進ロング走', detail: tp?`${pw?Math.max(14,Math.round(pw.target*0.32)):16}km、最後の1/3を @M ${paceStr(tp.M.mid)}/km（HR ${hrFor('M')||'Z3'}）`:'16km、後半をMPへ',
      why:'持久基盤が律速。時間をかけた低〜中強度で脂質代謝と毛細血管を育てます。' },
    speed:{ title:'ヒル/ウィンドスプリント', detail:'20秒 × 8〜10本、全力の9割、完全回復。坂ならなお良い',
      why:'走効率と神経筋が律速。短く速い刺激でフォームの経済性を上げます。' },
    taper:{ title:'キレ出しの短い刺激', detail: tp?`3分 × 4本 @I ${paceStr(tp.I.mid)}/km + レースペース2km`:'3分×4本 @I + RP 2km',
      why:'量を落としつつ鋭さを保つ。テーパー期は疲労を抜くのが仕事です。' }
  };
  const keySession = sessionByFocus[focusKey]||sessionByFocus.aerobic;

  // ---- weekly shape recommendation by experience ----
  const daysByExp={beginner:'週4日（質1・ロング1・イージー2）',intermediate:'週5日（質2・ロング1・イージー2）',advanced:'週6日（質2・ロング1・イージー3）'}[p.experience]||'週5日';

  // ---- cautions ----
  const cautions=[];
  if(risk.gate!=='GO') cautions.push(`本日は安全ゲート「${risk.gate}」。${risk.cap}`);
  if(p.injuryProne) cautions.push('故障しやすい設定のため、増量は週8%以内・質練習の間に必ず48時間を確保します。');
  if(th.suggestion && th.conf && th.conf!=='低') cautions.push(th.suggestion+' Insightsの「走力の統合」から採用源をワンタップで切替もできます。');

  return {who, keySession, focusKey, daysByExp, cautions, zones, evo, c, st, rd, risk, lim, phase, pw, expJP, hrFor, tp, th};
}

/* workout category → preferred shoe categories (priority order) */
const SHOE_FIT={
  race:['race','supertrainer'],
  interval:['supertrainer','race','daily'],
  tempo:['supertrainer','race','daily'],
  long:['supertrainer','daily','maxcushion'],

function shoeLabel(s){ return `${s.brand} ${s.model}`; }
function shoeShort(s){ return s.model; }
function catalogRetire(cat){ return SHOE_CAT_RETIRE[cat]||700; }

/* mileage = start offset + sum of assigned activity km */
function shoeMileage(shoe){
  let km=shoe.startKm||0;
  DB.activities.forEach(a=>{ if(a.shoeId===shoe.id) km+=a.km; });
  return km;
}
function shoeStatus(shoe){
  const km=shoeMileage(shoe); const retire=shoe.retireKm||catalogRetire(shoe.cat);
  const pct=clamp(km/retire*100,0,140);
  let state,color;
  if(km>=retire){ state='要交換'; color='var(--coral)'; }
  else if(km>=retire*0.85){ state='そろそろ交換'; color='var(--gold)'; }
  else { state='良好'; color='var(--teal)'; }
  return {km,retire,pct,state,color};
}
function activeShoes(){ return (DB.shoes||[]).filter(s=>s.active!==false); }

function addShoeFromCatalog(idx){
  const c=SHOE_CATALOG[idx]; if(!c) return null;
  const id='shoe_'+Date.now().toString(36)+'_'+Math.floor(Math.random()*1e4).toString(36);
  const shoe={id, brand:c.brand, model:c.model, cat:c.cat, startKm:0, retireKm:catalogRetire(c.cat), active:true, addedAt:todayISO()};
  DB.shoes=DB.shoes||[]; DB.shoes.push(shoe); return {shoe,saved:save()};
}

/* recommend the best-fit active shoe for a workout category */
function recommendShoe(workoutCat){
  const shoes=activeShoes(); if(!shoes.length) return null;
  const pref=SHOE_FIT[workoutCat]||SHOE_FIT.easy;
  // score: category priority (lower index = better) minus wear penalty
  let best=null;
  shoes.forEach(s=>{ const rank=pref.indexOf(s.cat); if(rank<0) return;
    const st=shoeStatus(s);
    let score=(pref.length-rank)*10 - st.pct*0.08 - (st.state==='要交換'?40:st.state==='そろそろ交換'?12:0);
    // for race/quality prefer freshest race shoe; for easy prefer higher mileage rotation
    if(!best||score>best.score) best={shoe:s, score, rank, st}; });
  if(!best){ // no ideal category; fall back to freshest daily-ish
    shoes.forEach(s=>{ const st=shoeStatus(s); const score=100-st.pct;
      if(!best||score>best.score) best={shoe:s,score,rank:-1,st}; }); }
  const alt=shoes.filter(s=>s.id!==best.shoe.id && pref.indexOf(s.cat)>=0)
    .sort((a,b)=>pref.indexOf(a.cat)-pref.indexOf(b.cat))[0]||null;
  return {shoe:best.shoe, status:best.st, why:whyShoe(best.shoe.cat,workoutCat), alt};
}
function whyShoe(shoeCat,workoutCat){
  const map={
    race:'反発の高いカーボンプレートで一歩を速く。レース・キレ練習向き。',
    supertrainer:'反発とクッションの両立。テンポからロングまで一足でこなせます。',
    daily:'耐久性のある普段履き。有酸素の土台作りに最適。',
    maxcushion:'厚いクッションで着地衝撃を吸収。回復・ロングで脚を守ります。',
    stability:'内側の潰れを抑える安定構造。脚が疲れた日や長い距離に安心。'
  };
  return map[shoeCat]||'';
}

/* ---- heat & altitude pace correction ------------------------------
   heat: above ~15°C running slows; humidity compounds it.
   altitude: aerobic capacity drops above ~300m.
   Returns a multiplicative slowdown factor + adjusted target paces. */
function envAdjust(temp, humidity, altitude){
  temp = temp==null? (DB.env&&DB.env.temp!=null?DB.env.temp:20) : temp;
  humidity = humidity==null? (DB.env&&DB.env.humidity!=null?DB.env.humidity:50) : humidity;
  altitude = altitude==null? (DB.env&&DB.env.altitude!=null?DB.env.altitude:0) : altitude;
  // neutral up to ~16°C; gentle rise; humidity only bites when warm
  const heat = clamp(Math.max(0,temp-16)*0.0045 + Math.max(0,humidity-55)*0.0008*Math.max(0,(temp-20)/8), 0, 0.13);
  const alt = clamp(Math.max(0,altitude-300)/300*0.015, 0, 0.10);
  const factor = heat+alt; // fractional slowdown (0.04 = 4% slower)
  return {temp,humidity,altitude,heat,alt,factor};
}
function envAdjustedPaces(){
  const tp=vdotPaces(); if(!tp) return null;
  const e=envAdjust();
  const adj=s=>Math.round(s*(1+e.factor));
  return {e, E:adj(tp.E.mid), M:adj(tp.M.mid), T:adj(tp.T.mid), I:adj(tp.I.mid)};
}

/* ---- predict W' usage for a *planned* interval session ----
   Lets the athlete design reps/rest that use the right amount of
   anaerobic reserve — the "what to do next" Garmin never gives. */
function sessionWprimePreview(focusKey, tp){
  const cs=(typeof criticalSpeed==='function')?criticalSpeed():null;
  if(!cs||!tp) return null;
  const CS=cs.cs, Dp=cs.dprime; if(!Dp||Dp<80) return null;
  let reps,workSec,workPace,restSec,restPace,label;
  if(focusKey==='aerobic'){ reps=5; workSec=240; workPace=tp.I.mid; restSec=180; restPace=tp.E.mid; label='4分×5 @I / つなぎジョグ3分'; }
  else if(focusKey==='thresholdQ'){ reps=6; workSec=Math.round(tp.T.mid); workPace=tp.T.mid; restSec=60; restPace=tp.E.mid; label='1km×6 @T / 休60秒'; }
  else if(focusKey==='speed'){ reps=8; workSec=20; workPace=tp.R.mid; restSec=90; restPace=tp.E.mid; label='20秒×8 / 完全回復90秒'; }
  else return null;
  const vW=1000/workPace, vR=1000/restPace;
  let bal=Dp, minBal=Dp;
  const step=(v,dt)=>{ if(v>CS) bal-=(v-CS)*dt; else { const tau=546*Math.exp(-0.01*(CS-v))+316; bal=Dp-(Dp-bal)*Math.exp(-dt/tau); } bal=Math.min(Dp,bal); if(bal<minBal)minBal=bal; };
  for(let r=0;r<reps;r++){ step(vW,workSec); step(vR,restSec); }
  const usedPct=clamp((1-minBal/Dp)*100,0,100);
  let verdict,advice;
  if(usedPct>=96){ verdict='追い込みすぎ'; advice='休息を長く、または本数を減らすと最後まで質を保てます。'; }
  else if(usedPct>=70){ verdict='最適な刺激'; advice='狙いどおり。最後の1〜2本で粘れれば理想的です。'; }
  else if(usedPct>=40){ verdict='やや余裕'; advice='もう1〜2本、または休息を短くして刺激を強められます。'; }
  else { verdict='刺激が軽め'; advice='この設定はW′をあまり使いません（テンポ系は"使わず長く"が狙いです）。'; }
  return {label, usedPct, verdict, advice, reps, csKmh:CS*3.6};
}


function wPrimeSeries(a){
  const cs=(typeof criticalSpeed==='function')?criticalSpeed():null;
  if(!cs||!a.stream||a.stream.length<10) return null;
  const CS=cs.cs, Dp=cs.dprime; const s=a.stream;
  if(!Dp || Dp<80) return null;   // implausibly small reserve → model not reliable yet
  let bal=Dp, minBal=Dp; const series=[];
  // recharge time-constant depends on how far below CS (Skiba): tau ~ 546*e^(-0.01*Dcs)+316
  for(let i=1;i<s.length;i++){ const v=s[i][2]; if(v==null){ continue; }
    const dt=Math.max(0,s[i][0]-s[i-1][0])||1;
    if(v>CS){ bal-=(v-CS)*dt; }
    else { const dcs=CS-v; const tau=546*Math.exp(-0.01*dcs)+316; bal=Dp-(Dp-bal)*Math.exp(-dt/tau); }
    bal=Math.min(Dp,Math.max(-0.15*Dp,bal));
    if(bal<minBal) minBal=bal;
    series.push([s[i][0], bal]);
  }
  // downsample to ≤240 pts
  const step=Math.max(1,Math.ceil(series.length/240));
  const ds=[]; for(let i=0;i<series.length;i+=step) ds.push(series[i]);
  return {CS, dPrime:Dp, minBal, usedPct:clamp((1-minBal/Dp)*100,0,100), series:ds, dur:s[s.length-1][0]};
}
function wPrimeChart(a){
  const w=wPrimeSeries(a);
  if(!w) return `<div class="empty">臨界速度モデルと連続データが揃うと、セッション中の無酸素予備(W')の推移を表示します。全力インターバルのFITで有効になります。</div>`;
  const W=760,H=200,padL=44,padR=10,padT=14,padB=24;
  const Dp=w.dPrime; const lo=Math.min(w.minBal,0), hi=Dp;
  const T=w.dur||1;
  const X=t=>padL+(t/T)*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  let d=''; w.series.forEach((p,i)=>{ d+=(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)+' '; });
  const area=d+`L${X(w.series[w.series.length-1][0]).toFixed(1)} ${Y(lo).toFixed(1)} L${X(w.series[0][0]).toFixed(1)} ${Y(lo).toFixed(1)} Z`;
  const zeroY=Y(0);
  // grid at 0 and D'
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:200px">
    <defs><linearGradient id="wbgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#33E1C4" stop-opacity=".28"/><stop offset="1" stop-color="#FF6E5B" stop-opacity=".22"/></linearGradient></defs>
    <line x1="${padL}" y1="${Y(Dp).toFixed(1)}" x2="${W-padR}" y2="${Y(Dp).toFixed(1)}" stroke="#1B2436"/>
    <text x="4" y="${(Y(Dp)+3).toFixed(1)}" fill="#5E6A82" font-size="10" font-family="IBM Plex Mono">満タン</text>
    <line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="#3A2530" stroke-dasharray="4 4"/>
    <text x="4" y="${(zeroY+3).toFixed(1)}" fill="#8A5560" font-size="10" font-family="IBM Plex Mono">枯渇</text>
    <path d="${area}" fill="url(#wbgrad)"/>
    <path d="${d}" fill="none" stroke="#33E1C4" stroke-width="2"/></svg>
    <div class="inputs" style="margin-top:10px">
      <div class="row"><span class="l">臨界速度 (CS)</span><span class="r mono">${paceStr(1000/w.CS)}/km</span></div>
      <div class="row"><span class="l">無酸素予備 D'</span><span class="r mono">${round(w.dPrime,0)} m相当</span></div>
      <div class="row"><span class="l">最深時の残量</span><span class="r mono" style="color:${w.usedPct>85?'var(--coral)':w.usedPct>50?'var(--gold)':'var(--teal)'}">${round(100-w.usedPct,0)}% (使用 ${round(w.usedPct,0)}%)</span></div>
    </div>`;
}

/* ============================================================
   RUNOS v81 — FITNESS RECONCILIATION
   The HR-based eVO2max underestimates for athletes who run
   mostly easy. We therefore anchor "performance VO2max" to the
   best hard evidence available, in priority order:
     1. LT pace the athlete entered (ground truth / field test)
     2. Critical speed measured from the speed–duration curve
     3. Fastest race-equivalent best effort (5k/10k) via Daniels
     4. HR × pace estimate (fallback)
   Every source is shown side-by-side so the athlete can see
   agreement/disagreement and correct the model — something a
   black-box watch never lets you do.
   ============================================================ */

/* solve Daniels VDOT that reproduces a (distance, time) effort */
function vo2FromEffort(meters, sec){
  let lo=25, hi=85;
  for(let i=0;i<40;i++){ const mid=(lo+hi)/2;
    if(predictTime(mid,meters) > sec) lo=mid; else hi=mid; }
  return (lo+hi)/2;
}

/* T pace (sec/km) ↔ VO2max, using T ≈ 88% of vVO2max (Daniels) */
function vo2FromTPace(tPaceSec){ const vT=60000/tPaceSec; return vo2FromV(vT/0.88); }
function tPaceFromVo2(vo2){ const vmax=velFromVO2(vo2); return 60000/(vmax*0.88); }

function fitnessReconcile(){
  const p=DB.profile;
  const sources=[];
  // 0) manual race result (an actual performance = strongest ground truth)
  const races=(DB.races||[]).filter(r=>r.m>0&&r.sec>0);
  if(races.length){
    // pick the one implying the highest VO2 within the last ~180 days (freshest peak)
    let best=null;
    races.forEach(r=>{ const age=r.date?dayDiff(r.date,todayISO()):0; if(age>180) return;
      const vo2=vo2FromEffort(r.m,r.sec); if(!best||vo2>best.vo2) best={...r,vo2}; });
    if(!best){ races.forEach(r=>{ const vo2=vo2FromEffort(r.m,r.sec); if(!best||vo2>best.vo2) best={...r,vo2}; }); }
    if(best) sources.push({key:'racein', label:`レース結果（${round(best.m/1000,best.m%1000?1:0)}km）`,
      tPaceSec:tPaceFromVo2(best.vo2), vo2:best.vo2, conf:'高', priority:5, detail:hms(best.sec)});
  }
  // 1) entered LT pace
  if(p.thresholdPaceSec && p.thresholdPaceSec>=150 && p.thresholdPaceSec<=540){
    sources.push({key:'entered', label:'LTペース（入力）', tPaceSec:p.thresholdPaceSec,
      vo2:vo2FromTPace(p.thresholdPaceSec), conf:'高', priority:4}); }
  // 2) detected critical speed
  const th=(typeof thresholdDetect==='function')?thresholdDetect():null;
  if(th && th.cs>0){ const tp=1000/th.cs;
    sources.push({key:'cs', label:'臨界速度（実測）', tPaceSec:tp, vo2:vo2FromTPace(tp),
      conf:th.conf, priority: th.conf==='高'?3:th.conf==='中'?2.5:1}); }
  // 3) best race-equivalent effort — ONLY from genuinely hard sessions
  //    (an easy run's fastest 5k is still easy pace; it must not anchor fitness)
  let bestEff=null;
  DB.activities.forEach(a=>{ if(!a.bests)return;
    const hard = a.type==='race'||a.type==='interval'||a.type==='tempo';
    if(!hard) return;
    [3000,5000,10000].forEach(D=>{ if(a.bests[D] && (!bestEff||a.bests[D]/D<bestEff.t/bestEff.D)) bestEff={D,t:a.bests[D],date:a.date}; }); });
  if(bestEff){ const vo2=vo2FromEffort(bestEff.D,bestEff.t);
    sources.push({key:'race', label:`実走ベスト（${bestEff.D/1000}km・全力）`, tPaceSec:tPaceFromVo2(vo2),
      vo2, conf:'高', priority:3.5, detail:`${hms(bestEff.t)}`}); }
  // 4) HR-based estimate (fallback / cross-check)
  const hr=effectiveVO2max();
  if(hr.value>0) sources.push({key:'hr', label:'心拍×ペース（推定）', tPaceSec:tPaceFromVo2(hr.value),
    vo2:hr.value, conf:'—', priority:1, note:'イージー走が多いと低めに出ます'});

  // ---- adoption ----
  // entered LT is ground truth. Otherwise prefer a high-confidence hard-effort
  // source; if none exists, take the HIGHEST estimate so we never under-read
  // demonstrated ability (easy-run sources systematically under-estimate).
  const manualKey=DB.profile&&DB.profile.fitnessSource;
  const manualSrc=(manualKey&&manualKey!=='auto')? sources.find(s=>s.key===manualKey) : null;
  const ground=sources.find(s=>s.key==='racein') || sources.find(s=>s.key==='entered');
  let adopted=null;
  if(manualSrc){ adopted=manualSrc; adopted.manual=true; }
  else if(ground){ adopted=ground; }
  else {
    const strong=sources.filter(s=>s.conf==='高').sort((a,b)=>b.priority-a.priority||b.vo2-a.vo2);
    adopted = strong.length? strong[0] : [...sources].sort((a,b)=>b.vo2-a.vo2)[0];
  }
  if(adopted) adopted.adopted=true;
  const lowConf = !ground && (!adopted || adopted.conf!=='高');
  const cred=sources.filter(s=>s.priority>=2.5).map(s=>s.vo2);
  const spread = cred.length>1? Math.max(...cred)-Math.min(...cred) : 0;
  return {sources, adopted, spread, lowConf};
}

/* the number everything user-facing should use */
function perfVO2max(){
  const r=fitnessReconcile();
  if(!r.adopted) return {value:0, source:'—', conf:'—'};
  return {value:r.adopted.vo2, source:r.adopted.label, conf:r.adopted.conf, tPaceSec:r.adopted.tPaceSec, reconcile:r};
}

function reconcileCard(){

    <td class="n mono">${round(s.vo2,1)}</td>
    <td class="n mono">${paceStr(s.tPaceSec)}/km</td>

    <td class="n">${s.adopted?(manual?'<button class="tiny" data-adopt="auto">自動へ</button>':'<span class="hint" style="font-size:10px">採用中</span>'):`<button class="tiny" data-adopt="${s.key}">採用</button>`}</td></tr>`).join('');
  const spreadNote = r.spread>3
    ? `<div class="hint" style="margin-top:8px;color:var(--gold)">推定源の差が ${round(r.spread,1)} ml/kg/min とやや大きめ。全力走や実測LTを入れると精度が上がります。</div>`
    : `<div class="hint" style="margin-top:8px">複数の推定源がおおむね一致しています。</div>`;
  const lowBanner = r.lowConf
    ? `<div class="callout" style="border-left-color:var(--gold);margin:12px 0 4px">
        <div class="t" style="font-size:14px">走力の根拠が「全力データ」不足です</div>
        <div class="b">現在はイージー走中心の推定のため、実際の走力より低く出がちです。設定で <strong>LTペース・LT心拍</strong>（Garminの値でOK）を入れるか、テンポ走/インターバル/レースを記録すると、この推定が実測基準に切り替わります。</div></div>`
    : '';
  return `<div class="card gb" data-gb="reconcile" style="margin-bottom:16px">
    <h3>走力の統合 · どの数値を採用しているか</h3>
    <div class="hint" style="margin-bottom:10px">走力の推定源を並べて表示し、最も信頼できるものを採用します。市販の時計と違い「なぜその数値か」が見え、あなた自身の実測値で上書きできます。</div>
    <div class="tscroll"><table><thead><tr><th>推定源</th><th class="n">VO2max</th><th class="n">閾値ペース</th><th class="n">信頼</th><th class="n">切替</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="hint" style="margin-top:6px">「採用」で走力の基準を手動で切り替えられます（全ペース・予測・処方に即反映）。</div>
    ${lowBanner}
    ${spreadNote}</div>`;
}

/* ============================================================
   RUNOS v85 — INTERVAL DESIGNER (live W')
   Adjust reps / work / rest / pace and see, in real time,
   how much anaerobic reserve (W') the session will use, whether
   it's sustainable, and the total distance & time. Built on the
   validated CS/D' W'-balance engine. This is the "design your
   next hard session" tool a watch never gives you.
   ============================================================ */

let IVDESIGN=null;
function ivDefault(){
  // seed from the athlete's current limiter/focus if available
  let workPaceKey='I', workSec=180, restSec=120, reps=5, restPaceKey='E';
  try{ const b=coachBrief();
    if(b.focusKey==='thresholdQ'){ workPaceKey='T'; workSec=300; restSec=60; reps=5; }
    else if(b.focusKey==='speed'){ workPaceKey='R'; workSec=30; restSec=90; reps=8; }
  }catch(e){}
  return {reps, workSec, workPaceKey, restSec, restPaceKey};
}
function ivClamp(c){
  c.reps=clamp(c.reps,1,15);
  c.workSec=clamp(c.workSec,20,1500);
  c.restSec=clamp(c.restSec,0,900);
  return c;
}

function ivCompute(cfg){
  const tp=vdotPaces(); if(!tp) return null;
  const paceSec={I:tp.I.mid,T:tp.T.mid,R:tp.R.mid,M:tp.M.mid}[cfg.workPaceKey]||tp.I.mid;
  const workV=1000/paceSec;
  const restV=cfg.restPaceKey==='walk'?1.55:(cfg.restPaceKey==='stand'?0.01:1000/tp.E.mid);
  const totalSec=(cfg.workSec+cfg.restSec)*cfg.reps;
  const totalKm=(workV*cfg.workSec + restV*cfg.restSec)*cfg.reps/1000;
  const workKmEach=workV*cfg.workSec/1000;
  const cs=(typeof criticalSpeed==='function')?criticalSpeed():null;
  let w=null;
  if(cs && cs.dprime>=80 && cs.cs>0){
    const CS=cs.cs, Dp=cs.dprime; let bal=Dp,minBal=Dp; const series=[]; let t=0;
    const step=(v,secs)=>{ for(let i=0;i<secs;i++){
      if(v>CS) bal-=(v-CS); else { const tau=546*Math.exp(-0.01*(CS-v))+316; bal=Dp-(Dp-bal)*Math.exp(-1/tau); }
      bal=Math.min(Dp,Math.max(-0.2*Dp,bal)); if(bal<minBal)minBal=bal;
      if(t% Math.max(1,Math.floor(totalSec/240))===0) series.push([t,bal]); t++; } };
    for(let r=0;r<cfg.reps;r++){ step(workV,cfg.workSec); step(restV,cfg.restSec); }
    const usedPct=clamp((1-minBal/Dp)*100,0,100);
    let verdict,advice,col;
    if(usedPct>=98){ verdict='完遂困難'; advice='最後まで持ちません。本数を減らすか休息を延ばしましょう。'; col='var(--coral)'; }
    else if(usedPct>=88){ verdict='かなりキツい'; advice='上級者向け。狙って追い込む日に。'; col='var(--coral)'; }
    else if(usedPct>=65){ verdict='最適な刺激'; advice='狙いどおり。最後の1〜2本で粘れれば理想です。'; col='var(--teal)'; }
    else if(usedPct>=35){ verdict='やや余裕'; advice='本数追加か休息短縮で刺激を強められます。'; col='var(--gold)'; }
    else { verdict='刺激が軽め'; advice='W′をあまり使いません。閾値持久やつなぎ向き。'; col='var(--ink-2)'; }
    w={CS,Dp,minBal,usedPct,series,totalSec,verdict,advice,col};
  }
  return {tp,paceSec,workV,restV,totalSec,totalKm,workKmEach,w,cs};
}

function ivMiniChart(w){
  if(!w||!w.series.length) return '';
  const W=720,H=120,padL=6,padR=6,padT=8,padB=8;
  const Dp=w.Dp, lo=Math.min(w.minBal,0), hi=Dp, T=w.totalSec||1;
  const X=t=>padL+(t/T)*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  let d=''; w.series.forEach((p,i)=>{ d+=(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)+' '; });
  const zeroY=Y(0);
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:120px">
    <line x1="${padL}" y1="${Y(Dp).toFixed(1)}" x2="${W-padR}" y2="${Y(Dp).toFixed(1)}" stroke="#1B2436"/>
    <line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="#3A2530" stroke-dasharray="4 4"/>
    <path d="${d}" fill="none" stroke="${w.col}" stroke-width="2"/></svg>`;
}

function ivStep(field,delta){
  if(!IVDESIGN) IVDESIGN=ivDefault();
  if(field==='workSec') IVDESIGN.workSec += delta*(IVDESIGN.workSec>=120?30:15);
  else if(field==='restSec') IVDESIGN.restSec += delta*15;
  else IVDESIGN[field] += delta;
  ivClamp(IVDESIGN); renderIvDesigner();
}
function ivSetPace(k){ if(!IVDESIGN)IVDESIGN=ivDefault(); IVDESIGN.workPaceKey=k; renderIvDesigner(); }
function ivSetRest(k){ if(!IVDESIGN)IVDESIGN=ivDefault(); IVDESIGN.restPaceKey=k; renderIvDesigner(); }

function ivDesignerBody(){
  if(!IVDESIGN) IVDESIGN=ivDefault();
  const c=IVDESIGN; const r=ivCompute(c);
  if(!r) return '<div class="empty">走力データが増えると設計ツールが有効になります</div>';
  const paceBtn=(k,label)=>`<button class="tg ${c.workPaceKey===k?'on':''}" data-ivpace="${k}">${label}</button>`;
  const restBtn=(k,label)=>`<button class="tg ${c.restPaceKey===k?'on':''}" data-ivrest="${k}">${label}</button>`;
  const stepper=(field,val,unit)=>`<div class="iv-step">
      <button class="iv-b" data-iv="${field}" data-d="-1">−</button>
      <div class="iv-val mono">${val}<small>${unit}</small></div>
      <button class="iv-b" data-iv="${field}" data-d="1">＋</button></div>`;
  const workMin=Math.floor(c.workSec/60), workRem=c.workSec%60;
  const workLabel=c.workSec>=60?`${workMin}:${String(workRem).padStart(2,'0')}`:`${c.workSec}秒`;
  const restLabel=c.restSec>=60?`${Math.floor(c.restSec/60)}:${String(c.restSec%60).padStart(2,'0')}`:`${c.restSec}秒`;
  const w=r.w;
  return `
    <div class="iv-grid">
      <div class="iv-cell"><div class="iv-k">本数</div>${stepper('reps',c.reps,'本')}</div>
      <div class="iv-cell"><div class="iv-k">1本の時間</div>${stepper('workSec',workLabel,'')}</div>
      <div class="iv-cell"><div class="iv-k">休息</div>${stepper('restSec',restLabel,'')}</div>
    </div>
    <div class="iv-row"><span class="iv-k">疾走ペース</span><div class="toggles">${paceBtn('T','T 閾値')}${paceBtn('I','I VO2max')}${paceBtn('R','R 速い')}${paceBtn('M','M マラソン')}</div></div>
    <div class="iv-row"><span class="iv-k">休息</span><div class="toggles">${restBtn('E','ジョグ')}${restBtn('walk','歩き')}${restBtn('stand','静止')}</div></div>
    <div class="iv-summary">
      <div class="iv-s"><div class="iv-sk">疾走ペース</div><div class="iv-sv mono">${paceStr(r.paceSec)}/km</div></div>
      <div class="iv-s"><div class="iv-sk">1本の距離</div><div class="iv-sv mono">${round(r.workKmEach*1000,0)}m</div></div>
      <div class="iv-s"><div class="iv-sk">合計</div><div class="iv-sv mono">${round(r.totalKm,1)}km · ${hms(r.totalSec)}</div></div>
    </div>
    ${w?`<div class="iv-wbar"><div class="iv-wbar-head">
        <span>無酸素予備 W′ の使用</span>
        <span class="mono" style="color:${w.col};font-weight:600">${round(w.usedPct,0)}% · ${w.verdict}</span></div>
      ${ivMiniChart(w)}
      <div class="iv-advice" style="border-left-color:${w.col}">${w.advice}</div></div>`
      : `<div class="hint" style="margin-top:12px">W′の予測には臨界速度データ（テンポ/インターバル/レースのFIT）が必要です。それまでは距離・時間・ペースの設計ができます。</div>`}
  `;
}
function renderIvDesigner(){ const host=el('ivDesigner'); if(!host) return; host.innerHTML=ivDesignerBody();
  host.querySelectorAll('[data-iv]').forEach(b=>b.onclick=()=>ivStep(b.dataset.iv, parseInt(b.dataset.d)));
  host.querySelectorAll('[data-ivpace]').forEach(b=>b.onclick=()=>ivSetPace(b.dataset.ivpace));
  host.querySelectorAll('[data-ivrest]').forEach(b=>b.onclick=()=>ivSetRest(b.dataset.ivrest));
}

/* ============================================================
   RUNOS 2.0 — SEASON
   Strategic, periodized campaign toward the goal race. Turns the
   whole system (fitness model, limiter, PMC projection, zones,
   W' design) into one longitudinal plan with mesocycles, deload
   weeks, structured key workouts, and a race-day fitness forecast.
   ============================================================ */

function seasonProgress(){
  const p=DB.plan; if(!p) return null;
  const curWk=weekKey(todayISO());
  const idx=p.weeks.findIndex(w=>w.start===curWk);
  const done=p.weeks.filter(w=>w.start<curWk).length;
  return {idx: idx<0? (curWk<p.weeks[0].start?-1:p.weeks.length):idx, done, total:p.weeks.length};
}

/* phase timeline bar */
function phaseTimelineSVG(p){
  if(!p.phases||!p.phases.length) return '';
  const total=p.weeks.length;
  const sp=seasonProgress();
  let segs='', cursor=0;
  const W=760,H=46;
  p.phases.forEach(ph=>{
    const w=(ph.weeks/total)*W;
    segs+=`<g>
      <rect x="${cursor.toFixed(1)}" y="10" width="${(w-2).toFixed(1)}" height="26" rx="6" fill="${ph.col}" opacity="0.22"/>
      <rect x="${cursor.toFixed(1)}" y="10" width="${(w-2).toFixed(1)}" height="3" rx="1.5" fill="${ph.col}"/>
      <text x="${(cursor+w/2).toFixed(1)}" y="27" fill="${ph.col}" font-size="12" font-weight="700" text-anchor="middle">${ph.label}</text>
      <text x="${(cursor+w/2).toFixed(1)}" y="${H-2}" fill="#5E6A82" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono">${ph.weeks}週</text></g>`;
    cursor+=w;
  });
  // "today" marker
  let marker='';
  if(sp && sp.idx>=0 && sp.idx<total){ const x=((sp.idx+0.5)/total)*W;
    marker=`<line x1="${x.toFixed(1)}" y1="6" x2="${x.toFixed(1)}" y2="40" stroke="#fff" stroke-width="2"/>
      <circle cx="${x.toFixed(1)}" cy="6" r="3" fill="#fff"/>`; }
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:${H}px">${segs}${marker}</svg>`;
}

/* weekly load ramp: target bars colored by phase, deload dimmed,
   current week outlined, CTL projection overlaid, race marker */
function loadRampChart(p){
  const weeks=p.weeks; const n=weeks.length;
  const W=760,H=220,padL=34,padR=12,padT=16,padB=30;
  const vmax=Math.max(...weeks.map(w=>w.target),1);
  const bw=(W-padL-padR)/n;
  const curWk=weekKey(todayISO());
  // CTL projection (weekly) if available
  let ctlSeries=null, ctlMax=1;
  try{ const pr=projectPlanPMC(); if(pr&&pr.proj.length){ ctlSeries=weeks.map((w,i)=>{ const day=Math.min(pr.proj.length-1,(i+1)*7-1); return pr.proj[day]?pr.proj[day].ctl:0; }); ctlMax=Math.max(...ctlSeries,1); } }catch(e){}
  let bars='';
  weeks.forEach((w,i)=>{ const h=(w.target/vmax)*(H-padT-padB); const x=padL+i*bw;
    const cur=w.start===curWk;
    bars+=`<rect x="${(x+bw*0.14).toFixed(1)}" y="${(H-padB-h).toFixed(1)}" width="${(bw*0.72).toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" rx="3"
      fill="${w.phaseCol}" opacity="${w.deload?0.4:(cur?1:0.72)}" ${cur?'stroke="#fff" stroke-width="1.5"':''}/>`;
    if(i%Math.ceil(n/12)===0||cur) bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-16}" fill="#5E6A82" font-size="9" text-anchor="middle" font-family="IBM Plex Mono">${w.n}</text>`;
  });
  // race marker
  bars+=`<text x="${(padL+(n-0.5)*bw).toFixed(1)}" y="${H-4}" fill="#FF6E5B" font-size="9.5" text-anchor="middle">🏁</text>`;
  let ctlPath='';
  if(ctlSeries){ const Y=v=>padT+(1-v/ctlMax)*(H-padT-padB);
    ctlSeries.forEach((v,i)=>{ const x=padL+(i+0.5)*bw; ctlPath+=(i?'L':'M')+x.toFixed(1)+' '+Y(v).toFixed(1)+' '; });
    ctlPath=`<path d="${ctlPath}" fill="none" stroke="#E8ECF4" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.8"/>`; }
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:${H}px">${bars}${ctlPath}</svg>
    <div class="legend" style="margin-top:6px">
      <span><span class="dot" style="background:#33E1C4"></span>ベース</span>
      <span><span class="dot" style="background:#8C7DFF"></span>ビルド</span>
      <span><span class="dot" style="background:#F5B23E"></span>ピーク</span>
      <span><span class="dot" style="background:#FF6E5B"></span>テーパー</span>
      ${ctlSeries?`<span><span class="dot" style="background:#E8ECF4"></span>CTL予測</span>`:''}</div>`;
}

/* ---- adapt the season to current fitness & actual training ---- */
function adaptSeason(){
  if(!DB.plan) return;
  const before={peak:DB.plan.peak, startVol:DB.plan.startVol};
  DB.plan=generatePlan(DB.plan.race);
  const saved=save();
  return {before, after:{peak:DB.plan.peak, startVol:DB.plan.startVol},saved};
}

      <span class="mono" style="font-size:26px;color:var(--teal);font-weight:700">${daysLeft>=0?daysLeft+"<small style='font-size:12px;color:var(--ink-2)'> 日前</small>":'終了'}</span></div>

    ${loadRampChart(p)}

    <div class="inputs" style="margin-top:14px">
      <div class="row"><span class="l">進捗</span><span class="r">${sp?`第${Math.max(1,(sp.idx<0?0:sp.idx)+1)}週 / 全${sp.total}週`:'—'}</span></div>
      <div class="row"><span class="l">開始→ピーク週間距離</span><span class="r mono">${p.startVol} → ${p.peak} km</span></div>
      ${pw?`<div class="row"><span class="l">今週のフェーズ</span><span class="r">${pw.phase} · 目標 ${pw.target}km</span></div>`:''}

    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">

function wireSeason(){

    notifySaveResult(!!(r&&r.saved),r&&r.after.peak!==r.before.peak?`ピーク距離を ${r.before.peak}→${r.after.peak}km に更新`:'現在の走力で再設計しました'); };

/* ============================================================
   RUNOS 2.1 — EXECUTION LAYER
   Turns strategy (Season) into executable sessions everywhere:
   · structuredWorkout(): any prescription → warmup/main/cooldown
     steps with personal paces, HR zones, env-adjusted targets
   · openWorkoutCard(): tap any key session → full card in the
     drawer (steps + W' forecast + shoe + fueling)
   · Week Ahead becomes the season's live current-week slice
   · Today gets an executable "今日のワークアウト" with detail
   · weekCompliance(): prescribed vs executed, shown in Season
   · first-run onboarding for empty datasets
   ============================================================ */

let WA_LAST=null; // last computed week-ahead (for card lookup)

/* ---- build a structured session from a spec {kind, km} ---- */
function structuredWorkout(spec){
  const tp=vdotPaces(); if(!tp) return null;
  const zones=(typeof personalZones==='function')?personalZones():null;
  const env=(typeof envAdjust==='function')?envAdjust():null;
  const adj=s=> env&&env.factor>0 ? Math.round(s*(1+env.factor)) : s;
  const hrFor=k=>{ if(!zones) return null; const map={E:'Z2',M:'Z3',T:'Z4',I:'Z5',R:'Z5'}[k];
    const z=zones.hrZones.find(x=>x.z===map); return z?`${z.lo}–${z.hi}`:null; };
  const P=(k)=>({pace:adj(tp[k].mid), hr:hrFor(k), key:k});
  const kind=spec.kind||'easy';
  const km=spec.km||0;
  let title,steps=[],focus,wSpec=null;
  const wu=(min)=>({name:'ウォームアップ',dur:min+'分',pace:paceStr(adj(tp.E.hi))+'〜'+paceStr(adj(tp.E.mid))+'/km',hr:hrFor('E'),note:'徐々にペースを上げ、最後に流し2〜3本'});
  const cd=(min)=>({name:'クールダウン',dur:min+'分',pace:paceStr(adj(tp.E.hi))+'/km〜',hr:hrFor('E'),note:'心拍を落ち着かせて終了'});
  if(kind==='interval'||kind==='sharpen'){
    const reps=kind==='sharpen'?4:5, workMin=kind==='sharpen'?2:3;
    title=kind==='sharpen'?`キレ出し ${reps}×${workMin}分 @I`:`インターバル ${reps}×${workMin}分 @I`;
    focus='VO2max（有酸素の天井）を直接刺激。つなぎは完全に緩めず動き続ける。';
    steps=[wu(15),
      {name:`メイン ${reps}本`,dur:`${workMin}分 × ${reps}`,pace:paceStr(P('I').pace)+'/km',hr:P('I').hr,note:`つなぎ: ${workMin}分ジョグ。最後の1本まで同じペースを守る`},
      cd(10)];
    wSpec={reps,workSec:workMin*60,workPaceKey:'I',restSec:workMin*60,restPaceKey:'E'};
  } else if(kind==='tempo'){
    title='テンポ走 20〜30分 @T'; focus='乳酸閾値を押し上げる。「快適にきつい」を保ち、上げすぎない。';
    steps=[wu(15),
      {name:'メイン',dur:'20〜30分',pace:paceStr(P('T').pace)+'/km',hr:P('T').hr,note:'会話は不可、でも制御可能な強度。ビルドせず一定で'},
      cd(10)];
    wSpec={reps:1,workSec:25*60,workPaceKey:'T',restSec:0,restPaceKey:'E'};
  } else if(kind==='long'){
    const lk=km||16;
    title=`ロング走 ${lk}km`; focus='持久基盤・脂質代謝・距離耐性。時間をかけることが刺激。';
    const half=Math.round(lk*0.65), fin=lk-half;
    steps=[{name:'前半',dur:`${half}km`,pace:paceStr(adj(tp.E.mid))+'/km',hr:hrFor('E'),note:'楽に。補給と給水をリズム化'},
      {name:'後半',dur:`${fin}km`,pace:paceStr(adj(tp.E.lo))+'〜'+paceStr(adj(tp.M.mid))+'/km',hr:hrFor('M'),note:'余裕があればMPに近づける（無理はしない）'}];
    const fuel=(typeof fuelingPlan==='function')?fuelingPlan(lk,'long'):null;
    if(fuel&&fuel.need) steps.push({name:'補給',dur:'走行中',pace:'—',hr:null,note:fuel.note});
  } else if(kind==='race'){
    title=`レース特異的 ${km||8}km`; focus='レースの動き・ペース感覚を体に入れる。';
    steps=[wu(15),
      {name:'メイン',dur:`${km||8}km`,pace:paceStr(P('M').pace)+'/km',hr:P('M').hr,note:'目標レースペース。フォームと呼吸のリズムを確認'},
      cd(10)];
  } else if(kind==='strides'){
    title='ウィンドスプリント 6〜8×20秒'; focus='神経筋・走効率。速いが全力ではない、フォーム重視。';
    steps=[{name:'イージー走',dur:'30〜40分',pace:paceStr(adj(tp.E.mid))+'/km',hr:hrFor('E'),note:'通常のイージー走'},
      {name:'流し',dur:'20秒 × 6〜8',pace:paceStr(P('R').pace)+'/km 前後',hr:null,note:'9割の力感。間は60〜90秒歩き/ジョグで完全回復'}];
    wSpec={reps:7,workSec:20,workPaceKey:'R',restSec:75,restPaceKey:'walk'};
  } else if(kind==='recovery'){
    title=`回復ジョグ ${km||5}km`; focus='血流を促し回復を早める。遅いほど良い。';
    steps=[{name:'全体',dur:`${km||5}km`,pace:paceStr(adj(tp.E.hi))+'/km より遅く',hr:hrFor('E'),note:'鼻呼吸で完結する強度。物足りないくらいで正解'}];
  } else { // easy
    title=`イージー ${km||8}km`; focus='有酸素土台。練習の80%はここ。';
    steps=[{name:'全体',dur:`${km||8}km`,pace:paceStr(adj(tp.E.hi))+'〜'+paceStr(adj(tp.E.lo))+'/km',hr:hrFor('E'),note:'会話ができるペース。速くなりすぎに注意'}];
  }
  // W' forecast if applicable
  let wUse=null;
  if(wSpec){ try{ const saved=IVDESIGN; IVDESIGN={...wSpec}; const r=ivCompute(IVDESIGN); IVDESIGN=saved;
    if(r&&r.w) wUse={usedPct:r.w.usedPct,verdict:r.w.verdict,col:r.w.col}; }catch(e){} }
  const shoeRec=(typeof recommendShoe==='function')?recommendShoe(kind==='sharpen'?'interval':kind==='strides'?'easy':kind):null;
  const envNote=(env&&env.factor>0.015)?`環境補正 +${round(env.factor*100,1)}%（${env.temp}℃/${env.humidity}%）を各ペースに反映済み`:null;
  return {title,kind,focus,steps,wUse,shoeRec,envNote};
}

/* ---- weekly compliance: prescribed vs executed ---- */
function weekCompliance(){
  const pw=currentPlanWeek(); if(!pw) return null;
  const wk=weekKey(todayISO());
  const acts=DB.activities.filter(a=>weekKey(a.date)===wk);
  const doneKm=acts.reduce((s,a)=>s+a.km,0);
  const kmPct=clamp(doneKm/Math.max(1,pw.target)*100,0,140);
  // key workout matching by kind family
  const fam=t=>({interval:'q',tempo:'q',race:'q',sharpen:'q',long:'long',strides:'strides'}[t]||t);
  const prescribed=(pw.workouts||[]).map(w=>({kind:w.kind,fam:fam(w.kind),label:w.label,done:false}));
  acts.forEach(a=>{ const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
    const f=fam(cat)|| (cat==='long'?'long':null);
    const hit=prescribed.find(p=>!p.done && (p.fam===f || (p.fam==='long'&&a.km>=14)));
    if(hit) hit.done=true; });
  const keyDone=prescribed.filter(p=>p.done).length;
  // remaining days in the week
  const dow=(new Date(todayISO()+'T00:00').getDay()+6)%7; // Mon0..Sun6
  const daysLeft=6-dow;
  return {doneKm,target:pw.target,kmPct,prescribed,keyDone,keyTotal:prescribed.length,daysLeft,phase:pw.phase};
}
