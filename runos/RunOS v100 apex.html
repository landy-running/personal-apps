/* ---- season-long compliance history ---- */
function seasonCompliance(){
  const p=DB.plan; if(!p) return null;
  const curWk=weekKey(todayISO());
  const actual={};
  DB.activities.forEach(a=>{ const k=weekKey(a.date);
    (actual[k]=actual[k]||{km:0,types:{},long:0});
    actual[k].km+=a.km; actual[k].long=Math.max(actual[k].long,a.km);
    const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
    actual[k].types[cat]=(actual[k].types[cat]||0)+1; });
  const rows=[];
  p.weeks.forEach(w=>{ if(w.start>=curWk) return;
    const a=actual[w.start]||{km:0,types:{},long:0};
    const volR=w.target>0? a.km/w.target : 0;
    let keyHit=false;
    if(w.phaseKey==='base') keyHit = a.long>=Math.max(8,w.target*0.25);
    else if(w.phaseKey==='build') keyHit = (a.types.tempo||0)>0 || (a.types.interval||0)>0 || a.long>=w.target*0.28;
    else if(w.phaseKey==='peak') keyHit = (a.types.interval||0)>0 || (a.types.tempo||0)>0 || (a.types.race||0)>0;
    else keyHit = true;
    rows.push({n:w.n,start:w.start,phase:w.phase,phaseCol:w.phaseCol||'#33E1C4',target:w.target,actual:a.km,volR,keyHit,deload:w.deload}); });
  if(!rows.length) return {rows,score:null};
  const volScore=clamp(rows.reduce((s,r)=>s+clamp(r.volR,0,1.1),0)/rows.length,0,1);
  const keyScore=rows.filter(r=>r.keyHit).length/rows.length;
  const score=Math.round(clamp(volScore*0.6+keyScore*0.4,0,1)*100);
  return {rows,score,volScore,keyScore};
}
function complianceChart(comp){
  const rows=comp.rows.slice(-12); if(!rows.length) return '';
  const W=760,H=170,padL=10,padR=8,padT=12,padB=26;
  const vmax=Math.max(...rows.map(r=>Math.max(r.target,r.actual)),1);
  const bw=(W-padL-padR)/rows.length;
  let out='';
  rows.forEach((r,i)=>{ const x=padL+i*bw;
    const ht=(r.target/vmax)*(H-padT-padB), ha=(r.actual/vmax)*(H-padT-padB);
    const col=r.volR>=0.85&&r.volR<=1.25?'#33E1C4':r.volR>=0.6?'#F5B23E':'#FF6E5B';
    out+=`<rect x="${(x+bw*0.14).toFixed(1)}" y="${(H-padB-ht).toFixed(1)}" width="${(bw*0.72).toFixed(1)}" height="${Math.max(1,ht).toFixed(1)}" rx="3" fill="none" stroke="${r.phaseCol}" stroke-width="1.3" opacity="0.55"/>`;
    out+=`<rect x="${(x+bw*0.24).toFixed(1)}" y="${(H-padB-ha).toFixed(1)}" width="${(bw*0.52).toFixed(1)}" height="${Math.max(1,ha).toFixed(1)}" rx="3" fill="${col}" opacity="0.9"/>`;
    out+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-12}" fill="${r.keyHit?'#33E1C4':'#5E6A82'}" font-size="10" text-anchor="middle">${r.keyHit?'●':'○'}</text>`;
    out+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-1}" fill="#5E6A82" font-size="8.5" text-anchor="middle" font-family="IBM Plex Mono">${r.n}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:170px">${out}</svg>
    <div class="legend" style="margin-top:6px"><span>枠=計画 / 塗り=実績</span><span style="color:#33E1C4">● キー練習 実行</span><span>○ 未実行</span></div>`;
}

/* ---- race readiness composite ---- */
function raceReadiness(){
  const p=DB.plan; if(!p) return null;
  const parts=[];
  const agg=weeklyAgg(5).slice(0,4);
  const avg=agg.length? agg.reduce((s,w)=>s+w.km,0)/agg.length : 0;
  parts.push({k:'走行量', v:clamp(avg/(p.peak*0.85),0,1), note:`直近4週平均 ${round(avg,0)}km / ピーク${p.peak}km`});
  const req={'5k':10,'10k':14,'half':18,'full':30}[p.race.dist]||16;
  const longest=Math.max(0,...DB.activities.filter(a=>dayDiff(a.date,todayISO())<=42).map(a=>a.km));
  parts.push({k:'ロング走', v:clamp(longest/req,0,1), note:`直近6週最長 ${round(longest,0)}km / 目安${req}km`});
  const comp=seasonCompliance();
  const q=(comp&&comp.rows.length)?comp.keyScore:0.5;
  parts.push({k:'キー練習', v:clamp(q,0,1), note:(comp&&comp.rows.length)?`実行率 ${Math.round(q*100)}%`:'計画開始前'});
  let fr=0.5, frNote='予測データ不足';
  try{ const pr=projectPlanPMC(); if(pr){ const fin=pr.proj[pr.proj.length-1]; const t=fin.tsb;
    fr = (t>=5&&t<=25)?1 : t>=-5?0.7 : t>25?0.6 : 0.3;
    frNote=`当日TSB予測 ${t>=0?'+':''}${round(t,0)}`; } }catch(e){}
  parts.push({k:'当日の鮮度', v:fr, note:frNote});
  const w=[0.30,0.25,0.25,0.20];
  const score=Math.round(parts.reduce((s,pt,i)=>s+pt.v*w[i],0)*100);
  const verdict=score>=80?'仕上がり良好':score>=60?'順調':score>=40?'発展途上':'要強化';
  return {score,parts,verdict};
}

/* ============================================================
   RUNOS 2.2 — PERFORMANCE ENGINE
   · perfProfile(): aggregated speed–duration curve, 90d vs
     all-time, phenotype classification, gain/loss analysis
   · prProgression(): weekly best-effort timeline + running PR
   ============================================================ */

const PP_DURS=[10,30,60,120,300,600,1200,1800,3600];
function aggSpdCurve(cutISO){
  const best={};
  DB.activities.forEach(a=>{ if(!a.spdCurve) return; if(cutISO && a.date<cutISO) return;
    PP_DURS.forEach(t=>{ const v=a.spdCurve[t]; if(v!=null&&(best[t]==null||v>best[t])) best[t]=v; }); });
  return best;
}
function perfProfile(){
  const cut=new Date(todayISO()+'T00:00'); cut.setDate(cut.getDate()-90); const cutISO=isoLocal(cut);
  const recent=aggSpdCurve(cutISO), all=aggSpdCurve(null);
  const has=PP_DURS.filter(t=>all[t]!=null);
  if(has.length<4) return null;
  const g=(o,t)=>o[t]!=null?o[t]:null;
  // indices from all-time (capability) and recent (current)
  const idx=o=>({ v60:g(o,60), v300:g(o,300), v1200:g(o,1200),
    endur:(g(o,1800)||g(o,1200))&&g(o,300)? (g(o,1800)||g(o,1200))/g(o,300) : null,
    ratio:g(o,60)&&g(o,1200)? g(o,60)/g(o,1200) : null });
  const cap=idx(all), cur=idx(recent);
  let pheno=null;
  if(cap.ratio!=null){ pheno = cap.ratio>=1.32? {key:'speed',label:'スピード型',col:'#FF6E5B',
      note:'短時間の出力が相対的に強いタイプ。持久側(閾値・ロング)を積むと大きく伸びます。'}
    : cap.ratio>=1.16? {key:'balanced',label:'バランス型',col:'#F5B23E',
      note:'速度域の偏りが小さい万能型。局面に応じて弱点側を狙い撃ちできます。'}
    : {key:'diesel',label:'ディーゼル型',col:'#33E1C4',
      note:'持久が相対的に強いタイプ。スピード・神経筋刺激(流し/レペ)が伸びしろです。'}; }
  // gains: recent vs all-time per anchor durations
  const gains=PP_DURS.filter(t=>all[t]!=null&&recent[t]!=null).map(t=>({t, pct:(recent[t]/all[t]-1)*100}));
  const bestGain=gains.length?[...gains].sort((a,b)=>b.pct-a.pct)[0]:null;
  const worstGap=gains.length?[...gains].sort((a,b)=>a.pct-b.pct)[0]:null;
  return {recent, all, cap, cur, pheno, gains, bestGain, worstGap, samples:has.length};
}
function ppDurLabel(t){ return t<60? t+'秒' : t<3600? (t/60)+'分' : (t/3600)+'時間'; }
function perfProfileChart(pp){
  const W=760,H=230,padL=44,padR=12,padT=14,padB=30;
  const durs=PP_DURS.filter(t=>pp.all[t]!=null);
  const lx=t=>Math.log(t);
  const x0=lx(durs[0]), x1=lx(durs[durs.length-1]);
  const X=t=>padL+(lx(t)-x0)/(x1-x0)*(W-padL-padR);
  const vs=[...durs.map(t=>pp.all[t]), ...durs.filter(t=>pp.recent[t]!=null).map(t=>pp.recent[t])];
  const lo=Math.min(...vs)*0.95, hi=Math.max(...vs)*1.04;
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  const line=(o,col,wd,op)=>{ let d=''; let started=false;
    durs.forEach(t=>{ if(o[t]==null) return; d+=(started?'L':'M')+X(t).toFixed(1)+' '+Y(o[t]).toFixed(1)+' '; started=true; });
    return `<path d="${d}" fill="none" stroke="${col}" stroke-width="${wd}" opacity="${op}"/>`; };
  let grid='',labels='';
  durs.forEach(t=>{ labels+=`<text x="${X(t).toFixed(1)}" y="${H-10}" fill="#5E6A82" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono">${ppDurLabel(t)}</text>`; });
  for(let gI=0;gI<=3;gI++){ const v=lo+(hi-lo)*gI/3; const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#1B2436"/>
      <text x="4" y="${(y+3).toFixed(1)}" fill="#5E6A82" font-size="9.5" font-family="IBM Plex Mono">${paceStr(1000/v)}</text>`; }
  let dots=''; durs.forEach(t=>{ if(pp.recent[t]!=null) dots+=`<circle cx="${X(t).toFixed(1)}" cy="${Y(pp.recent[t]).toFixed(1)}" r="2.8" fill="#33E1C4"/>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:230px">${grid}${labels}
    ${line(pp.all,'#5E6A82',1.8,0.85)}${line(pp.recent,'#33E1C4',2.4,1)}${dots}</svg>
    <div class="legend" style="margin-top:6px"><span><span class="dot" style="background:#33E1C4"></span>直近90日</span>
      <span><span class="dot" style="background:#5E6A82"></span>全期間ベスト</span>
      <span style="color:var(--ink-3)">縦軸=ペース/km（上ほど速い）· 横軸=持続時間(対数)</span></div>`;
}

/* ---- PR progression timeline ---- */
let PRPROG={d:5000};
function prProgression(D,weeks){
  weeks=weeks||26;
  const end=new Date(weekKey(todayISO())+'T00:00');
  const out=[]; let runningPR=null;
  // pre-index weekly bests
  const wkBest={};
  DB.activities.forEach(a=>{ if(!a.bests||a.bests[D]==null) return; const k=weekKey(a.date);
    if(wkBest[k]==null||a.bests[D]<wkBest[k]) wkBest[k]=a.bests[D]; });
  // seed running PR with anything older than window
  const startISO=(()=>{const d=new Date(end);d.setDate(d.getDate()-(weeks-1)*7);return isoLocal(d);})();
  DB.activities.forEach(a=>{ if(!a.bests||a.bests[D]==null) return;
    if(a.date<startISO && (runningPR==null||a.bests[D]<runningPR)) runningPR=a.bests[D]; });
  for(let i=weeks-1;i>=0;i--){ const d=new Date(end); d.setDate(d.getDate()-i*7);
    const k=isoLocal(d); const wb=wkBest[k]!=null?wkBest[k]:null;
    if(wb!=null&&(runningPR==null||wb<runningPR)) runningPR=wb;
    out.push({key:k,label:`${d.getMonth()+1}/${d.getDate()}`,best:wb,pr:runningPR}); }
  const n=out.filter(p=>p.best!=null).length;
  return {points:out, samples:n, D};
}
function prProgressionChart(pg){
  const pts=pg.points; const have=pts.filter(p=>p.best!=null||p.pr!=null);
  if(!have.length) return '<div class="empty">この距離のベストエフォートがまだありません</div>';
  const W=760,H=210,padL=48,padR=10,padT=14,padB=26;
  const vals=[...pts.filter(p=>p.best!=null).map(p=>p.best),...pts.filter(p=>p.pr!=null).map(p=>p.pr)];
  const lo=Math.min(...vals)*0.985, hi=Math.max(...vals)*1.015;
  const X=i=>padL+(i/(pts.length-1))*(W-padL-padR);
  const Y=v=>padT+((v-lo)/(hi-lo))*(H-padT-padB); // faster (smaller) = higher
  let prPath='', started=false;
  pts.forEach((p,i)=>{ if(p.pr==null) return; prPath+=(started?'L':'M')+X(i).toFixed(1)+' '+Y(p.pr).toFixed(1)+' '; started=true; });
  let dots=''; pts.forEach((p,i)=>{ if(p.best!=null) dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.best).toFixed(1)}" r="3" fill="${p.best<=p.pr?'#F5B23E':'#33E1C4'}" opacity="${p.best<=p.pr?1:0.7}"/>`; });
  let grid=''; for(let g=0;g<=3;g++){ const v=lo+(hi-lo)*g/3; const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#1B2436"/>
      <text x="4" y="${(y+3).toFixed(1)}" fill="#5E6A82" font-size="10" font-family="IBM Plex Mono">${hms(v)}</text>`; }
  let labels=''; pts.forEach((p,i)=>{ if(i%Math.ceil(pts.length/8)===0) labels+=`<text x="${X(i).toFixed(1)}" y="${H-8}" fill="#5E6A82" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono">${p.label}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:210px">${grid}${labels}
    <path d="${prPath}" fill="none" stroke="#F5B23E" stroke-width="2" stroke-dasharray="1 0"/>${dots}</svg>
    <div class="legend" style="margin-top:6px"><span><span class="dot" style="background:#33E1C4"></span>週ベスト</span>
      <span><span class="dot" style="background:#F5B23E"></span>PRライン(更新点は金)</span><span style="color:var(--ink-3)">上ほど速い</span></div>`;
}
function prProgressionCard(){
  const pg=prProgression(PRPROG.d,26);
  const btn=(d,l)=>`<button class="tg ${PRPROG.d===d?'on':''}" data-prd="${d}">${l}</button>`;
  return `<div class="card gb" data-gb="prprog" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">

    <div class="hint" style="margin:8px 0 12px">毎週の実測ベストエフォート(●)と、自己ベストの更新ライン。トレーニングの成果が「記録」としていつ現れたかを追跡します。</div>
    ${prProgressionChart(pg)}</div>`;

const WX_CODE={0:'快晴',1:'晴れ',2:'晴れ時々曇り',3:'曇り',45:'霧',48:'霧氷',51:'霧雨',53:'霧雨',55:'霧雨',
  61:'小雨',63:'雨',65:'大雨',66:'着氷性の雨',67:'着氷性の雨',71:'小雪',73:'雪',75:'大雪',77:'霧雪',
  80:'にわか雨',81:'にわか雨',82:'激しいにわか雨',85:'にわか雪',86:'にわか雪',95:'雷雨',96:'雷雨',99:'激しい雷雨'};
function wxLabel(code){ return WX_CODE[code]||'—'; }
function wxIsWet(code){ return code>=51; }

async function fetchWeatherNow(){
  const env=DB.env||{};
  const lat=env.lat, lon=env.lon;
  if(lat==null||lon==null) throw new Error('位置が未設定です（設定→環境で「現在地を保存」）');
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`;
  const res=await fetch(url); if(!res.ok) throw new Error('取得失敗 '+res.status);
  const j=await res.json(); const c=j.current||{};
  DB.env={...DB.env, temp:Math.round(c.temperature_2m*10)/10, humidity:Math.round(c.relative_humidity_2m),
    wcode:c.weather_code, wind:c.wind_speed_10m!=null?Math.round(c.wind_speed_10m*10)/10:null,
    fetchedAt:new Date().toISOString()};
  if(!save()) throw new Error(saveFailureText());
  return DB.env;
}
function saveGeo(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation) return reject(new Error('この環境では位置情報が使えません'));
    navigator.geolocation.getCurrentPosition(pos=>{
      DB.env={...DB.env, lat:Math.round(pos.coords.latitude*1000)/1000, lon:Math.round(pos.coords.longitude*1000)/1000};
      if(save()) resolve(DB.env); else reject(new Error(saveFailureText()));
    }, err=>reject(new Error('位置情報を取得できませんでした')), {timeout:8000,maximumAge:600000});
  });
}
function wxStale(){ const f=DB.env&&DB.env.fetchedAt; if(!f) return true;
  return (Date.now()-new Date(f).getTime())>3*3600*1000; }

/* weather → menu adaptation notes */

/* ============================================================
   INTEGRATIONS — adapter registry (Strava-ready architecture)
   Every source funnels through normalizeActivity() into the
   same DB.activities shape, so a future OAuth sync only needs
   a new adapter + token flow — no UI or analytics changes.
   ============================================================ */
const IMPORT_ADAPTERS={
  fit:{ label:'FITファイル', kind:'file', ready:true },
  strava_export:{ label:'Strava一括エクスポート (activities.csv)', kind:'file', ready:true },
  strava_api:{ label:'Strava API 自動同期', kind:'oauth', ready:false,
    note:'OAuth認証にはリダイレクト先が必要なため、単一HTMLでは中継(Cloudflare Worker等)を用意した時点で有効化します。データ形状は既に対応済み。' }
};
function normalizeActivity(n){
  // canonical minimal shape shared by all adapters
  return { id:n.id||('act_'+Date.now().toString(36)+'_'+Math.floor(Math.random()*1e5).toString(36)),
    date:n.date, type:n.type||'easy', km:Math.round(n.km*100)/100, durSec:Math.round(n.durSec),
    hrAvg:n.hrAvg||null, hrMax:n.hrMax||null, elevM:n.elevM||null, cadence:n.cadence||null,
    note:n.note||'', source:n.source||'manual' };
}
/* tolerant CSV row parser (handles quoted fields with commas) */
function csvParse(text){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else if(ch==='"') q=true;
    else if(ch===','){ row.push(cur); cur=''; }
    else if(ch==='\n'||ch==='\r'){ if(cur!==''||row.length){ row.push(cur); rows.push(row); row=[]; cur=''; } if(ch==='\r'&&text[i+1]==='\n')i++; }
    else cur+=ch; }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
const STRAVA_TYPE_MAP={'Run':'easy','Race':'race','Workout':'interval','Long Run':'long','ランニング':'easy','レース':'race'};
function importStravaCSV(text){
  const rows=csvParse(text); if(rows.length<2) return {added:0,skipped:0,error:'CSVを解釈できませんでした'};
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const col=name=>head.findIndex(h=>h===name);
  const iDate=col('activity date'), iType=col('activity type'), iDist=col('distance'),
        iMov=col('moving time')>=0?col('moving time'):col('elapsed time'),
        iHr=col('average heart rate'), iHrM=col('max heart rate'), iElev=col('elevation gain'),
        iName=col('activity name');
  if(iDate<0||iDist<0) return {added:0,skipped:0,error:'Stravaのactivities.csvではないようです（Activity Date/Distance列が見つかりません）'};
  const existing=new Set(DB.activities.map(a=>a.date+'|'+Math.round(a.km*10)));
  let added=0,skipped=0;
  rows.slice(1).forEach(r=>{ try{
    const typeRaw=iType>=0?r[iType]:'Run';
    if(iType>=0 && !/run|ラン/i.test(typeRaw)) { skipped++; return; }   // runs only
    const d=new Date(r[iDate]); if(isNaN(d)) { skipped++; return; }
    const date=isoLocal(d);
    let km=parseFloat(String(r[iDist]).replace(/,/g,'')); if(!isFinite(km)||km<=0){skipped++;return;}
    if(km>200) km=km/1000;                       // meters → km safeguard
    const durSec=parseFloat(r[iMov])||0; if(durSec<60){skipped++;return;}
    const key=date+'|'+Math.round(km*10);
    if(existing.has(key)){ skipped++; return; }
    existing.add(key);
    const type=STRAVA_TYPE_MAP[typeRaw]|| (km>=15?'long':'easy');
    DB.activities.push(normalizeActivity({date,type,km,durSec,
      hrAvg:iHr>=0?Math.round(parseFloat(r[iHr]))||null:null,
      hrMax:iHrM>=0?Math.round(parseFloat(r[iHrM]))||null:null,
      elevM:iElev>=0?Math.round(parseFloat(r[iElev]))||null:null,
      note:iName>=0?r[iName]:'', source:'strava_export'}));
    added++;
  }catch(e){ skipped++; } });
  DB.activities.sort((a,b)=>a.date<b.date?-1:1);
  DB.integrations=DB.integrations||{}; DB.integrations.strava={...(DB.integrations.strava||{}), lastImport:todayISO(), imported:( (DB.integrations.strava&&DB.integrations.strava.imported)||0)+added};
  const saved=save();
  return {added,skipped,saved};
}

/* ============================================================
   RUNOS 2.5 — ADAPTIVE PERSONALIZATION ENGINE
   Learns from THIS athlete's own history — no population norms:
   · personalResponse(): which stimulus actually moved YOUR
     fitness (weekly dose → ΔeVO2max two weeks later, per-stimulus
     least-squares slope + correlation, honest confidence)
   · recoveryFingerprint(): measured days-to-recover after each
     hard type (EF returns to personal baseline) → feeds the
     scheduler's quality spacing instead of a fixed 48h
   · coachNote(): every morning, a 2–3 sentence personal note
     synthesizing readiness, subjective check-in, weather, phase,
     yesterday, and today's prescription.
   ============================================================ */

function efOf(a){ // economy proxy: speed (m/min) per heartbeat
  if(!a.hrAvg||!a.durSec||!a.km) return null;
  const v=(a.km*1000)/(a.durSec/60); return v/a.hrAvg;
}

function personalResponse(){
  const N=20;
  const weeks=weeklyAgg(N); if(!weeks||weeks.length<8) return null;
  // per-week stimulus features
  const feat={}; weeks.forEach(w=>feat[w.key]={total:0,easy:0,qual:0,long:0});
  DB.activities.forEach(a=>{ const k=weekKey(a.date); if(!feat[k]) return;
    const cat=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
    feat[k].total+=a.km;
    if(cat==='easy'||cat==='recovery') feat[k].easy+=a.km;
    if(cat==='tempo'||cat==='interval') feat[k].qual+=1;
    if(cat==='long'||a.km>=14) feat[k].long=Math.max(feat[k].long,a.km); });
  // response: eVO2max change from end of week to +2 weeks
  const rows=[];
  for(let i=0;i<weeks.length-2;i++){
    const wk=weeks[i]; const f=feat[wk.key];
    const d0=new Date(wk.key+'T00:00'); d0.setDate(d0.getDate()+6);
    const d2=new Date(d0); d2.setDate(d2.getDate()+14);
    const e0=effectiveVO2max(isoLocal(d0)).value, e2=effectiveVO2max(isoLocal(d2)).value;
    if(e0>0&&e2>0) rows.push({...f, dv:e2-e0});
  }
  if(rows.length<6) return null;
  const stats=(key)=>{
    const xs=rows.map(r=>r[key]), ys=rows.map(r=>r.dv);
    const n=xs.length, mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
    let sxy=0,sxx=0,syy=0;
    for(let i=0;i<n;i++){ const dx=xs[i]-mx, dy=ys[i]-my; sxy+=dx*dy; sxx+=dx*dx; syy+=dy*dy; }
    if(sxx<1e-6||syy<1e-6) return null;
    const r=sxy/Math.sqrt(sxx*syy), slope=sxy/sxx;
    return {r,slope,n,spread:Math.sqrt(sxx/n)};
  };
  const defs=[
    {key:'qual', label:'質セッション', unit:'+1本/週', scale:1, why:'テンポ/インターバルの回数'},
    {key:'long', label:'ロング走', unit:'+5km', scale:5, why:'週内最長走の距離'},
    {key:'total',label:'総距離', unit:'+10km/週', scale:10, why:'週間走行距離'},
    {key:'easy', label:'イージー量', unit:'+10km/週', scale:10, why:'低強度の量'},
  ];
  const items=defs.map(d=>{ const s=stats(d.key); if(!s) return null;
    const effect=s.slope*d.scale; // ΔeVO2max per unit, over 2 weeks
    const conf = (Math.abs(s.r)>=0.45&&s.n>=10)?'高' : (Math.abs(s.r)>=0.3&&s.n>=8)?'中' : '低';
    return {...d, r:s.r, effect, n:s.n, conf};
  }).filter(Boolean).sort((a,b)=>b.effect-a.effect);
  if(!items.length) return null;
  try{ const ind=ridgeResponse(rows,['qual','long','total','easy']);
    if(ind) items.forEach(i=>{ i.indep=ind[i.key]!=null? ind[i.key]*i.scale : null; }); }catch(e){}
  const top=items.find(i=>i.conf!=='低'&&i.effect>0)||items[0];
  return {items, top, n:rows.length, ridge:items.some(i=>i.indep!=null)};
}

function recoveryFingerprint(){
  const easies=DB.activities.filter(a=>{
    const c=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
    return (c==='easy'||c==='recovery')&&efOf(a)!=null; });
  if(easies.length<6) return null;
  const efs=easies.map(efOf).sort((a,b)=>a-b);
  const baseEF=efs[Math.floor(efs.length/2)];
  const types=[['interval','インターバル'],['tempo','テンポ'],['long','ロング']];
  const out={};
  const sorted=[...DB.activities].sort((a,b)=>a.date<b.date?-1:1);
  types.forEach(([key,label])=>{
    const days=[];
    sorted.forEach((a,idx)=>{ const c=(()=>{try{return categoryV77(a).type}catch(e){return a.type}})();
      if(c!==key) return;
      for(let j=idx+1;j<sorted.length;j++){ const b=sorted[j];
        const dd=dayDiff(a.date,b.date); if(dd>5) break; if(dd<1) continue;
        const cb=(()=>{try{return categoryV77(b).type}catch(e){return b.type}})();
        if(cb!=='easy'&&cb!=='recovery') continue;
        const ef=efOf(b); if(ef==null) continue;
        if(ef>=baseEF*0.985){ days.push(dd); break; }
      } });
    if(days.length>=3){ days.sort((a,b)=>a-b);
      out[key]={label, medianDays:days[Math.floor(days.length/2)], n:days.length}; }
  });
  if(!Object.keys(out).length) return null;
  return {baseEF, types:out};
}
function personalQualityGapDays(){
  const rf=recoveryFingerprint();
  if(rf&&rf.types.interval) return clamp(rf.types.interval.medianDays,1.5,4);
  if(rf&&rf.types.tempo) return clamp(rf.types.tempo.medianDays,1.5,4);
  return 2; // default 48h
}

/* ---------- A) RACE DAY ENGINE ---------- */
function racePlan(){
  const p=DB.plan; if(!p||!p.race||!p.race.date) return null;
  const daysLeft=dayDiff(todayISO(),p.race.date); if(daysLeft<0) return null;
  const preds=(typeof racePredictICU==='function')?racePredictICU():null;
  const pr=preds?preds.find(r=>Math.abs(r.m-p.race.m)<1):null;
  const goalSec=p.race.goal?parseHMS(p.race.goal):null;
  const basisSec=goalSec||(pr?pr.blend:null); if(!basisSec) return null;
  const raceSec=Math.round(basisSec);
  const distKm=p.race.m/1000;
  const basePace=raceSec/distKm;
  const prof = p.race.m>=42000? [[5,2.2],[10,0.8],[20,0],[30,0],[35,-0.3],[distKm,-1.0]]
    : p.race.m>=21000? [[5,1.8],[10,0.3],[15,0],[18,-0.5],[distKm,-1.2]]
    : p.race.m>=9500?  [[3,1.5],[7,0],[distKm,-1.2]]
    : [[2,1.2],[4,0],[distKm,-1.5]];
  let segs=[]; let prev=0;
  prof.forEach(pt=>{ const to=Math.min(pt[0],distKm); const km=to-prev;
    if(km>0.05){ segs.push({from:prev,to,km,off:pt[1]}); prev=to; } });
  let t0=segs.reduce((s,g)=>s+g.km*basePace*(1+g.off/100),0);
  const k=raceSec/t0; let cum=0;
  segs=segs.map(g=>{ const pace=basePace*(1+g.off/100)*k; const segSec=g.km*pace; cum+=segSec;
    return {...g,pace,segSec,cumSec:cum}; });
  // W' budget check on the closing segment
  let wNote=null;
  try{ const cs=criticalSpeed();
    if(cs&&cs.dprime>=80){ const last=segs[segs.length-1]; const v=1000/last.pace;
      if(v>cs.cs){ const use=(v-cs.cs)*last.segSec;
        wNote=`終盤ペースはCS超え——W′を約${round(use,0)}m相当（残量${round(100-use/cs.dprime*100,0)}%）使う設計です。上げ幅はここが安全圏の上限。`; }
      else wNote='全区間がCS以下。W′は温存され、ラストスパートの自由度が残ります。'; } }catch(e){}
  // fueling timeline
  const fp=fuelingPlan(distKm, distKm>=15?'long':'race');
  const totalMin=raceSec/60; const fuelRows=[];
  if(fp&&fp.need){ let tm=20; while(tm<totalMin-12){ fuelRows.push({min:Math.round(tm),act:'ジェル1個（糖質20–25g）＋ひと口の水'}); tm+=25; }
    fuelRows.push({min:'—',act:`水分は給水所ごとに分割、合計 ~${fp.ml}ml 目安（暑熱時は増量）`}); }
  const e=envAdjust();
  const envLine=e.factor>=0.02?`現在の環境設定（${e.temp}℃/${e.humidity}%）だと実質 +${round(e.factor*100,1)}%。当日この条件なら ${hms(Math.round(raceSec*(1+e.factor)))} 相当が等価努力です。`:null;
  return {daysLeft,label:p.race.label,name:p.race.name,distKm,goalSec,
    predSec:pr?Math.round(pr.blend):null,predLo:pr?Math.round(pr.lo):null,predHi:pr?Math.round(pr.hi):null,
    basis:goalSec?'目標タイム':'現在の予測',raceSec,basePace,segs,wNote,fuelRows,envLine};
}

function injurySentinel(){

  let hrrDrop=null;
  try{ const hr=hrrTrend(8);
    if(hr.length>=4){ const last3=hr.slice(-3).map(p=>p.drop);
      const prior=hr.slice(0,-3).map(p=>p.drop);
      const med=a=>{const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];};
      hrrDrop=med(prior)-(last3.reduce((s,x)=>s+x,0)/last3.length); } }catch(e){}
  const cut=(()=>{const d=new Date(todayISO()+'T00:00');d.setDate(d.getDate()-3);return isoLocal(d);})();
  const soreHits=DB.wellness.filter(w=>w.date>=cut&&w.soreness!=null&&w.soreness>=4).length;
  const sig=[]; let score=0;
  if(risk){
    if(risk.mechanicalACWR>1.3){score+=28;sig.push({t:`脚部ACWR ${risk.mechanicalACWR.toFixed(2)}（機械的負荷の急増）`,w:'high'});}
    else if(risk.mechanicalACWR>1.15){score+=12;sig.push({t:`脚部ACWR ${risk.mechanicalACWR.toFixed(2)} やや高め`,w:'mid'});}
    if(risk.cardioACWR>1.45){score+=10;sig.push({t:'心肺負荷の急増',w:'mid'});}
  }
  if(ms&&isFinite(ms.monotony)&&ms.monotony>2){score+=16;sig.push({t:`単調性 ${ms.monotony.toFixed(1)}（似た負荷の反復——強弱を付けて）`,w:'mid'});}
  if(hrrDrop!=null&&hrrDrop>=8){score+=24;sig.push({t:`HRR60が平時比 −${round(hrrDrop,0)}bpm（自律神経の疲労蓄積）`,w:'high'});}
  if(soreHits>=2){score+=22;sig.push({t:'「脚の張り」申告が直近3日で複数回',w:'high'});}
  else if(soreHits===1){score+=8;sig.push({t:'脚の張りの申告あり',w:'mid'});}
  score=clamp(score,0,100);
  const lv= score>=60? {label:'警戒',col:'var(--coral)',adv:'今週の質練習を1回抜き、48–72時間の回復ブロックを。局所的な痛みなら早めに専門家へ。'}

    : {label:'平常',col:'var(--teal)',adv:'前兆の重なりはありません。計画どおりで問題なし。'};
  return {score,sig,lv,hrrDrop};
}

/* ---------- C) INDEPENDENT RESPONSE (ridge) ---------- */
function inv4(M){ // Gauss-Jordan for n<=4
  const n=M.length; const A=M.map((r,i)=>[...r, ...Array.from({length:n},(_,j)=>i===j?1:0)]);
  for(let c=0;c<n;c++){ let piv=c;
    for(let r2=c+1;r2<n;r2++) if(Math.abs(A[r2][c])>Math.abs(A[piv][c])) piv=r2;
    if(Math.abs(A[piv][c])<1e-9) return null;
    [A[c],A[piv]]=[A[piv],A[c]];
    const d=A[c][c]; for(let j=0;j<2*n;j++) A[c][j]/=d;
    for(let r2=0;r2<n;r2++){ if(r2===c) continue; const f=A[r2][c];
      for(let j=0;j<2*n;j++) A[r2][j]-=f*A[c][j]; } }
  return A.map(r=>r.slice(n));
}
function ridgeResponse(rows,keys){
  const nR=rows.length, nF=keys.length;
  const mx=keys.map(k=>rows.reduce((s,r)=>s+r[k],0)/nR);
  const sx=keys.map((k,i)=>Math.sqrt(rows.reduce((s,r)=>s+(r[k]-mx[i])**2,0)/nR)||1);
  const my=rows.reduce((s,r)=>s+r.dv,0)/nR;
  const sy=Math.sqrt(rows.reduce((s,r)=>s+(r.dv-my)**2,0)/nR)||1;
  const X=rows.map(r=>keys.map((k,i)=>(r[k]-mx[i])/sx[i]));
  const y=rows.map(r=>(r.dv-my)/sy);
  const XtX=Array.from({length:nF},(_,i)=>Array.from({length:nF},(_,j)=>
    X.reduce((s,row)=>s+row[i]*row[j],0)));
  const lam=0.8; for(let i=0;i<nF;i++) XtX[i][i]+=lam;
  const inv=inv4(XtX); if(!inv) return null;
  const Xty=keys.map((_,i)=>X.reduce((s,row,r2)=>s+row[i]*y[r2],0));
  const beta=inv.map(row=>row.reduce((s,v,j)=>s+v*Xty[j],0));
  const out={}; keys.forEach((k,i)=>out[k]=beta[i]*sy/sx[i]); // raw units: ΔeVO2max per unit
  return out;
}

const TYPE_JP={recovery:'リカバリー',easy:'イージー',long:'ロング',tempo:'テンポ',interval:'インターバル',race:'レース'};
const TYPE_COLOR={recovery:'mute',easy:'teal',long:'violet',tempo:'gold',interval:'coral',race:'coral'};
const TYPE_HEX={recovery:'#5E6A82',easy:'#33E1C4',long:'#8C7DFF',tempo:'#F5B23E',interval:'#FF6E5B',race:'#FF6E5B'};

/* ============================================================
   RunOS v77 Hybrid engines — MERIDIAN UI + RunOS decision core
   ============================================================ */
function hrrFrac(a){
  const p=DB.profile;
  if(!a.hrAvg) return null;
  return clamp((a.hrAvg-p.hrRest)/(p.hrMax-p.hrRest),0,1.05);
}
function paceDeltaFromLT(a){
  const p=DB.profile.thresholdPaceSec||255;
  return paceFromRun(a)-p; // positive = slower than LT
}
function categoryV77(a){
  const p=DB.profile;
  const pace=paceFromRun(a), delta=pace-(p.thresholdPaceSec||255);
  const hrr=hrrFrac(a), km=a.km||0, dur=a.durSec||0;
  const name=((a.note||'')+' '+(a.name||'')).toLowerCase();
  let reasons=[], conf=52, type='easy';
  const det=(()=>{try{return detectIntervals(a)}catch(e){return null}})();
  const hasHr=!!a.hrAvg, hasLap=!!(a.laps&&a.laps.length), hasStream=!!a.stream;
  if(/race|レース|tt|time trial|タイムトライアル/.test(name)){ type='race'; reasons.push('名称からレース/TT'); }
  else if(det&&det.reps&&det.reps.length>=3){ type='interval'; reasons.push(`疾走区間 ${det.reps.length}本を検出`); }
  else if((a.VI&&a.VI>1.07) || (a.hrMax&&hrr!=null&&hrr<0.82&&((a.hrMax-p.hrRest)/(p.hrMax-p.hrRest))>=0.93)){ type='interval'; reasons.push('変動係数/最大心拍からインターバル傾向'); }
  else if(km>=18 || dur>=90*60){ type='long'; reasons.push('18km以上または90分以上'); }
  else if(/recovery|回復|リカバ/.test(name) || a.type==='recovery'){ type='recovery'; reasons.push('回復走として記録'); }
  else if(hrr!=null && hrr>=0.82 && km>=3){ type='tempo'; reasons.push(`平均心拍 ${Math.round(hrr*100)}%HRR`); }
  else if(delta<=18 && km>=3 && dur>=14*60){ type='tempo'; reasons.push(`LT+${Math.round(delta)}秒/km 以内`); }
  else if(delta<=55 && km>=5){ type='easy'; reasons.push(`LTより${Math.round(delta)}秒遅い有酸素域`); }
  else if(km<4 && dur<28*60 && (hrr==null || hrr<0.62)){ type='recovery'; reasons.push('短時間かつ低負荷'); }
  else { type='easy'; reasons.push('通常の有酸素走として判定'); }
  if(hasHr) conf+=18; else reasons.push('心拍なしのためペース/距離優先');
  if(hasLap) conf+=12; if(hasStream) conf+=12; if(det&&det.reps&&det.reps.length>=3) conf+=12;
  if(a.rpe) conf+=5;
  return {type, label:typeJP(type), conf:clamp(Math.round(conf),35,95), reasons, paceDelta:delta};
}
function loadComponentsFor(a){
  const cat=categoryV77(a).type;
  const km=a.km||0, load=trimp(a), pace=paceFromRun(a), p=DB.profile.thresholdPaceSec||255;
  const fast=clamp(p/pace,0.65,1.35);
  const typeMul={recovery:.55,easy:1.0,long:1.22,tempo:1.35,interval:1.65,race:1.75}[cat]||1;
  const elevMul=1+clamp((a.elevM||0)/Math.max(1,km)/180,0,.35);
  const mechanical=km*typeMul*elevMul*clamp(fast,.8,1.35);
  const cardio=load;
  const neuro=km*({interval:2.4,race:2.0,tempo:1.25,long:.75,recovery:.25,easy:.45}[cat]||.5)*clamp(fast,.8,1.45);
  const quality=(cat==='tempo'||cat==='interval'||cat==='race')?km:0;
  const long=(cat==='long')?km:0;
  return {mechanical,cardio,neuro,quality,long,cat};
}
function dailyComponentMap(days,key){
  const end=new Date(todayISO()+'T00:00'); const arr=[];
  for(let i=days-1;i>=0;i--){ const d=new Date(end); d.setDate(d.getDate()-i); const iso=isoLocal(d); let sum=0;
    DB.activities.forEach(a=>{ if(a.date===iso) sum+=loadComponentsFor(a)[key]||0; });
    arr.push(sum);
  }
  return arr;
}
function meanArr(a){ return a.length?a.reduce((s,x)=>s+x,0)/a.length:0; }
function loadRiskV77(){
  const mech7=dailyComponentMap(7,'mechanical'), mech28=dailyComponentMap(28,'mechanical');
  const card7=dailyComponentMap(7,'cardio'), card28=dailyComponentMap(28,'cardio');
  const neuro7=dailyComponentMap(7,'neuro'), neuro28=dailyComponentMap(28,'neuro');
  const q7=dailyComponentMap(7,'quality').reduce((s,x)=>s+x,0);
  const l14=dailyComponentMap(14,'long').reduce((s,x)=>s+x,0);
  const mechanicalACWR=meanArr(mech28)>0?meanArr(mech7)/meanArr(mech28):0;
  const cardioACWR=meanArr(card28)>0?meanArr(card7)/meanArr(card28):0;
  const neuroRatio=meanArr(neuro28)>0?meanArr(neuro7)/meanArr(neuro28):0;
  const w=latestWellness(); const soreness=w&&w.soreness?Number(w.soreness):0;
  const rec=recoveryState(); const rd=readiness();
  let risk=0, reasons=[];
  if(mechanicalACWR>1.45){risk+=26;reasons.push(`脚部負荷急増 ${mechanicalACWR.toFixed(2)}`)}
  else if(mechanicalACWR>1.25){risk+=13;reasons.push(`脚部負荷やや高い ${mechanicalACWR.toFixed(2)}`)}
  if(cardioACWR>1.45){risk+=16;reasons.push(`心肺負荷急増 ${cardioACWR.toFixed(2)}`)}
  if(neuroRatio>1.65){risk+=12;reasons.push('高速刺激が多い')}
  if(q7>18){risk+=16;reasons.push(`直近Quality ${round(q7,1)}km`)}
  if(soreness>=4){risk+=26;reasons.push('痛み/張り入力が強い')}
  else if(soreness>=3){risk+=12;reasons.push('張り入力あり')}
  if(rec&&rec.remaining>8){risk+=14;reasons.push(`回復残り ${Math.ceil(rec.remaining)}h`)}
  if(rd.score<42){risk+=22;reasons.push(`Readiness ${rd.score}`)}
  risk=clamp(Math.round(risk),0,100);
  let gate='GO', label='通常', color='var(--teal)', cap='予定通り。ただし上振れ禁止。';
  if(risk>=76){gate='STOP';label='休む/代替';color='var(--coral)';cap='ラン停止。Walk / Bike / Mobilityへ。'}
  else if(risk>=55){gate='PROTECT';label='保護';color='var(--gold)';cap='Protected Easyまで。Quality/Longは禁止。'}
  else if(risk>=34){gate='SHORTEN';label='短縮';color='var(--gold)';cap='距離20〜30%短縮。Easy上限。'}
  return {risk,gate,label,color,cap,reasons,mechanicalACWR,cardioACWR,neuroRatio,quality7:q7,long14:l14,soreness,readiness:rd.score};
}

function todayOverride(){ return (DB.planOverrides&&DB.planOverrides[todayISO()])||null; }
function plannedWorkoutV77(){

async function importFitFiles(files){
  let ok=0,fail=0,dup=0;
  for(const f of files){
    try{
      const buf=new Uint8Array(await f.arrayBuffer());
      const r=parseFit(buf);
      if(r.sport!=null&&r.sport!==1){ addImportLine(f.name,'ランニング以外のためスキップ','skip'); dup++; continue; }
      const id='fit'+r.unixStart+'_'+Math.round(r.km*100);
      if(DB.activities.find(a=>a.id===id)){ addImportLine(f.name,'重複のためスキップ','skip'); dup++; continue; }
      const act={ id, date:r.date, type:'easy', km:round(r.km,2), durSec:Math.round(r.durSec), elapsedSec:r.elapsedSec||null,
        hrAvg:r.avgHr, hrMax:r.maxHr, avgPwr:r.avgPwr, maxPwr:r.maxPwr, cadence:r.cadence,
        elevM:r.ascentM, decoupling:r.decoupling, xPower:r.xPower, VI:r.VI, gapEquivKm:r.gapEquivKm,
        pwrCurve:r.pwrCurve, spdCurve:r.spdCurve, durs:r.durs, stream:r.stream, laps:r.laps,
        gps:r.gps||null, bests:r.bests||null, startUnix:r.unixStart,
        calories:r.calories, hasStream:true, rpe:null, note:'' };
      act.type=inferType(act);
      // structured-workout override: if interval detection fires, trust it
      try{ const det=detectIntervals(act); if(det&&det.reps.length>=3&&act.type!=='long') act.type='interval'; }catch(e){}
      DB.activities.push(act); ok++;
      addImportLine(f.name, `${act.date} · ${act.km}km · ${paceStr(act.durSec/act.km)}/km · ${typeJP(act.type)}`,'ok');
    }catch(e){ fail++; addImportLine(f.name,'解析できませんでした: '+e.message,'fail'); }
  }
  const saved=save();
  notifySaveResult(saved,`${ok}件取込${dup?` · ${dup}件スキップ`:''}${fail?` · ${fail}件失敗`:''}`);
  if(ok>0) renderLog();   // show new runs in the table; on total failure keep the per-file feedback visible
}

/* ============================================================
   Cross-activity mean-max curves (from real streams)
   ============================================================ */
function aggCurve(key){ const best={}; let any=false;
  DB.activities.forEach(a=>{ const c=a[key]; if(c){ any=true; for(const w in c){ const v=c[w];
    if(v>0&&(!best[w]||v>best[w])) best[w]=v; } } });
  return any?best:null; }

function durationCurveChart(map, mode){
  if(!map) return '<div class="empty">ストリーム付きデータがありません</div>';
  const durs=Object.keys(map).map(Number).filter(d=>map[d]>0).sort((a,b)=>a-b);
  if(durs.length<3) return '<div class="empty">データが不足しています</div>';
  const W=760,H=210,padL=48,padR=14,padT=14,padB=28;
  const lmin=Math.log(durs[0]),lmax=Math.log(durs[durs.length-1]);
  const vals=durs.map(d=>mode==='pace'?1000/map[d]:map[d]); // pace: sec/km (lower=better)
  const vmin=Math.min(...vals),vmax=Math.max(...vals);
  const x=d=>padL+((Math.log(d)-lmin)/(lmax-lmin))*(W-padL-padR);
  const y=v=>padT+((v-vmin)/((vmax-vmin)||1))*(H-padT-padB); // top = min value
  let path='',dots='';
  durs.forEach((d,i)=>{ const yy=y(vals[i]); path+=(i?'L':'M')+x(d).toFixed(1)+' '+yy.toFixed(1)+' ';

    ax+=`<text x="6" y="${y(v)+3}" fill="#5E6a82" font-size="10" font-family="IBM Plex Mono">${lbl}</text>`; });
  const tick=d=>d<60?d+'s':d<3600?(d/60)+'m':(d/3600)+'h';
  let xl='';[1,60,300,1200,3600].forEach(d=>{ if(d>=durs[0]&&d<=durs[durs.length-1])
    xl+=`<text x="${x(d)}" y="${H-8}" fill="#5E6a82" font-size="10" text-anchor="middle" font-family="IBM Plex Mono">${tick(d)}</text>`; });

function decouplingChart(acts){

/* ============================================================
   ADVANCED ANALYSIS  (all derived from real FIT streams)
   1. Critical Power / Critical Speed  (2-param hyperbolic)
   2. Training-intensity distribution & polarization index
   3. Per-run interval auto-detection & execution scoring
   Every model is a pure function so the glass-box can expose it.
   ============================================================ */

/* ---- 1. Critical Power / Critical Speed --------------------
   Monod-Scherrer 2-parameter model:  y = C + K/t
   linear in (1/t):  slope K = W' (J) or D' (m),  intercept C = CP (W) or CS (m/s).
   Fit over the "severe" domain (~2–20 min) where the model holds. */
function cpFit(curve, loT, hiT){
  if(!curve) return null;
  const pts=Object.keys(curve).map(Number)
    .filter(t=>t>=loT&&t<=hiT&&curve[t]>0)
    .map(t=>[t,curve[t]]).sort((a,b)=>a[0]-b[0]);
  if(pts.length<3) return null;
  let n=pts.length,sx=0,sy=0,sxx=0,sxy=0;
  pts.forEach(([t,p])=>{ const x=1/t; sx+=x; sy+=p; sxx+=x*x; sxy+=x*p; });
  const denom=(n*sxx-sx*sx)||1e-9;
  const K=(n*sxy-sx*sy)/denom;   // W' / D'
  const C=(sy-K*sx)/n;           // CP / CS
  const mean=sy/n; let ssr=0,sst=0;
  pts.forEach(([t,p])=>{ const pred=C+K/t; ssr+=(p-pred)**2; sst+=(p-mean)**2; });
  const r2=sst>0?clamp(1-ssr/sst,0,1):0;
  return {C,K,r2,pts};
}
function criticalPower(){ const f=cpFit(aggCurve('pwrCurve'),120,1200);
  if(!f||f.C<=0||f.K<=0) return null;
  return {cp:f.C, wprime:f.K, r2:f.r2, pts:f.pts}; }
function criticalSpeed(){ const f=cpFit(aggCurve('spdCurve'),120,1800);
  if(!f||f.C<=0||f.K<=0) return null;
  return {cs:f.C, dprime:f.K, r2:f.r2, pts:f.pts}; }

// time sustainable at a given output/speed from the model
function cpTimeFor(C,K,target){ return target>C? K/(target-C) : Infinity; }
// race time from CS model for a distance (m):  D = CS·t + D'  →  t = (D − D')/CS
function csRaceTime(cs,dprime,distM){ return (distM-dprime)/cs; }

function cpModelChart(model, mode){
  // mode 'power'|'speed'; overlay fitted hyperbola over the mean-max points
  const C=mode==='power'?model.cp:model.cs, K=mode==='power'?model.wprime:model.dprime;
  const pts=model.pts;
  const W=760,H=220,padL=52,padR=16,padT=16,padB=30;
  const tmin=pts[0][0], tmax=pts[pts.length-1][0];
  const lmin=Math.log(tmin), lmax=Math.log(tmax);
  const toY=mode==='power'?(v=>v):(v=>1000/v); // speed→sec/km for display
  const yvals=pts.map(p=>toY(p[1])).concat([toY(C*1.02)]);
  let vmin=Math.min(...yvals),vmax=Math.max(...yvals); const pd=(vmax-vmin)*0.12||1; vmin-=pd; vmax+=pd;
  const x=t=>padL+((Math.log(t)-lmin)/((lmax-lmin)||1))*(W-padL-padR);
  const y=v=>padT+((v-vmin)/((vmax-vmin)||1))*(H-padT-padB);
  // fitted curve
  let fit=''; for(let i=0;i<=60;i++){ const t=Math.exp(lmin+(lmax-lmin)*i/60); const v=C+K/t;
    fit+=(i?'L':'M')+x(t).toFixed(1)+' '+y(toY(v)).toFixed(1)+' '; }
  // CP/CS asymptote
  const cyRaw=y(toY(C));
  const asym=`<line x1="${padL}" x2="${W-padR}" y1="${cyRaw.toFixed(1)}" y2="${cyRaw.toFixed(1)}" stroke="#33E1C4" stroke-dasharray="4 4" stroke-opacity=".5"/>`;
  const color=mode==='power'?'#8C7DFF':'#33E1C4';
  let dots=''; pts.forEach(p=>{ dots+=`<circle cx="${x(p[0]).toFixed(1)}" cy="${y(toY(p[1])).toFixed(1)}" r="3.4" fill="${color}"/>`; });
  const tick=d=>d<60?d+'s':d<3600?(d/60)+'m':(d/3600)+'h';
  let xl=''; [120,300,600,1200,1800].forEach(d=>{ if(d>=tmin&&d<=tmax)
    xl+=`<text x="${x(d)}" y="${H-9}" fill="#5E6a82" font-size="10" text-anchor="middle" font-family="IBM Plex Mono">${tick(d)}</text>`; });
  const clabel=mode==='power'?Math.round(C)+'W':paceStr(1000/C)+'/km';
  let ax=''; [vmin+pd,(vmin+vmax)/2,vmax-pd].forEach(v=>{ const lbl=mode==='power'?Math.round(v)+'W':paceStr(v);
    ax+=`<text x="8" y="${y(v)+3}" fill="#5E6a82" font-size="10" font-family="IBM Plex Mono">${lbl}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:220px">
    ${asym}<path d="${fit}" fill="none" stroke="${color}" stroke-width="2" opacity=".8"/>${dots}${ax}${xl}
    <text x="${W-padR}" y="${cyRaw-6}" fill="#33E1C4" font-size="11" text-anchor="end" font-family="IBM Plex Mono">${mode==='power'?'CP ':'CS '}${clabel}</text></svg>`;
}

/* ---- 2. Intensity distribution & polarization --------------
   Uses real per-sample HR from every stream in the window.
   3-zone Seiler model: LOW (<LT1) · THRESHOLD (gray) · HIGH (>LT2).
   Polarization Index (Treff 2019): log10(low%·high% / mid%²). */
function intensityDistribution(days){
  const cut=new Date(todayISO()+'T00:00'); cut.setDate(cut.getDate()-days);
  const cutISO=isoLocal(cut);
  const acts=DB.activities.filter(a=>a.date>=cutISO&&a.hasStream&&a.stream&&a.stream.length>2);
  if(!acts.length) return null;
  const z=[0,0,0,0,0]; let tot=0;
  acts.forEach(a=>{ const r=hrZonesFromStream(a.stream); r.z.forEach((v,i)=>z[i]+=v); tot+=r.tot; });
  if(tot<=0) return null;
  const low=(z[0]+z[1])/tot, mid=z[2]/tot, high=(z[3]+z[4])/tot;
  const PI=(mid>0&&low>0&&high>0)? Math.log10((low*100)*(high*100)/Math.pow(mid*100,2)) : null;
  let model,verdict,vcol;
  if(low>=0.75 && high>=0.15 && high>=mid){ model='Polarized · 二極化'; vcol='teal';
    verdict='理想的な二極化。楽な走りで土台を作りつつ高強度で刺激。故障を抑えつつ伸びる配分です。'; }
  else if(low>=0.75 && mid>high){ model='Pyramidal · ピラミッド'; vcol='lime';
    verdict='ピラミッド型。土台は十分。閾値〜VO2の高強度をもう少し増やすと停滞を破れます。'; }
  else if(mid>=0.35){ model='Threshold-heavy · 灰色地帯'; vcol='gold';
    verdict='中強度に偏りがち(いわゆるグレーゾーン)。楽な日をもっと楽に、速い日をもっと速く。'; }
  else { model='Low-volume base'; vcol='ink-2';
    verdict='高強度が少なめ。土台作り期なら適切。レースが近ければ刺激を追加。'; }
  return {z,low,mid,high,PI,hours:tot/3600,activities:acts.length,model,verdict,vcol,days};
}

function distributionChart(d){
  const segs=[['LOW · 楽','#33E1C4',d.low],['THRESHOLD · 閾値','#F5B23E',d.mid],['HIGH · 高強度','#FF6E5B',d.high]];
  let bar='',leg='';
  segs.forEach(([lbl,c,f])=>{ bar+=`<div style="flex:${f||0.0001};background:${c};display:flex;align-items:center;justify-content:center;font-size:12px;color:#0B0E15;font-weight:700">${f>=0.08?Math.round(f*100)+'%':''}</div>`;
    leg+=`<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)"><span class="dot" style="background:${c}"></span>${lbl} ${Math.round(f*100)}%</span>`; });
  return `<div class="zbar" style="height:34px;border-radius:8px;overflow:hidden">${bar}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px">${leg}</div>`;
}

/* ---- 3. Interval auto-detection & execution ----------------
   Segments the stream into work/recovery bouts from power (or pace),
   then scores rep-to-rep consistency and fade. Returns null for
   steady runs so it only surfaces for genuine workouts. */
function detectIntervals(a){
  const s=a.stream; if(!s||s.length<20) return null;
  const usePwr=s.filter(p=>p[6]!=null).length > s.length*0.6;
  const col=usePwr?6:2;                       // power or speed(m/s)
  const raw=s.map(p=>p[col]);
  // smooth ±2
  const sm=raw.map((_,i)=>{ let a2=0,n=0; for(let j=Math.max(0,i-2);j<=Math.min(raw.length-1,i+2);j++){ if(raw[j]!=null){a2+=raw[j];n++;} } return n?a2/n:null; });
  const vals=sm.filter(v=>v!=null).sort((x,y)=>x-y); if(vals.length<10) return null;
  const q=f=>vals[Math.min(vals.length-1,Math.floor(f*vals.length))];
  const p50=q(0.5), p85=q(0.85);
  const thr=p50 + 0.45*(p85-p50);             // work threshold
  if(p85 <= p50*1.05) return null;            // no meaningful variation → steady
  // build work mask over time, accumulate segments
  const segs=[]; let cur=null;
  for(let i=1;i<s.length;i++){ const v=sm[i]; if(v==null) continue;
    const dt=Math.max(0,s[i][0]-s[i-1][0]); const work=v>=thr;
    if(work){ if(!cur) cur={i0:i,t0:s[i-1][0],d0:s[i-1][1]}; cur.i1=i; cur.t1=s[i][0]; cur.d1=s[i][1]; }
    else if(cur){ segs.push(cur); cur=null; } }
  if(cur) segs.push(cur);
  // merge segments separated by <8s, drop <25s
  const merged=[];
  segs.forEach(g=>{ const last=merged[merged.length-1];
    if(last && g.t0-last.t1<8) { last.t1=g.t1; last.i1=g.i1; last.d1=g.d1; }
    else merged.push({...g}); });
  const reps=merged.filter(g=>g.t1-g.t0>=25).map((g,idx)=>{
    let hrSum=0,hrN=0,hrMax=0,pSum=0,pN=0;
    for(let i=g.i0;i<=g.i1;i++){ const hr=s[i][4]; if(hr!=null){hrSum+=hr;hrN++; if(hr>hrMax)hrMax=hr;}
      const pw=s[i][6]; if(pw!=null){pSum+=pw;pN++;} }
    const dur=g.t1-g.t0, dist=(g.d1!=null&&g.d0!=null)?g.d1-g.d0:null;
    return { n:idx+1, dur, dist, pace: dist? dur/(dist/1000):null,
      avgHr:hrN?Math.round(hrSum/hrN):null, maxHr:hrMax||null, avgPwr:pN?Math.round(pSum/pN):null };
  });
  if(reps.length<3) return null;              // not a structured session
  // consistency: CV of the primary metric across reps
  const key=usePwr?'avgPwr':'pace';
  const metric=reps.map(r=>r[key]).filter(v=>v!=null);
  const mean=metric.reduce((x,y)=>x+y,0)/metric.length;
  const sd=Math.sqrt(metric.reduce((x,y)=>x+(y-mean)**2,0)/metric.length);
  const cv=mean?sd/mean*100:0;
  // fade: last-third vs first-third of the primary metric
  const k=Math.max(1,Math.floor(reps.length/3));
  const firstAvg=metric.slice(0,k).reduce((x,y)=>x+y,0)/k;
  const lastAvg=metric.slice(-k).reduce((x,y)=>x+y,0)/k;
  const fade= usePwr ? (firstAvg-lastAvg)/firstAvg*100 : (lastAvg-firstAvg)/firstAvg*100; // + = slowed/weakened
  // execution score 0–100: penalize CV and fade
  const score=clamp(Math.round(100 - cv*4 - Math.max(0,fade)*2), 0, 100);
  return {reps,usePwr,cv,fade,score,mean};
}

function intervalCard(det){
  const rows=det.reps.map(r=>`<tr>
    <td class="mono">${r.n}</td>
    <td class="n">${hms(r.dur)}</td>
    <td class="n">${r.dist?round(r.dist/1000,2):'—'}</td>
    <td class="n">${r.pace?paceStr(r.pace):'—'}</td>
    <td class="n">${r.avgPwr||'—'}</td>
    <td class="n">${r.avgHr||'—'}</td></tr>`).join('');
  const sc=det.score, scol=sc>=85?'teal':sc>=65?'gold':'coral';
  const fadeTxt=det.fade>0?`後半 ${det.fade.toFixed(1)}% ${det.usePwr?'出力低下':'失速'}`:`後半 ${Math.abs(det.fade).toFixed(1)}% ${det.usePwr?'出力向上':'加速'}(ネガティブ)`;
  return `<div class="card gb" data-gb="intervals" style="margin-top:16px">
    <h3>Interval Analysis · ${det.reps.length}本を自動検出</h3>
    <div class="verdict-line" style="margin-bottom:12px">
      <span class="big" style="color:var(--${scol})">${sc}</span>
      <span style="font-size:13px;color:var(--ink-2)">実行スコア · バラつき CV ${det.cv.toFixed(1)}% · ${fadeTxt}</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>本</th><th class="n">時間</th><th class="n">km</th><th class="n">ペース</th><th class="n">W</th><th class="n">HR</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="hint" style="margin-top:8px">${det.usePwr?'パワー':'ペース'}を基準に疾走区間を自動抽出。CVが低く後半の落ちが小さいほど「揃った」練習です。</div></div>`;
}

   ADVANCED ANALYSIS II — competitor-signature features, all

/* ---- Daniels training paces from eVO2max ---- */
function vdotPaces(){
  const vo2=perfVO2max().value; if(vo2<=0) return null;
  const vmax=velFromVO2(vo2); // m/min at 100% vVO2max
  const paceAt=f=> 60000/(vmax*f); // sec/km
  return { vo2,
    E:{lo:paceAt(0.62),hi:paceAt(0.74),mid:paceAt(0.68),label:'イージー'},
    M:{mid:paceAt(0.82),label:'マラソンペース'},
    T:{mid:paceAt(0.87),label:'閾値(テンポ)'},
    I:{mid:paceAt(0.975),label:'インターバル'},
    R:{mid:paceAt(1.07),label:'レペティション'} };
}

/* ---- Garmin-style Training Status ---- */
function trainingStatus(){
  const s=pmc(); if(s.length<15) return {key:'none',label:'データ収集中',color:'var(--ink-3)',desc:'2週間分のデータが揃うと判定されます。',slope:0,tsb:0};
  const now=s[s.length-1], past=s[Math.max(0,s.length-15)];
  const slope=now.ctl-past.ctl;            // CTL change over 14d
  const tsb=now.tsb; const ratio=acwr(); const {monotony}=monotonyStrain();
  const nRecent=DB.activities.filter(a=>{const d=dayDiff(a.date,todayISO());return d>=0&&d<=28;}).length;
  let key,label,color,desc;
  if(nRecent<6){ return {key:'building',label:'データ蓄積中',color:'var(--ink-2)',
    desc:`直近28日の記録が${nRecent}本。6本以上たまると負荷比・単調性を含む本判定に切り替わります。`,slope,tsb,ratio,monotony}; }
  if(ratio>1.5||monotony>2.3){ key='overreach'; label='オーバーリーチ'; color='var(--coral)';
    desc='負荷の増え方が急、または単調です。故障・停滞のリスク帯。1週間の負荷を2〜3割落として吸収を。'; }
  else if(slope>3 && tsb<=-25){ key='strained'; label='過負荷ぎみ'; color='var(--gold)';
    desc='体力は伸びていますが疲労が深い。回復日を挟めば「生産的」に戻ります。'; }
  else if(slope>3){ key='productive'; label='生産的'; color='var(--teal)';
    desc='体力(CTL)が着実に伸び、疲労も管理範囲。理想的な積み上げ局面です。'; }
  else if(Math.abs(slope)<=3 && tsb>=15){ key='peaking'; label='ピーキング'; color='var(--purple, #8C7DFF)';
    desc='負荷を落として鮮度が上がっています。レースに最適な状態。長引くと体力が落ち始めます。'; }
  else if(Math.abs(slope)<=3){ key='maintain'; label='維持'; color='var(--lime)';
    desc='現状の体力を維持しています。伸ばすには週あたり負荷を1割ずつ足していきます。'; }
  else if(tsb>=20){ key='recovery'; label='回復/テーパー'; color='var(--teal)';
    desc='意図的な負荷減。回復が完了したら再開を。'; }
  else { key='detrain'; label='デトレーニング'; color='var(--coral)';
    desc='2週間で体力が落ちています。週3回・現在の距離からの再構築を。'; }
  return {key,label,color,desc,slope,tsb,ratio,monotony};
}

/* ---- per-run Training Effect (aerobic) + recovery hours ---- */
function trainingEffect(a){
  const load=trimp(a);
  const ctl=Math.max(15,currentPMC().ctl);
  // saturating scale relative to what "a normal day at current fitness" absorbs
  const te=clamp(5*(1-Math.exp(-load/(ctl+40))),0.5,5);
  return {te, load, ctl};
}
function recoveryHours(te){ return clamp(Math.round(Math.pow(te,1.6)*6),4,72); }
function recoveryState(){
  const acts=[...DB.activities].filter(a=>a.durSec>0).sort((x,y)=> (y.startUnix||dateUnix(y.date)) - (x.startUnix||dateUnix(x.date)) );
  if(!acts.length) return null;
  const last=acts[0];
  const endUnix=(last.startUnix||dateUnix(last.date)) + (last.durSec||0);
  const {te}=trainingEffect(last);
  const rh=recoveryHours(te);
  const since=(Date.now()/1000-endUnix)/3600;
  return {last, te, rh, remaining:Math.max(0,rh-since), since};
}
function dateUnix(iso){ return new Date(iso+'T12:00').getTime()/1000; }
function teLabel(te){ return te>=4.5?'オーバーロード':te>=3.5?'高度に向上':te>=2.5?'向上':te>=1.5?'維持':'回復'; }

/* ---- PR engine (Strava best efforts) ---- */
const PR_DISTS=[[400,'400m'],[1000,'1 km'],[1609.34,'1 mile'],[5000,'5 km'],[10000,'10 km'],[21097.5,'ハーフ'],[42195,'フル']];
function prBoard(){
  const board=[];
  for(const [D,label] of PR_DISTS){
    let best=null;
    DB.activities.forEach(a=>{
      let t=null;
      if(a.bests&&a.bests[D]) t=a.bests[D];
      else if(!a.hasStream && a.km*1000>=D) t=a.durSec*(D/(a.km*1000)); // manual rough fallback

/* ---- GPS route map (equirectangular, dependency-free) ---- */
function routeMapSVG(gps,opt){
  if(!gps||gps.length<5) return '';
  const o=opt||{}; const W=o.w||760, H=o.h||300, pad=18;
  const lats=gps.map(p=>p[0]), lngs=gps.map(p=>p[1]);
  const la0=Math.min(...lats), la1=Math.max(...lats);
  const lo0=Math.min(...lngs), lo1=Math.max(...lngs);
  const midLat=(la0+la1)/2, kx=Math.cos(midLat*Math.PI/180);
  const spanX=(lo1-lo0)*kx||1e-9, spanY=(la1-la0)||1e-9;
  const sc=Math.min((W-pad*2)/spanX,(H-pad*2)/spanY);
  const ox=(W-spanX*sc)/2, oy=(H-spanY*sc)/2;
  const X=p=>ox+((p[1]-lo0)*kx)*sc, Y=p=>H-(oy+(p[0]-la0)*sc);
  let d=''; gps.forEach((p,i)=>{ d+=(i?'L':'M')+X(p).toFixed(1)+' '+Y(p).toFixed(1)+' '; });
  const s=gps[0], e=gps[gps.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" class="chart routemap" style="height:${o.hpx||300}px">
    <path d="${d}" fill="none" stroke="#0B0E15" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>
    <path d="${d}" fill="none" stroke="#33E1C4" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(s).toFixed(1)}" cy="${Y(s).toFixed(1)}" r="5.5" fill="#33E1C4" stroke="#0B0E15" stroke-width="2"/>
    <circle cx="${X(e).toFixed(1)}" cy="${Y(e).toFixed(1)}" r="5.5" fill="#FF6E5B" stroke="#0B0E15" stroke-width="2"/></svg>`;
}

/* ---- goal race & training plan generator ---- */
const RACE_DEFS={'5k':{m:5000,label:'5K',peakCap:55,taper:1,minWeeks:4},
  '10k':{m:10000,label:'10K',peakCap:65,taper:1,minWeeks:5},
  'half':{m:21097.5,label:'ハーフ',peakCap:75,taper:2,minWeeks:6},
  'full':{m:42195,label:'フル',peakCap:90,taper:3,minWeeks:8}};
function generatePlan(cfg){
  const def=RACE_DEFS[cfg.dist]; if(!def) return null;
  const weeks=Math.max(2,Math.floor(dayDiff(todayISO(),cfg.date)/7));
  const curWeekly=Math.max(12, enduranceBase().weeklyKm||12);
  const peak=Math.min(def.peakCap, Math.max(curWeekly*1.35, curWeekly+12));
  const paces=vdotPaces();
  const zones=(typeof personalZones==='function')?personalZones():null;
  const hrFor=k=>{ if(!zones) return null; const map={E:'Z2',M:'Z3',T:'Z4',I:'Z5',R:'Z5'}[k];
    const z=zones.hrZones.find(x=>x.z===map); return z?`${z.lo}–${z.hi}`:null; };
  const pc=(k,base)=>paces?`${base} ${paceStr(paces[k].mid)}/km${hrFor(k)?` (HR ${hrFor(k)})`:''}`:base;

  // ---- mesocycle structure ----
  const taperW=clamp(def.taper,1,Math.max(1,weeks-3));
  const work=weeks-taperW;
  const baseW=Math.max(1,Math.round(work*0.45));
  const peakW=Math.max(1,Math.round(work*0.20));
  const buildW=Math.max(1,work-baseW-peakW);
  const phaseOf=i=> i<baseW?'base' : i<baseW+buildW?'build' : i<work?'peak' : 'taper';
  const PHASE_JP={base:'ベース',build:'ビルド',peak:'ピーク',taper:'テーパー'};
  const PHASE_COL={base:'#33E1C4',build:'#8C7DFF',peak:'#F5B23E',taper:'#FF6E5B'};

  const ws=[];
  for(let i=0;i<weeks;i++){
    const wLeft=weeks-i; const pk=phaseOf(i);
    const deload = pk!=='taper' && ((i+1)%4===0) && wLeft>taperW+1;
    // volume
    let target;
    if(pk==='taper'){ target=peak*(wLeft===1?0.45:wLeft===2?0.62:0.75); }
    else {
      const prog=work>1?(i/(work-1)):1;
      const ramped=curWeekly+(peak-curWeekly)*Math.min(1,prog*1.12);
      target=ramped*(deload?0.75:1);
    }
    target=Math.round(target);
    // structured key workouts per phase
    const workouts=[];
    if(pk==='base'){
      workouts.push({kind:'long',label:pc('E',`ロング走 ${Math.max(8,Math.round(target*0.32))}km @E`)});
      workouts.push({kind:'strides',label:'ウィンドスプリント 6〜8×20秒（週2）'});
    } else if(pk==='build'){
      workouts.push({kind:'tempo',label:pc('T',`テンポ 20〜30分 @T`)});
      workouts.push({kind:'long',label:pc(cfg.dist==='full'?'M':'E',`ロング走 ${Math.max(9,Math.round(target*0.33))}km${cfg.dist==='full'?' 後半MP':' 後半ペースアップ'}`)});
    } else if(pk==='peak'){
      workouts.push({kind:'interval',label:pc('I',`インターバル 5×3分 @I`)});
      workouts.push({kind:'race',label:pc(cfg.dist==='full'||cfg.dist==='half'?'M':'T',`レース特異的 ${Math.round(target*0.3)}km`)});
    } else {
      workouts.push({kind:'sharpen',label:pc('I',`キレ出し 4×2分 @I`)});
      workouts.push({kind:'race',label:pc('M',`レースペース 3km で感覚合わせ`)});
    }
    const wkStart=new Date(weekKey(todayISO())+'T00:00'); wkStart.setDate(wkStart.getDate()+i*7);
    ws.push({n:i+1, start:isoLocal(wkStart), phase:deload?PHASE_JP[pk]+'(吸収)':PHASE_JP[pk],
      phaseKey:pk, phaseCol:PHASE_COL[pk], deload, target,
      key1:workouts[0].label, key2:workouts[1]?workouts[1].label:'', workouts});
  }
  // phase summary for the timeline
  const phases=[]; ['base','build','peak','taper'].forEach(k=>{
    const idx=ws.map((w,i)=>w.phaseKey===k?i:-1).filter(i=>i>=0);
    if(idx.length) phases.push({key:k,label:PHASE_JP[k],col:PHASE_COL[k],w0:idx[0],w1:idx[idx.length-1],weeks:idx.length});
  });
  return {race:{...cfg,label:def.label,m:def.m}, weeks:ws, phases, peak:Math.round(peak),
    startVol:Math.round(curWeekly), season:true, createdAt:todayISO()};
}

/* ---- data-driven threshold (critical speed) detection ---- */
function thresholdDetect(){
  const durs=[120,180,300,600,900,1200];
  const bestSpd={}; DB.activities.forEach(a=>{ if(!a.spdCurve)return;
    durs.forEach(t=>{ if(a.spdCurve[t]!=null && (bestSpd[t]==null||a.spdCurve[t]>bestSpd[t])) bestSpd[t]=a.spdCurve[t]; }); });
  const have=durs.filter(t=>bestSpd[t]!=null);
  let csFit=null;
  if(have.length>=3){
    let n=0,st=0,sd=0,stt=0,std=0;
    have.forEach(t=>{ const dd=bestSpd[t]*t; n++; st+=t; sd+=dd; stt+=t*t; std+=t*dd; });
    const denom=(n*stt-st*st);
    if(denom!==0){ const CS=(n*std-st*sd)/denom; const Dp=(sd-CS*st)/n; csFit={cs:CS, dPrime:Dp}; }
  }
  const csVal = csFit? csFit.cs : null;
  if(csVal==null||csVal<=0) return null;
  const tPaceSec=1000/csVal;
  // LT-HR: mean HR of the ~10min segment whose speed sits closest to CS
  let ltHr=null, bestErr=Infinity;
  DB.activities.forEach(a=>{ if(!a.stream)return; const s=a.stream;
    for(let i=0;i<s.length;i++){ let j=i; const seg=[];
      while(j<s.length && s[j][0]-s[i][0]<600){ seg.push(s[j]); j++; }
      if(seg.length>3 && s[j-1] && s[j-1][0]-s[i][0]>=560){
        const vs=seg.map(p=>p[2]).filter(x=>x!=null); const hrs=seg.map(p=>p[4]).filter(x=>x!=null);
        if(vs.length&&hrs.length){ const av=vs.reduce((x,y)=>x+y)/vs.length; const err=Math.abs(av-csVal);
          if(err<bestErr && err<0.2){ bestErr=err; ltHr=Math.round(hrs.reduce((x,y)=>x+y)/hrs.length); } }
      } }
  });
  const p=DB.profile;
  const ltHrr = ltHr? clamp((ltHr-p.hrRest)/(p.hrMax-p.hrRest),0,1) : null;
  // confidence must reflect EFFORT QUALITY, not just how many duration buckets exist.
  // Easy-only data yields a nearly-flat speed curve (short≈long) and a tiny D',
  // which must NOT be reported as trustworthy.
  const shortV = bestSpd[120]||bestSpd[180]||bestSpd[300]||0;
  const longV  = bestSpd[1200]||bestSpd[900]||bestSpd[600]||0;
  const dynRange = longV>0 ? shortV/longV : 1;           // >~1.10 ⇒ real hard efforts present
  const dPrimeVal = csFit? csFit.dPrime : 0;
  const hardData = DB.activities.some(a=>a.type==='interval'||a.type==='tempo'||a.type==='race');
  let conf;
  if(dPrimeVal>=60 && (dynRange>=1.10 || hardData) && have.length>=4) conf='高';
  else if(dPrimeVal>=30 && (dynRange>=1.06 || hardData) && have.length>=3) conf='中';
  else conf='低';
  return {cs:csVal, tPaceSec, dPrime:csFit?csFit.dPrime:null, ltHr, ltHrr,
    samples:have.length, conf, dynRange, hardData, mPaceSec:tPaceSec*1.06, iPaceSec:tPaceSec*0.93, csKmh:csVal*3.6};
}

/* ---- forward PMC projection ---- */
function pmcProjection(days,dailyLoadFn){
  const s=pmc(); const last=s[s.length-1]||{ctl:0,atl:0};
  let ctl=last.ctl, atl=last.atl; const out=[];
  const kC=1-Math.exp(-1/42), kA=1-Math.exp(-1/7);
  for(let i=1;i<=days;i++){ const load=dailyLoadFn(i);
    ctl=ctl+(load-ctl)*kC; atl=atl+(load-atl)*kA;
    out.push({day:i, ctl, atl, tsb:ctl-atl, load}); }
  return out;
}
function projectPlanPMC(){
  if(!DB.plan) return null;
  const raceDay=dayDiff(todayISO(),DB.plan.race.date); if(raceDay<1) return null;
  const perKmTrimp=(()=>{ const rec=DB.activities.filter(a=>a.km>0).slice(-10);
    if(!rec.length) return 6; return rec.reduce((s,a)=>s+trimp(a)/a.km,0)/rec.length; })();
  const dailyFn=(i)=>{ const d=new Date(todayISO()+'T00:00'); d.setDate(d.getDate()+i);
    const wk=DB.plan.weeks.find(w=>w.start===weekKey(isoLocal(d)));
    if(!wk) return 0; const dow=(d.getDay()+6)%7;
    const shares=[0,0.13,0.22,0.13,0,0.17,0.35];
    return wk.target*shares[dow]*perKmTrimp; };
  return {proj:pmcProjection(raceDay,dailyFn), raceDay, perKmTrimp};
}
function projectionChart(pr){
  const p=pr.proj; if(!p.length) return '';
  const W=760,H=210,padL=34,padR=12,padT=14,padB=24;
  const all=[...p.map(x=>x.ctl),...p.map(x=>x.atl)]; const hi=Math.max(...all)*1.1||1;
  const X=i=>padL+(i/(p.length-1))*(W-padL-padR);
  const Y=v=>padT+(1-v/hi)*(H-padT-padB);
  const line=(key,col)=>{ let d=''; p.forEach((x,i)=>{ d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(x[key]).toFixed(1)+' '; });
    return `<path d="${d}" fill="none" stroke="${col}" stroke-width="2"/>`; };
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:210px">
    <line x1="${X(pr.raceDay-1).toFixed(1)}" y1="${padT}" x2="${X(pr.raceDay-1).toFixed(1)}" y2="${H-padB}" stroke="#33E1C4" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="${(X(pr.raceDay-1)-4).toFixed(1)}" y="${padT+10}" fill="#33E1C4" font-size="10" text-anchor="end" font-family="IBM Plex Mono">レース</text>
    ${line('ctl','#8C7DFF')}${line('atl','#FF6E5B')}</svg>
    <div class="legend"><span><span class="dot" style="background:#8C7DFF"></span>CTL予測</span><span><span class="dot" style="background:#FF6E5B"></span>ATL予測</span></div>`;
}

/* ---- limiter diagnosis ---- */
function limiterDiagnosis(){
  const evo=perfVO2max().value; if(evo<=0) return null;
  const ms=marathonShape(evo);
  const dist=DB.plan? DB.plan.race.dist : 'half';
  const th=thresholdDetect();
  const aerobic = clamp(evo/60,0,1);
  const endurance = clamp(ms.shape/100,0,1);
  const thresholdQ = th? clamp(th.csKmh/16,0,1) : 0.5;
  let speed=0.5; { let bv=0; DB.activities.forEach(a=>{ if(a.spdCurve&&a.spdCurve[60]) bv=Math.max(bv,a.spdCurve[60]); });
    if(bv&&th) speed=clamp((bv/th.cs-1)/0.5,0,1); }
  const weights={ '5k':{aerobic:.4,thresholdQ:.3,speed:.2,endurance:.1},
    '10k':{aerobic:.35,thresholdQ:.35,speed:.1,endurance:.2},
    'half':{aerobic:.25,thresholdQ:.35,speed:.05,endurance:.35},
    'full':{aerobic:.2,thresholdQ:.25,speed:.02,endurance:.53} }[dist];
  const systems=[
    {key:'aerobic',label:'有酸素上限 (VO2max)',score:aerobic,w:weights.aerobic,
     fix:'週1回のVO2インターバル (3〜5分×4〜6, 不完全休息) が最も効きます。'},
    {key:'thresholdQ',label:'乳酸閾値',score:thresholdQ,w:weights.thresholdQ,
     fix:'テンポ走20〜40分、またはクルーズ・インターバル (1km×5〜6 @T) を週1。'},
    {key:'endurance',label:'持久基盤',score:endurance,w:weights.endurance,
     fix:'週間距離とロング走を段階的に。特にフルはここが決定的。'},
    {key:'speed',label:'スピード/経済性',score:speed,w:weights.speed,
     fix:'ウィンドスプリント6〜10本、ヒルスプリント。神経筋と走効率を刺激。'},
  ];
  systems.forEach(s=>{ s.gap=s.w*(1-s.score); });
  const limiter=[...systems].sort((a,b)=>b.gap-a.gap)[0];
  const strength=[...systems].sort((a,b)=>a.gap-b.gap)[0];
  return {systems,limiter,strength,dist,evo,shape:ms.shape};
}

/* ---- durability ---- */
function durabilityScore(){
  const runs=DB.activities.filter(a=>a.decoupling!=null && a.km>=8);
  if(runs.length<3) return null;
  const recent=runs.slice(-8);
  const avgDec=recent.reduce((s,a)=>s+a.decoupling,0)/recent.length;
  const score=clamp(100-(avgDec/12)*100,0,100);
  const longest=Math.max(...DB.activities.map(a=>a.km));
  return {score,avgDec,samples:recent.length,longest};
}

/* ---- form dynamics ---- */
function formDynamics(){
  const withCad=DB.activities.filter(a=>a.cadence&&a.km>0);
  if(!withCad.length) return null;
  const recent=withCad.slice(-12);
  const meanCad=recent.reduce((s,a)=>s+a.cadence,0)/recent.length;
  const strides=recent.map(a=>{ const spd=a.km*1000/(a.durSec/60); return {date:a.date, cad:a.cadence, stride:spd/a.cadence, spd}; });
  const meanStride=strides.reduce((s,x)=>s+x.stride,0)/strides.length;
  return {meanCad,meanStride,strides,samples:recent.length};
}

/* ---- running economy ---- */
function runningEconomy(){
  const withPwr=DB.activities.filter(a=>a.avgPwr&&a.km>0&&a.hasStream);
  if(withPwr.length<2) return null;
  const p=DB.profile.weightKg||62;
  const pts=withPwr.slice(-14).map(a=>{ const spd=a.km*1000/a.durSec;
    return {date:a.date, wkg:a.avgPwr/p, spd, ecoIdx:(a.avgPwr/p)/spd}; });
  const eco=pts.reduce((s,x)=>s+x.ecoIdx,0)/pts.length;
  return {pts,eco,samples:pts.length};
}

/* ---- race predictions with confidence band ---- */
function racePredictICU(){
  const proj=raceProjections();
  let anchor=null;
  DB.activities.forEach(a=>{ if(!a.bests)return;
    [5000,10000].forEach(D=>{ if(a.bests[D] && (!anchor||a.bests[D]/D<anchor.t/anchor.D)) anchor={D,t:a.bests[D],date:a.date}; }); });
  return proj.map(r=>{
    let riegel=null;
    if(anchor) riegel=anchor.t*Math.pow(r.m/anchor.D,1.06);
    const vo2t=r.adj;
    const blend = riegel!=null? (r.m<=12000? 0.55*riegel+0.45*vo2t : 0.35*riegel+0.65*vo2t) : vo2t;
    const spread = (r.m>=21097?0.045:r.m>=10000?0.03:0.02) * (anchor?1:1.6);
    return {...r, blend, riegel, lo:blend*(1-spread), hi:blend*(1+spread), anchor};
  });
}

/* ---- training load focus (anaerobic / high / low) ---- */
function trainingLoadFocus(){
  const cut=new Date(todayISO()+'T00:00'); cut.setDate(cut.getDate()-28); const cutISO=isoLocal(cut);
  const acts=DB.activities.filter(a=>a.date>=cutISO);
  if(!acts.length) return null;
  let low=0,high=0,ana=0;
  acts.forEach(a=>{ const load=trimp(a);
    if(a.hasStream&&a.stream){ const z=hrZonesFromStream(a.stream); const tot=z.tot;
      low+=load*((z.z[0]+z.z[1])/tot); high+=load*((z.z[2]+z.z[3])/tot); ana+=load*(z.z[4]/tot); }
    else { if(a.type==='interval'){ana+=load*0.4;high+=load*0.4;low+=load*0.2;}
      else if(a.type==='tempo'){high+=load*0.6;low+=load*0.4;}
      else {low+=load;} } });
  const tot=low+high+ana||1;
  return {low,high,ana,tot,pLow:low/tot,pHigh:high/tot,pAna:ana/tot};
}

/* ---- weekly review narrative ---- */
function weeklyReview(){
  const agg=weeklyAgg(2); const cur=agg[1], prev=agg[0];
  const st=trainingStatus(); const c=currentPMC();
  const dist=intensityDistribution(28);
  const bits=[];
  bits.push(`今週は ${round(cur.km,0)}km / ${cur.n}本 (前週比 ${cur.km>=prev.km?'+':''}${round(cur.km-prev.km,0)}km)。`);
  bits.push(`体力(CTL)は ${round(c.ctl,0)}、調子(TSB)は ${c.tsb>=0?'+':''}${round(c.tsb,0)}。ステータスは「${st.label}」。`);
  if(dist) bits.push(`直近28日の強度配分は ${dist.model.split(' ')[0]}型 (楽${Math.round(dist.low*100)}% / 閾値${Math.round(dist.mid*100)}% / 高${Math.round(dist.high*100)}%)。`);
  const dur=durabilityScore(); if(dur) bits.push(`距離耐性スコア ${round(dur.score,0)} (平均デカップリング ${round(dur.avgDec,1)}%)。`);
  const lim=limiterDiagnosis(); if(lim) bits.push(`現在の主なリミッターは「${lim.limiter.label}」。${lim.limiter.fix}`);
  try{ const comp=seasonCompliance(); if(comp&&comp.rows.length){ const r=comp.rows[comp.rows.length-1];
    bits.push(`計画遵守: 先週 実績${round(r.actual,0)}km / 計画${r.target}km（${Math.round(r.volR*100)}%）・キー練習${r.keyHit?'✓実行':'未実行'}。`); } }catch(e){}
  try{ const cutoff=(()=>{const d=new Date(todayISO()+'T00:00');d.setDate(d.getDate()-7);return isoLocal(d);})();
    [[1000,'1km'],[5000,'5km'],[10000,'10km']].forEach(([D,lbl])=>{
      let recent=null, prior=null;
      DB.activities.forEach(a=>{ if(!a.bests||a.bests[D]==null) return;
        if(a.date>=cutoff){ if(recent==null||a.bests[D]<recent) recent=a.bests[D]; }
        else { if(prior==null||a.bests[D]<prior) prior=a.bests[D]; } });
      if(recent!=null && (prior==null||recent<prior)) bits.push(`🏅 ${lbl}ベスト更新: ${hms(recent)}。`); }); }catch(e){}
  let action;
  if(st.key==='overreach'||st.key==='strained') action='来週は総負荷を2〜3割落として吸収を優先。';
  else if(dist&&dist.mid>=0.35) action='中強度への偏りを解消。楽な日を本当に楽に、質の日はしっかり追い込む二極化を。';
  else if(lim) action=lim.limiter.fix;
  else action='現在の配分は良好。距離を1割ずつ積み増しましょう。';
  try{ const pw=currentPlanWeek(); if(pw&&pw.phaseKey&&typeof PHASE_GUIDE!=='undefined'&&PHASE_GUIDE[pw.phaseKey])
    action+=` 今週は${PHASE_GUIDE[pw.phaseKey].label}期・「${PHASE_GUIDE[pw.phaseKey].aim}」に集中。`; }catch(e){}
  return {bits,action,cur,prev,st};
}

let streamActive=new Set(['hr','pace','alt']);
const SERIES={
  hr:{col:4,color:'#FF6E5B',label:'心拍',unit:'bpm',fmt:v=>Math.round(v)},
  pace:{col:2,color:'#33E1C4',label:'ペース',unit:'/km',fmt:v=>paceStr(1000/v)},
  pwr:{col:6,color:'#8C7DFF',label:'パワー',unit:'W',fmt:v=>Math.round(v)+'W'},
  cad:{col:5,color:'#9BD860',label:'ケイデンス',unit:'spm',fmt:v=>Math.round(v)},
  alt:{col:7,color:'#F5B23E',label:'標高',unit:'m',fmt:v=>Math.round(v)+'m'},
};
function hrZonesFromStream(stream){
  const p=DB.profile; const z=[0,0,0,0,0]; let tot=0;
  for(let i=1;i<stream.length;i++){ const hr=stream[i][4]; if(hr==null)continue;
    const dt=Math.max(0,stream[i][0]-stream[i-1][0])||1;
    const f=(hr-p.hrRest)/(p.hrMax-p.hrRest);
    const zi=f<0.6?0:f<0.7?1:f<0.8?2:f<0.9?3:4; z[zi]+=dt; tot+=dt; }
  return {z,tot:tot||1};
}
function streamChart(act){
  const s=act.stream; if(!s||s.length<3) return '';
  const W=760,H=270,padL=8,padR=8,padT=16,padB=24;
  const useDist=s.every(p=>p[1]!=null);
  const xmax = useDist? s[s.length-1][1] : s[s.length-1][0];
  const X=i=> padL + ((useDist?s[i][1]:s[i][0])/ (xmax||1)) * (W-padL-padR);
  let out='';
  // elevation area first (behind)
  if(streamActive.has('alt')){
    const alts=s.map(p=>p[7]).filter(v=>v!=null);
    if(alts.length){ const amin=Math.min(...alts),amax=Math.max(...alts); const rng=(amax-amin)||1;
      const ay=v=>H-padB-((v-amin)/rng)*(H-padT-padB)*0.45;
      let top='',area='M'+X(0).toFixed(1)+' '+(H-padB);
      s.forEach((p,i)=>{ if(p[7]!=null){ const xx=X(i).toFixed(1),yy=ay(p[7]).toFixed(1);
        top+=(top?'L':'M')+xx+' '+yy+' '; area+=' L'+xx+' '+yy; } });
      area+=` L${X(s.length-1).toFixed(1)} ${H-padB} Z`;
      out+=`<path d="${area}" fill="#F5B23E" fill-opacity=".10"/><path d="${top}" fill="none" stroke="#F5B23E" stroke-opacity=".35" stroke-width="1"/>`;
    }
  }
  // each active line series normalised to own range
  ['pwr','cad','pace','hr'].forEach(key=>{ if(!streamActive.has(key))return; const sp=SERIES[key];
    const vals=s.map(p=>p[sp.col]).filter(v=>v!=null); if(!vals.length)return;
    const vmin=Math.min(...vals),vmax=Math.max(...vals); const rng=(vmax-vmin)||1;
    const y=v=>H-padB-((v-vmin)/rng)*(H-padT-padB)*0.92;
    let path='',started=false;
    s.forEach((p,i)=>{ const v=p[sp.col]; if(v==null){return;} path+=(started?'L':'M')+X(i).toFixed(1)+' '+y(v).toFixed(1)+' '; started=true; });
    out+=`<path d="${path}" fill="none" stroke="${sp.color}" stroke-width="1.7" stroke-linejoin="round" opacity=".95"/>`;
  });
  // hover interaction layer
  out+=`<line id="actVline" x1="0" x2="0" y1="${padT}" y2="${H-padB}" stroke="#EAEEF6" stroke-opacity=".25" style="display:none"/>
    <rect id="actHover" x="0" y="0" width="${W}" height="${H}" fill="transparent" style="cursor:crosshair"/>`;
  return `<div class="streamwrap"><div class="cursor-read" id="actCursor"></div>
    <svg viewBox="0 0 ${W} ${H}" class="chart" style="height:270px" id="actSvg" data-usedist="${useDist?1:0}" data-xmax="${xmax}">${out}</svg></div>`;
}
function wireStreamHover(act){
  const svg=el('actSvg'); if(!svg)return; const s=act.stream;
  const W=760,padL=8,padR=8; const xmax=parseFloat(svg.dataset.xmax); const useDist=svg.dataset.usedist==='1';
  const vline=el('actVline'), read=el('actCursor'), hover=el('actHover');
  function move(clientX){ const r=svg.getBoundingClientRect(); const sx=(clientX-r.left)/r.width*W;
    const frac=clamp((sx-padL)/(W-padL-padR),0,1); const target=frac*xmax;
    let best=0,bd=1e9; for(let i=0;i<s.length;i++){ const xv=useDist?s[i][1]:s[i][0]; if(xv==null)continue;
      const dd=Math.abs(xv-target); if(dd<bd){bd=dd;best=i;} }
    const p=s[best]; const px=padL+(target/(xmax||1))*(W-padL-padR);
    vline.setAttribute('x1',px); vline.setAttribute('x2',px); vline.style.display='block';
    let html=`<div style="color:var(--ink-3)">${useDist?round(p[1]/1000,2)+' km':hms(p[0])}</div>`;
    ['pace','hr','pwr','cad','alt'].forEach(k=>{ if(!streamActive.has(k))return; const sp=SERIES[k]; const v=p[sp.col];
      if(v!=null) html+=`<div style="color:${sp.color}">${sp.label} ${sp.fmt(v)}</div>`; });
    read.innerHTML=html; read.style.display='block';
  }
  hover.addEventListener('mousemove',e=>move(e.clientX));
  hover.addEventListener('mouseleave',()=>{vline.style.display='none';read.style.display='none';});
  hover.addEventListener('touchmove',e=>{if(e.touches[0])move(e.touches[0].clientX);},{passive:true});
}

  el('viewSub').textContent=`${round(a.km,2)} km · ${hms(a.durSec)}`;
  const wkg=a.avgPwr?round(a.avgPwr/p.weightKg,2):null;
