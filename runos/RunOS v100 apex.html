<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RunOS 100 — APEX · Running Intelligence</title>
<style>
/* ============================================================
   MERIDIAN — design tokens
   motif: floodlit all-weather track at dusk + chronograph
   color encodes physiological intensity (not decoration):
   teal=fresh/aerobic  gold=threshold  coral=strain/anaerobic
   ============================================================ */
:root{
  --bg:#0B0E15;            /* deep slate-navy, not pure black */
  --bg-2:#0E1420;
  --surface:#141B29;       /* raised card */
  --surface-2:#1A2333;     /* higher raise */
  --line:#232E42;          /* hairline */
  --line-soft:#1C2536;
  --ink:#EAEEF6;           /* primary text */
  --ink-2:#9AA6BC;         /* muted */
  --ink-3:#5E6a82;         /* faint */

  --teal:#33E1C4;          /* fresh / ready / Z1-2 */
  --teal-dim:#1c7d70;
  --lime:#9BD860;          /* aerobic / Z3 */
  --gold:#F5B23E;          /* threshold / Z4 */
  --coral:#FF6E5B;         /* anaerobic / strain / Z5 / risk */
  --violet:#8C7DFF;        /* fitness accent */

  --ok:#33E1C4; --warn:#F5B23E; --bad:#FF6E5B;

  --shadow: 0 18px 40px -22px rgba(0,0,0,.75);
  --r:16px; --r-sm:11px;

  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --disp:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --body:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 85% -10%, rgba(51,225,196,.06), transparent 55%),
    radial-gradient(90% 70% at -5% 5%, rgba(140,125,255,.06), transparent 50%),
    var(--bg);
  color:var(--ink);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer}
::selection{background:rgba(51,225,196,.28)}

/* numeric readouts feel like a lap-timer LCD */
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}

/* ---------- app shell ---------- */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100%}
.rail{
  position:sticky;top:0;height:100vh;
  border-right:1px solid var(--line-soft);
  background:linear-gradient(180deg,var(--bg-2),var(--bg));
  padding:22px 16px;display:flex;flex-direction:column;gap:6px;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
.brand .mark{width:30px;height:30px;flex:0 0 auto}
.brand h1{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:.14em;margin:0}
.brand small{display:block;color:var(--ink-3);font-size:9.5px;letter-spacing:.34em;margin-top:2px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
  color:var(--ink-2);text-decoration:none;font-size:14px;font-weight:500;
  transition:background .16s,color .16s;
}
.nav a svg{width:19px;height:19px;flex:0 0 auto;stroke-width:1.7}
.nav a:hover{background:var(--surface);color:var(--ink)}
.nav a.on{background:var(--surface-2);color:var(--ink)}
.nav a.on svg{color:var(--teal)}
.rail .foot{margin-top:auto;display:flex;flex-direction:column;gap:8px}
.rail .foot button{
  background:transparent;border:1px solid var(--line);color:var(--ink-2);
  border-radius:10px;padding:9px;font-size:12px;transition:.16s;
}
.rail .foot button:hover{border-color:var(--teal-dim);color:var(--ink)}

.main{min-width:0;padding:30px 34px 90px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px}
.topbar-right{display:flex;align-items:center;gap:12px}
.gearbtn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;
  background:var(--surface);border:1px solid var(--line);color:var(--ink-2);text-decoration:none;flex:0 0 auto;transition:color .15s,border-color .15s}
.gearbtn:hover{color:var(--teal);border-color:var(--teal-dim)}
.gearbtn svg{width:19px;height:19px}
.topbar .h{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.01em;margin:0}
.topbar .sub{color:var(--ink-2);font-size:13px;margin-top:3px}
.topbar .date{color:var(--ink-3);font-size:12px;text-align:right;letter-spacing:.04em}

/* ---------- primitives ---------- */
.card{
  background:linear-gradient(180deg,var(--surface),var(--bg-2));
  border:1px solid var(--line-soft);border-radius:var(--r);
  padding:18px;position:relative;
}
.card h3{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-2);margin:0 0 14px}
.grid{display:grid;gap:16px}
.eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);font-weight:600}

.gb{cursor:pointer;position:relative}
.gb::after{content:"?";position:absolute;top:9px;right:11px;width:16px;height:16px;
  border:1px solid var(--line);border-radius:50%;color:var(--ink-3);font-size:10px;
  display:grid;place-items:center;font-family:var(--mono);opacity:.6;transition:.16s}
.gb:hover::after{border-color:var(--teal);color:var(--teal);opacity:1}

.stat{display:flex;flex-direction:column;gap:5px}
.stat .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.stat .v{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1;letter-spacing:-.02em}
.stat .u{font-size:12px;color:var(--ink-2)}
.stat .d{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:5px}
.up{color:var(--teal)} .down{color:var(--coral)} .flat{color:var(--ink-3)}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
  font-size:11px;font-weight:600;letter-spacing:.02em}
.pill.teal{background:rgba(51,225,196,.12);color:var(--teal)}
.pill.gold{background:rgba(245,178,62,.13);color:var(--gold)}
.pill.coral{background:rgba(255,110,91,.13);color:var(--coral)}
.pill.violet{background:rgba(140,125,255,.14);color:var(--violet)}
.pill.mute{background:var(--surface-2);color:var(--ink-2)}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* ---------- TODAY: instrument cluster (signature) ---------- */
.cluster{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:stretch}
.dialcard{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 0%, rgba(51,225,196,.05), transparent 60%),
    linear-gradient(180deg,var(--surface),var(--bg-2));
  border:1px solid var(--line-soft);border-radius:var(--r);padding:22px}
.dial{width:240px;height:240px;position:relative}
.dial .verdict{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.dial .score{font-family:var(--mono);font-size:58px;font-weight:600;line-height:1;letter-spacing:-.03em}
.dial .label{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
.dial .sub{color:var(--ink-2);font-size:11px;margin-top:6px;max-width:150px}

.verdictcard{display:flex;flex-direction:column;gap:14px}
.callout{background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:12px;padding:15px 16px}
.callout .t{font-family:var(--disp);font-weight:700;font-size:15px;margin-bottom:5px}
.callout .b{color:var(--ink-2);font-size:13.5px;line-height:1.55}
.subscores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ss{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:11px;padding:12px}
.ss .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.ss .v{font-family:var(--mono);font-size:22px;font-weight:600;margin-top:4px}
.ss .bar{height:4px;border-radius:3px;background:var(--line);margin-top:8px;overflow:hidden}
.ss .bar > i{display:block;height:100%;border-radius:3px}

/* ---------- charts ---------- */
.chart{width:100%;display:block}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11.5px;color:var(--ink-2)}
.legend span{display:inline-flex;align-items:center;gap:6px}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--ink-3);font-weight:600;font-size:10.5px;letter-spacing:.12em;
  text-transform:uppercase;padding:0 12px 10px;border-bottom:1px solid var(--line-soft)}
td{padding:11px 12px;border-bottom:1px solid var(--line-soft)}
tr:last-child td{border-bottom:0}
td.n,th.n{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
.race-row td{padding:14px 12px}
.rt{font-family:var(--mono);font-size:19px;font-weight:600}
.rt small{font-size:11px;color:var(--ink-2);font-family:var(--body);font-weight:400}

/* zone ticks under table (efficiency) */
.zbar{display:flex;height:10px;border-radius:4px;overflow:hidden;border:1px solid var(--line-soft)}
.zbar > i{height:100%}

/* ---------- forms ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:var(--ink-2);font-weight:500}
.field input,.field select{
  background:var(--bg-2);border:1px solid var(--line);border-radius:10px;
  color:var(--ink);padding:11px 12px;font-family:var(--mono);font-size:14px;width:100%;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(51,225,196,.1)}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.btn{background:var(--teal);color:#04150f;border:0;border-radius:11px;padding:12px 18px;
  font-weight:700;font-size:14px;letter-spacing:.01em;transition:.16s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--teal-dim)}

/* ---------- glass-box drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(4,7,12,.62);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:.22s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);z-index:50;
  background:linear-gradient(180deg,var(--surface),var(--bg-2));border-left:1px solid var(--line);
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  padding:26px 26px 40px;overflow-y:auto;box-shadow:-30px 0 60px -30px rgba(0,0,0,.8)}
.drawer.on{transform:translateX(0)}
.drawer .x{position:absolute;top:18px;right:18px;background:var(--surface-2);border:1px solid var(--line);
  color:var(--ink-2);width:34px;height:34px;border-radius:9px;font-size:18px}
.drawer .glabel{color:var(--teal);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}
.drawer h2{font-family:var(--disp);font-weight:700;font-size:22px;margin:8px 0 4px}
.drawer .lede{color:var(--ink-2);font-size:13.5px;line-height:1.6;margin-bottom:20px}
.drawer .sec{margin:20px 0}
.drawer .sec .st{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:10px}
.formula{background:var(--bg);border:1px solid var(--line-soft);border-radius:10px;padding:13px 14px;
  font-family:var(--mono);font-size:12.5px;color:var(--teal);line-height:1.7;overflow-x:auto}
.inputs{display:flex;flex-direction:column;gap:1px;border:1px solid var(--line-soft);border-radius:10px;overflow:hidden}
.inputs .row{display:flex;justify-content:space-between;padding:11px 13px;background:var(--bg-2);font-size:13px}
.inputs .row .l{color:var(--ink-2)}
.inputs .row .r{font-family:var(--mono);font-weight:600}
.drivers{display:flex;flex-direction:column;gap:8px}
.driver{display:flex;align-items:center;gap:10px;font-size:13px}
.driver .track{flex:1;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.driver .track > i{display:block;height:100%;border-radius:4px}
.driver .dv{font-family:var(--mono);font-size:12px;color:var(--ink-2);width:46px;text-align:right}

/* ---------- misc ---------- */
.hint{color:var(--ink-3);font-size:12px}
.row-actions{display:flex;gap:8px;flex-wrap:wrap}
.chipbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{background:var(--surface);border:1px solid var(--line-soft);border-radius:999px;
  padding:7px 14px;font-size:12.5px;color:var(--ink-2);font-weight:500}
.chip.on{border-color:var(--teal);color:var(--ink);background:var(--surface-2)}
.empty{text-align:center;padding:50px 20px;color:var(--ink-3)}
.empty svg{width:40px;height:40px;margin-bottom:12px;opacity:.5}
/* ---------- FIT import ---------- */
.drop{border:1.5px dashed var(--line);border-radius:14px;padding:22px;text-align:center;
  transition:.16s;cursor:pointer;background:var(--bg-2)}
.drop:hover,.drop.over{border-color:var(--teal);background:var(--surface-2)}
.drop svg{width:30px;height:30px;color:var(--teal);margin-bottom:8px}
.drop .t{font-weight:600;font-size:14px}
.drop .s{color:var(--ink-3);font-size:12px;margin-top:3px}
.importlog{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.importlog .il{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:8px 11px;border-radius:9px;background:var(--bg-2);border:1px solid var(--line-soft)}

/* ---------- activity detail ---------- */
.back{display:inline-flex;align-items:center;gap:7px;color:var(--ink-2);background:transparent;
  border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;margin-bottom:16px}
.back:hover{border-color:var(--teal-dim);color:var(--ink)}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;
  background:var(--line-soft);border:1px solid var(--line-soft);border-radius:14px;overflow:hidden;margin-bottom:16px}
.hs{background:var(--bg-2);padding:14px 16px}
.hs .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.hs .v{font-family:var(--mono);font-size:21px;font-weight:600;margin-top:4px}
.hs .v small{font-size:11px;color:var(--ink-2);font-family:var(--body)}
.toggles{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.tg{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;
  border:1px solid var(--line);background:var(--bg-2);color:var(--ink-3);cursor:pointer;transition:.14s}
.tg.on{color:var(--ink)}
.tg .dot{width:9px;height:3px;border-radius:2px}
.streamwrap{position:relative}
.streamwrap .cursor-read{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:12px;
  background:rgba(11,14,21,.85);border:1px solid var(--line);border-radius:8px;padding:6px 9px;pointer-events:none;display:none}
.verdict-line{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:11px;
  background:var(--bg-2);border:1px solid var(--line-soft);margin-top:12px}
.verdict-line .big{font-family:var(--mono);font-size:24px;font-weight:600}

.view{display:none} .view.on{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* mobile bottom tab */
.tabbar{display:none}
@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .rail{display:none}
  .main{padding:20px 16px 96px}
  .cluster{grid-template-columns:1fr}
  .dialcard{padding:18px}
  .subscores{grid-template-columns:1fr 1fr 1fr}
  .formgrid{grid-template-columns:1fr}
  .topbar .h{font-size:22px}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:rgba(11,14,21,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:flex-start;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .tabbar a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-3);
    text-decoration:none;font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:10px;flex:0 0 auto;min-width:58px}
  .tabbar a svg{width:21px;height:21px;stroke-width:1.7}
  .tabbar a.on{color:var(--teal)}
}
@media (max-width:520px){ .subscores{grid-template-columns:1fr} }
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* ---- v2 additions ---- */
:root{--purple:#8C7DFF;}
.statusline{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.statusline::-webkit-scrollbar{display:none}
.statusline .pill{white-space:nowrap!important;flex:0 0 auto}
.statusline .race-mini{flex:0 0 auto}
.racebadge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:11px;background:var(--surface);border:1px solid var(--line);text-decoration:none;line-height:1.25}
.racebadge:hover{border-color:var(--teal-dim)}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;color:var(--ink-2);font-size:12px;padding:5px 13px;border-radius:7px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.35)}
.btn.primary{background:var(--teal);color:#06251F;border-color:var(--teal);font-weight:700}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{color:var(--coral);border-color:#5A2B26}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wfield label{display:block;font-size:11px;color:var(--ink-3);margin-bottom:5px;letter-spacing:.04em}
.winput{display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
.winput input{border:0;background:transparent;color:var(--ink);width:100%;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;outline:none}
.winput span{font-size:11px;color:var(--ink-3)}
.prgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.prcell{background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.prcell:hover{border-color:var(--teal-dim)}
.prcell .k{font-size:11px;color:var(--ink-3);letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.prcell .v{font-size:19px;font-weight:700;margin-top:4px;color:var(--ink)}
.prcell .u{font-size:11px;color:var(--ink-2);margin-top:3px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr) 52px;gap:4px;margin-bottom:4px}
.calhead{font-size:10.5px;color:var(--ink-3);text-align:center;padding:4px 0;letter-spacing:.06em}
.calrow{display:grid;grid-template-columns:repeat(7,1fr) 52px;gap:4px;margin-bottom:4px}
.calcell{min-height:64px;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:8px;padding:4px 5px;overflow:hidden}
.calcell.off{background:transparent;border-color:transparent}
.calcell.today{border-color:var(--teal-dim);box-shadow:0 0 0 1px var(--teal-dim) inset}
.calcell .cd{font-size:10.5px;color:var(--ink-3);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.calchip{font-size:10.5px;color:var(--ink);padding:2px 5px;border-radius:4px;margin-top:3px;cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap}
.calchip:hover{filter:brightness(1.25)}
.calwk{display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink-2);background:var(--surface);border:1px solid var(--line-soft);border-radius:8px}
.calwk small{font-size:9px;color:var(--ink-3);margin-left:1px}
.routemap{background:radial-gradient(ellipse at 50% 40%, #121826 0%, #0C101B 75%);border-radius:12px}
details summary::-webkit-details-marker{color:var(--ink-3)}
@media(max-width:760px){ .wgrid{grid-template-columns:1fr 1fr} .calcell{min-height:52px} .calgrid,.calrow{grid-template-columns:repeat(7,1fr) 40px} .statusline{gap:7px} }
/* ---- v3: Knowledge Base ---- */
.kb-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:720px){.kb-grid{grid-template-columns:1fr}}
.kb-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;
  transition:border-color .16s,transform .16s,box-shadow .16s}
.kb-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.28)}
.kb-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.kb-icon{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:38px;border-radius:10px;
  background:var(--surface-2);font-size:19px;color:var(--teal)}
.kb-cat{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:2px}
.kb-title{font-family:var(--disp);font-weight:700;font-size:16px;line-height:1.3;color:var(--ink)}
.kb-summary{font-size:13px;line-height:1.65;color:var(--ink-2)}
.kb-live{margin-top:12px;padding:11px 13px;border-radius:10px;background:var(--surface-2);border-left:3px solid var(--ink-3)}
.kb-live.ok{border-left-color:var(--teal)}
.kb-live.warn{border-left-color:var(--gold)}
.kb-live-k{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:3px}
.kb-live-v{font-size:15px;color:var(--ink);font-weight:600}
.kb-live-verdict{font-size:12px;color:var(--ink-2);margin-top:2px}
.kb-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.kb-tag{font-size:10.5px;color:var(--ink-3);background:var(--surface-2);padding:3px 9px;border-radius:999px}
.kb-sec-b{font-size:13.5px;line-height:1.7;color:var(--ink-2);margin-top:4px}
.verdict-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}



/* ============================================================
   v77.2 Mobile layout hardening
   Fixes iPhone Edge horizontal overflow / desktop grids leaking
   into mobile views while preserving MERIDIAN visual language.
   ============================================================ */
*,*::before,*::after{min-width:0}
html,body{width:100%;max-width:100%;overflow-x:hidden}
.app,.main,.view,.card,.grid,.cluster,.verdictcard,.dialcard{min-width:0;max-width:100%}
.card{overflow-wrap:anywhere;word-break:normal}
.hybrid-menu{margin-top:12px;padding:14px;border-radius:14px;background:var(--bg-2);border:1px solid var(--line-soft)}
.hm-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.hm-title{font-family:var(--disp);font-size:21px;font-weight:800;line-height:1.2;letter-spacing:.01em}
.hm-body{color:var(--ink-2);font-size:13.5px;line-height:1.65;margin-top:6px}
.hm-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
.hm-metric{background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:10px}
.hm-metric .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
.hm-metric .v{font-family:var(--mono);font-size:19px;font-weight:700;margin-top:3px;color:var(--ink)}
.hybrid-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.hybrid-actions .btn{min-height:44px;white-space:nowrap}

@media (max-width:900px){
  body{font-size:15px}
  .main{width:100%;max-width:100vw;padding:18px 16px calc(108px + env(safe-area-inset-bottom));overflow-x:hidden}
  .topbar{align-items:flex-start;margin-bottom:18px}
  .topbar .date{font-size:11px;white-space:nowrap}
  /* Collapse any inline desktop grid used by generated views. */
  .grid[style*="grid-template-columns"],
  #view-fitness > .grid,
  #view-plan .grid,
  #view-log .grid,
  #view-insights .grid,
  #view-library .grid{
    grid-template-columns:1fr !important;
  }
  .card{padding:16px;border-radius:16px;overflow-x:auto;max-width:100%}
  .cluster{grid-template-columns:1fr !important;gap:14px}
  .dial{width:min(220px,70vw);height:min(220px,70vw)}
  .dial .score{font-size:48px}
  .callout{padding:14px;border-radius:12px}
  .subscores{grid-template-columns:1fr !important;gap:8px}
  .ss{padding:11px}
  .hm-title{font-size:20px}
  .hm-top{flex-direction:column;align-items:flex-start}
  .hm-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
  .hm-metric{padding:9px}
  .hm-metric .v{font-size:17px}
  .hybrid-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hybrid-actions .btn:first-child{grid-column:1/-1}
  .hybrid-actions .btn{width:100%;justify-content:center;white-space:normal}
  .statusline,.chipbar,.toggles{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:2px}
  .seg{flex:0 0 auto}
  .field input,.field select,.winput input{font-size:16px}
  .formgrid{grid-template-columns:1fr !important;gap:0}
  .inputs .row{gap:12px;align-items:flex-start}
  .inputs .row .l{flex:1;min-width:0}
  .inputs .row .r{text-align:right;max-width:58%;overflow-wrap:anywhere}
  table{min-width:560px;width:100%}
  th,td{padding:10px 9px}
  .race-row .rt{font-size:18px}
  .prgrid{grid-template-columns:1fr !important}
  .drawer{width:min(420px,94vw);padding:22px 18px 34px}
  .calgrid,.calrow{min-width:640px;grid-template-columns:repeat(7,1fr) 46px !important}
  .calcell{min-height:54px}
}
@media (max-width:520px){
  .main{padding-left:14px;padding-right:14px}
  .card{padding:14px}
  .hm-grid{grid-template-columns:1fr}
  .topbar{gap:8px}
  .topbar .sub{font-size:12px}
  .stat .v{font-size:27px}
  table{min-width:520px}
}


/* ============================================================
   v77.3 Mobile density polish
   Keep the MERIDIAN aesthetic, but reduce excessive vertical stacking.
   Dense summary strips + mobile race cards + two-column PR board.
   ============================================================ */
.race-mobile-list{display:none}
.race-table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.metric-rail{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}

@media (max-width:900px){
  .card{overflow:hidden}
  .race-table-wrap{display:none}
  .race-mobile-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:2px}
  .race-mini{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:12px;padding:12px;min-width:0}
  .race-mini .name{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink);line-height:1.1}
  .race-mini .time{font-family:var(--mono);font-size:23px;font-weight:700;line-height:1.1;margin-top:8px;color:var(--ink)}
  .race-mini .pace{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:4px}
  .race-mini .meta{font-size:10.5px;color:var(--ink-3);margin-top:5px;line-height:1.35}

  /* Today: keep secondary gauges in a compact strip instead of stacking. */

  #view-today .hm-grid{grid-template-columns:repeat(3,minmax(0,1fr)) !important;gap:7px !important}
  #view-today .hm-metric{padding:8px 6px !important}
  #view-today .hm-metric .k{font-size:8.8px;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #view-today .hm-metric .v{font-size:16px !important;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #view-today .subscores{grid-template-columns:repeat(3,minmax(0,1fr)) !important;gap:7px !important}
  #view-today .ss{padding:9px 8px !important;border-radius:10px}
  #view-today .ss .k{font-size:9px;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #view-today .ss .v{font-size:20px !important;line-height:1.05;margin-top:4px}
  #view-today .ss .bar{height:3px;margin-top:7px}

  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"]{grid-template-columns:repeat(3,minmax(0,1fr)) !important;gap:7px !important}
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .card{padding:10px !important;border-radius:12px}
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .stat .k{font-size:9px;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .stat .v{font-size:23px !important}
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .stat .d,
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .stat .u{font-size:10px;line-height:1.25}

  /* Fitness: top three metrics should remain a compact row on phones. */
  #view-fitness > .grid:first-child{grid-template-columns:repeat(3,minmax(0,1fr)) !important;gap:7px !important}
  #view-fitness > .grid:first-child .card{padding:11px !important;border-radius:12px}
  #view-fitness > .grid:first-child .stat .k{font-size:9px;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #view-fitness > .grid:first-child .stat .v{font-size:23px !important}
  #view-fitness > .grid:first-child .stat .u{font-size:10px;line-height:1.25}

  /* Plan: PR cards are readable as a 2-column board; race projections are compact cards. */
  #view-plan .prgrid{grid-template-columns:repeat(2,minmax(0,1fr)) !important;gap:9px !important}
  #view-plan .prcell{padding:12px;border-radius:12px}
  #view-plan .prcell .k{font-size:11px;line-height:1.25}
  #view-plan .prcell .v{font-size:25px;line-height:1.05}
  #view-plan .prcell .u{font-size:11px;line-height:1.25}

  /* Forms keep one column, but analytical pairs may use cards rather than long stacks. */
  #view-plan .inputs .row{padding:10px 12px}
  .gb::after{top:10px;right:10px}
}
@media (max-width:390px){
  .race-mobile-list{grid-template-columns:1fr 1fr;gap:7px}
  .race-mini{padding:10px}
  .race-mini .time{font-size:20px}
  #view-today .ss .v{font-size:18px !important}
  #view-today .verdictcard > .grid[style*="1fr 1fr 1fr"] .stat .v{font-size:20px !important}
  #view-plan .prcell .v{font-size:22px}
}

/* ---- v78: Week Ahead auto-schedule ---- */
.wa-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.wa-day{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:11px 9px;display:flex;flex-direction:column;gap:3px;min-height:150px}
.wa-day.today{background:var(--surface-2);border-color:var(--teal-dim);box-shadow:0 0 0 1px var(--teal-dim)}
.wa-dow{font-size:12px;font-weight:700;color:var(--ink-2)}
.wa-now{font-size:9px;color:var(--teal);border:1px solid var(--teal-dim);border-radius:5px;padding:0 4px;margin-left:2px}
.wa-cat{font-size:11px;font-weight:700;letter-spacing:.02em}
.wa-km{font-size:19px;font-weight:600}
.wa-km small{font-size:10px;color:var(--ink-3);margin-left:1px}
.wa-pace{font-size:10.5px;color:var(--ink-3)}
.wa-tsb{font-size:10px;margin-top:1px}
.wa-why{font-size:10px;color:var(--ink-3);line-height:1.4;margin-top:auto}
@media(max-width:720px){.wa-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:440px){.wa-grid{grid-template-columns:repeat(2,1fr)}}
/* ---- v78: adjust drawer polish (previously unstyled) ---- */
.drawer .compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.drawer .compare .box{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:13px}
.drawer .compare .box b{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
.drawer .compare .box .big{font-family:var(--disp);font-weight:700;font-size:16px;margin:6px 0 4px;line-height:1.3}
.drawer .compare .box .hint{font-size:12px}
.adjust-option{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 13px;border:1px solid var(--line-soft);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.adjust-option:hover{border-color:var(--teal-dim);background:var(--surface-2)}
.adjust-option b{display:block;font-size:14px;margin-bottom:2px}
.adjust-option span{font-size:12px;color:var(--ink-2);line-height:1.45}
/* ---- v79: meaning box + coach + zones ---- */
.means{background:rgba(51,225,196,.06);border:1px solid rgba(51,225,196,.18);border-radius:11px;padding:11px 13px;font-size:12.5px;line-height:1.7;color:var(--ink-2)}
.means-k{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-right:8px}
.zdot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
.drawer .means{margin:14px 0}
/* ---- v80: shoes + week-ahead shoe ---- */
.shoe-list{display:flex;flex-direction:column;gap:10px}
.shoe-row{display:flex;gap:12px;align-items:center;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:11px;padding:11px 13px}
.shoe-main{flex:1;min-width:0}
.shoe-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.shoe-cat{font-size:10px;color:var(--ink-3);background:var(--surface-2);padding:2px 7px;border-radius:999px;font-weight:500}
.shoe-brand{font-size:11px;color:var(--ink-3);margin-top:1px}
.shoe-meta{text-align:right;flex:0 0 auto}
.shoe-x{margin-top:4px;background:none;border:1px solid var(--line);color:var(--ink-3);border-radius:7px;padding:2px 9px;font-size:11px}
.shoe-x:hover{border-color:var(--coral);color:var(--coral)}
.wa-shoe{font-size:9.5px;color:var(--ink-3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr.rec-on{background:rgba(51,225,196,.08)}
tr.rec-on td{color:var(--ink)!important}
/* ---- v85: interval designer ---- */
.iv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.iv-cell{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:11px 10px;text-align:center}
.iv-k{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:8px}
.iv-step{display:flex;align-items:center;justify-content:space-between;gap:6px}
.iv-b{width:38px;height:38px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);font-size:20px;line-height:1;flex:0 0 auto}
.iv-b:active{background:var(--teal);color:#08110e}
.iv-val{font-size:17px;font-weight:600;flex:1}
.iv-val small{font-size:11px;color:var(--ink-3);margin-left:2px}
.iv-row{display:flex;align-items:center;gap:12px;margin:10px 0;flex-wrap:wrap}
.iv-row .iv-k{margin-bottom:0;min-width:72px;text-align:left}
.iv-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft)}
.iv-s{text-align:center}
.iv-sk{font-size:11px;color:var(--ink-3);margin-bottom:3px}
.iv-sv{font-size:15px;font-weight:600}
.iv-wbar{margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft)}
.iv-wbar-head{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--ink-2);margin-bottom:8px}
.iv-advice{font-size:12px;color:var(--ink-2);line-height:1.6;border-left:3px solid var(--teal);padding-left:10px;margin-top:8px}
@media(max-width:480px){.iv-grid{grid-template-columns:1fr}.iv-b{width:44px;height:44px}}
.sw-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-2);padding:6px 0;line-height:1.5}
.sw-dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;display:inline-block}
/* ---- v92: season intelligence ---- */
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
@media(max-width:560px){.pg-grid{grid-template-columns:1fr}}
.pg-h{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:7px}
.pg-i{font-size:12.5px;color:var(--ink-2);line-height:1.6;padding:2px 0}
.ob-step{display:flex;gap:12px;align-items:flex-start;padding:9px 0}
.ob-n{width:26px;height:26px;border-radius:8px;background:var(--surface-2);border:1px solid var(--teal-dim);color:var(--teal);display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;flex:0 0 auto}
.sw-tap{cursor:pointer;border-radius:9px;padding:7px 9px;margin:0 -9px;transition:background .14s}
.sw-tap:hover{background:var(--surface-2)}
.sw-open{font-size:10.5px;color:var(--ink-3);flex:0 0 auto}
.wa-detail{margin-top:4px;background:none;border:1px solid var(--line-soft);color:var(--ink-3);border-radius:7px;padding:3px 8px;font-size:10px;cursor:pointer;width:100%}
.wa-detail:hover{border-color:var(--teal-dim);color:var(--teal)}
.hm-steps{margin-top:12px;border-top:1px solid var(--line-soft);padding-top:10px}
.hm-steps summary{cursor:pointer;font-size:12.5px;color:var(--teal);font-weight:600;list-style:none}
.hm-steps summary::before{content:"› ";display:inline-block;transition:transform .15s}
.hm-steps[open] summary::before{transform:rotate(90deg)}
/* ---- v95: mobile layout hardening ---- */
.grid>*{min-width:0}
.card{min-width:0}
.statusline>*{flex:0 0 auto}
.statusline .pill{white-space:nowrap}
.racebadge{flex:0 0 auto;white-space:nowrap}
.g3s{grid-template-columns:repeat(3,1fr)!important;gap:10px!important}
@media(max-width:900px){
  #view-coach .grid,#view-settings .grid{grid-template-columns:1fr !important}
  #view-fitness .g3s,#view-coach .g3s,#view-insights .g3s,#view-settings .g3s,.g3s{grid-template-columns:repeat(3,1fr)!important;gap:8px!important}
  .g3s .card{padding:12px 10px!important}
  .g3s .stat .v,.g3s .num{font-size:22px!important}
  .g3s .stat .k,.g3s h3{font-size:10px!important;letter-spacing:.06em}
  .g3s .stat .u,.g3s .hint{font-size:9.5px!important}
}
@media(max-width:600px){
  table{font-size:11.5px}
  th,td{padding:7px 6px}
  td .hint{font-size:10px}
  .drawer table{font-size:12px}
  .calgrid,.calrow{grid-template-columns:repeat(7,minmax(0,1fr)) 32px !important;gap:3px!important}
  .calcell{min-width:0;padding:3px 2px;min-height:44px;overflow:hidden}
  .calcell .cd{font-size:9.5px}
  .calchip{font-size:8.5px;padding:1px 2px;border-left-width:2px!important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .calwk{font-size:9px;min-width:0;overflow:hidden}
  .caldow{font-size:9px}
}
/* weather chip */
.wxchip{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:11px;background:var(--surface);border:1px solid var(--line);font-size:12px;color:var(--ink-2)}
.wxchip .t{font-family:var(--mono);font-weight:600;color:var(--ink);font-size:14px}
.wxchip button{background:none;border:none;color:var(--teal);font-size:11px;cursor:pointer;padding:0 0 0 4px}
/* persistence warning: intentionally small, persistent, and independent of view renders */
.storage-warning{position:fixed;z-index:90;top:calc(10px + env(safe-area-inset-top));right:12px;width:min(390px,calc(100vw - 24px));padding:10px 38px 10px 12px;border:1px solid rgba(245,178,62,.55);border-radius:10px;background:rgba(37,29,18,.97);color:var(--ink);box-shadow:var(--shadow);font-size:12px;line-height:1.5}
.storage-warning.error{border-color:rgba(255,105,97,.65);background:rgba(45,22,24,.97)}
.storage-warning a{color:var(--teal);font-weight:600;margin-left:6px;white-space:nowrap}
.storage-warning>.storage-close{position:absolute;top:5px;right:7px;border:0;background:none;color:var(--ink-2);font-size:18px;line-height:1;cursor:pointer;padding:4px}
.storage-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.storage-actions .storage-action{border:1px solid var(--line);border-radius:7px;background:var(--surface-2);color:var(--ink);font-size:11px;line-height:1.2;padding:6px 9px;cursor:pointer}
.storage-actions .storage-action.primary{border-color:var(--teal-dim);color:var(--teal)}
/* ---- v96: refinements ---- */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tscroll table{width:max-content;min-width:100%}
.tscroll th,.tscroll td{white-space:nowrap}
.tscroll td[colspan]{white-space:normal;min-width:0;max-width:80vw}
button.tiny{background:var(--surface-2);border:1px solid var(--teal-dim);color:var(--teal);border-radius:7px;padding:3px 9px;font-size:10.5px;font-weight:600;white-space:nowrap}
button.tiny:active{background:var(--teal);color:#08110e}
