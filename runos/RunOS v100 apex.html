<script>
"use strict";
/* ============================================================
   MERIDIAN — running intelligence engine
   Single-file, local-first. No frameworks, no external data.
   Every metric is a pure function so the glass-box can show
   its formula, inputs and drivers verbatim.
   ============================================================ */

/* ---------- persistence ---------- */
const KEY = 'meridian.v1';
const DEFAULT_PROFILE = {
  name:'Runner', sex:'m', weightKg:62, heightCm:172, age:38,
  hrMax:189, hrRest:44, ltHr:171,
  // threshold pace min/km used for RPE/pace fallback load
  thresholdPaceSec:255,
  vo2maxLab:null,            // optional lab-measured VO2max
  experience:'intermediate', // beginner | intermediate | advanced
  injuryProne:false
};
let DB = { profile:{...DEFAULT_PROFILE}, activities:[], wellness:[], plan:null, planOverrides:{}, adjustLog:[], shoes:[], env:{temp:20,humidity:50,altitude:0}, races:[] };
let STORAGE_RECOVERY = null;

function approxJSONBytes(json){
  try{ return new Blob([json]).size; }
  catch(e){ return json.length*2; } // conservative UTF-16 approximation
}
function storageSizeInfo(json){
  const bytes=approxJSONBytes(json);
  return {key:KEY,bytes,kib:Math.round(bytes/1024),mib:Math.round(bytes/104857.6)/10};
}
function showStorageWarning(message, level='warn', offerBackup=false, recoveryActions=false){
  const render=()=>{
    let box=document.getElementById('storageWarning');
    if(!box){
      box=document.createElement('div');
      box.id='storageWarning';
      box.setAttribute('role','alert');
      document.body.appendChild(box);
    }
    box.className='storage-warning'+(level==='error'?' error':'');
    box.textContent='';
    const text=document.createElement('span'); text.textContent=message; box.appendChild(text);
    if(offerBackup){
      const link=document.createElement('a'); link.href='#settings'; link.textContent='設定を開く'; box.appendChild(link);
    }
    if(recoveryActions){
      const actions=document.createElement('div'); actions.className='storage-actions';
      const backup=document.createElement('button'); backup.type='button'; backup.className='storage-action';
      backup.textContent='破損データを書き出す'; backup.onclick=exportCorruptData; actions.appendChild(backup);
      const restart=document.createElement('button'); restart.type='button'; restart.className='storage-action primary';
      restart.textContent='デモデータで再開始'; restart.onclick=restartWithDemoData; actions.appendChild(restart);
      box.appendChild(actions);
    }
    const close=document.createElement('button'); close.type='button'; close.setAttribute('aria-label','閉じる');
    close.className='storage-close';
    close.textContent='×'; close.onclick=()=>box.remove(); box.appendChild(close);
  };
  if(document.body) render();
  else document.addEventListener('DOMContentLoaded',render,{once:true});
}
function validateStoredDB(data){
  if(!data||typeof data!=='object'||Array.isArray(data)) throw new Error('保存データのルートがオブジェクトではありません');
  if(!Array.isArray(data.activities)) throw new Error('activities が配列ではありません');
  if(!Array.isArray(data.wellness)) throw new Error('wellness が配列ではありません');
  return data;
}
function archiveCorruptData(raw,cause){
  const corruptKey=`${KEY}.corrupt.${Date.now()}`;
  try{
    localStorage.setItem(corruptKey,raw);
    console.warn('[RunOS storage] corrupt data archived',{
      sourceKey:KEY,corruptKey,...storageSizeInfo(raw),cause:String(cause&&cause.message||cause)
    });
    return corruptKey;
  }catch(e){
    console.error('[RunOS storage] corrupt data archive failed',e,{
      sourceKey:KEY,corruptKey,cause:String(cause&&cause.message||cause)
    });
    return null;
  }
}
function showCorruptRecoveryWarning(prefix=''){
  const r=STORAGE_RECOVERY;
  if(!r) return;
  const message=r.corruptKey
    ?`${prefix}破損データを退避しました（${r.corruptKey}）。現在はデモデータを一時表示しており、自動保存は停止しています。`
    :`${prefix}破損データを検知しましたが、localStorageへの退避に失敗しました。現在はデモデータを一時表示しており、自動保存は停止しています。`;
  showStorageWarning(message,'error',false,true);
}
function exportCorruptData(){
  const r=STORAGE_RECOVERY;
  if(!r) return;
  try{
    const raw=r.raw!=null?r.raw:(r.corruptKey?localStorage.getItem(r.corruptKey):null);
    if(raw==null) throw new Error('退避した元文字列を取得できません');
    const blob=new Blob([raw],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url; a.download=`runos-corrupt-${r.detectedAt}.txt`; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    console.warn('[RunOS storage] corrupt data exported',{sourceKey:KEY,corruptKey:r.corruptKey,bytes:approxJSONBytes(raw)});
  }catch(e){
    console.error('[RunOS storage] corrupt data export failed',e,{sourceKey:KEY,corruptKey:r.corruptKey});
    showCorruptRecoveryWarning('破損データの書き出しに失敗しました。');
  }
}
function restartWithDemoData(){
  const recovery=STORAGE_RECOVERY;
  if(!recovery) return;
  if(!confirm('退避した破損データを残したまま、現在のデモデータで meridian.v1 を上書きして再開始します。よろしいですか？')) return;
  STORAGE_RECOVERY=null; // explicit confirmation temporarily unlocks the normal save path
  if(save()){
    console.warn('[RunOS storage] user restarted with demo data',{sourceKey:KEY,corruptKey:recovery.corruptKey});
    showStorageWarning(`デモデータで再開始しました。${recovery.corruptKey?`退避データは ${recovery.corruptKey} に残しています。`:''}`,'warn');
    route();
  }else{
    STORAGE_RECOVERY=recovery;
    console.error('[RunOS storage] restart with demo data failed',{sourceKey:KEY,corruptKey:recovery.corruptKey});
    showCorruptRecoveryWarning('デモデータの保存に失敗しました。');
  }
}
function load(){
  let raw=null;
  try{
    raw=localStorage.getItem(KEY);
  }catch(e){
    console.error('[RunOS storage] localStorage read failed',e,{key:KEY});
    seedDemo(false);
    showStorageWarning(
      '保存領域を読み込めないため、デモデータを一時表示しています。自動保存は行っていません。原因は開発者コンソールで確認できます。',
      'error',true);
    return;
  }
  if(!raw){
    console.warn('[RunOS storage] no saved data; generating demo data',{key:KEY});
    const demoSaved=seedDemo();
    showStorageWarning(
      demoSaved===false?'保存データが見つからずデモデータへ切り替えましたが、保存にも失敗しました。設定からバックアップを書き出してください。':'保存データが見つからないため、デモデータを生成しました。',
      demoSaved===false?'error':'warn',demoSaved===false);
    return;
  }
  try{
    DB=validateStoredDB(JSON.parse(raw));
    DB.profile = {...DEFAULT_PROFILE, ...DB.profile}; DB.plan=DB.plan||null; DB.planOverrides=DB.planOverrides||{}; DB.adjustLog=DB.adjustLog||[]; DB.shoes=DB.shoes||[]; DB.env=DB.env||{temp:20,humidity:50,altitude:0}; DB.races=DB.races||[]; DB.integrations=DB.integrations||{}; DB.ui=DB.ui||{};
    console.info('[RunOS storage] loaded',storageSizeInfo(raw));
  }catch(e){
    const corruptKey=archiveCorruptData(raw,e);
    STORAGE_RECOVERY={active:true,raw,corruptKey,detectedAt:Date.now()};
    console.error('[RunOS storage] corrupt data detected; demo data is temporary and saves are blocked',e,{
      sourceKey:KEY,corruptKey,...storageSizeInfo(raw)
    });
    seedDemo(false);
    showCorruptRecoveryWarning();
  }
}
function save(){
  if(STORAGE_RECOVERY&&STORAGE_RECOVERY.active){
    console.warn('[RunOS storage] save blocked until recovery choice is confirmed',{
      sourceKey:KEY,corruptKey:STORAGE_RECOVERY.corruptKey
    });
    showCorruptRecoveryWarning('保存は実行していません。');
    return false;
  }
  let json;
  try{
    json=JSON.stringify(DB);
  }catch(e){
    console.error('[RunOS storage] JSON serialization failed',e,{key:KEY});
    showStorageWarning('データの変換中に保存に失敗しました。設定からバックアップを書き出してください。','error',true);
    return false;
  }
  const size=storageSizeInfo(json);
  console.info('[RunOS storage] save attempt',size);
  try{
    localStorage.setItem(KEY,json);
    return true;
  }catch(e){
    console.error('[RunOS storage] localStorage write failed',e,size);
    showStorageWarning(`保存に失敗しました（概算 ${size.mib} MB）。設定からバックアップを書き出してください。`,'error',true);
    return false;
  }
}
function saveFailureText(){
  return STORAGE_RECOVERY&&STORAGE_RECOVERY.active
    ?'リカバリ中のため保存を停止しています'
    :'保存できませんでした';
}
function notifySaveResult(saved,successMessage){
  flash(saved?successMessage:saveFailureText());
  return saved;
}

/* ---------- small utils ---------- */
const pad=n=>String(n).padStart(2,'0');
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const lerp=(a,b,t)=>a+(b-a)*t;
const round=(x,d=0)=>{const p=10**d;return Math.round(x*p)/p;};
const isoLocal=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayISO=()=>isoLocal(new Date());
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function fmtDate(iso){ const d=new Date(iso+'T00:00'); return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtDateLong(iso){ const d=new Date(iso+'T00:00'); const w='日月火水木金土'[d.getDay()];
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} (${w})`; }

/* pace helpers: paceSec = seconds per km */
function paceStr(sec){ if(!isFinite(sec)||sec<=0) return '—'; const t=Math.round(sec), m=Math.floor(t/60), s=t%60;
  return `${m}:${pad(s)}`; }
function hms(totalSec){ totalSec=Math.round(totalSec); const h=Math.floor(totalSec/3600),
  m=Math.floor((totalSec%3600)/60), s=totalSec%60;
  return h>0?`${h}:${pad(m)}:${pad(s)}`:`${m}:${pad(s)}`; }
function paceFromRun(a){ return a.durSec / a.km; }         // sec/km
function speedMPS(a){ return (a.km*1000)/a.durSec; }        // m/s
function speedMMin(a){ return speedMPS(a)*60; }             // m/min

/* ---------- seeded RNG (stable demo) ---------- */
function rng(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

/* ============================================================
   TRIMP — Banister training impulse (per activity)
   TRIMP = min * HRr * 0.64 * e^(k*HRr)   (k=1.92 m / 1.67 f)
   HRr = (HRavg - HRrest) / (HRmax - HRrest)
   Falls back to pace-vs-threshold intensity when HR missing.
   ============================================================ */
function trimp(a){
  const p=DB.profile, min=a.durSec/60;
  if(a.hrAvg){
    const HRr=clamp((a.hrAvg-p.hrRest)/(p.hrMax-p.hrRest),0.01,1);
    const k=p.sex==='f'?1.67:1.92, c=p.sex==='f'?0.86:0.64;
    return min*HRr*c*Math.exp(k*HRr);
  }
  // pace fallback: intensity factor from pace / threshold pace
  const IF = clamp(p.thresholdPaceSec / paceFromRun(a), 0.4, 1.15);
  const HRr = clamp(0.5*IF + 0.35, 0.3, 1);
  return min*HRr*0.64*Math.exp(1.92*HRr);
}

/* ============================================================
   Daily load series + PMC (CTL / ATL / TSB)
   CTL: EWMA of daily TRIMP, 42d.  ATL: 7d.  TSB = CTL_y - ATL_y
   ============================================================ */
function dailyLoads(){
  if(DB.activities.length===0) return {days:[],map:{}};
  const sorted=[...DB.activities].sort((x,y)=>x.date<y.date?-1:1);
  const start=sorted[0].date, end=todayISO();
  const n=Math.max(dayDiff(start,end),0);
  const map={}; DB.activities.forEach(a=>{ map[a.date]=(map[a.date]||0)+trimp(a); });
  const days=[];
  for(let i=0;i<=n;i++){
    const d=new Date(start+'T00:00'); d.setDate(d.getDate()+i);
    const iso=isoLocal(d);
    days.push({date:iso, load:map[iso]||0});
  }
  return {days,map};
}
function pmc(){
  const {days}=dailyLoads();
  let ctl=0,atl=0; const out=[];
  // seed with first 14d avg so chart isn't cold-started at 0
  const seed = days.slice(0,14).reduce((s,d)=>s+d.load,0)/Math.max(1,Math.min(14,days.length));
  ctl=seed; atl=seed;
  days.forEach(d=>{
    const tsb=ctl-atl;
    ctl=ctl+(d.load-ctl)/42;
    atl=atl+(d.load-atl)/7;
    out.push({date:d.date, load:d.load, ctl, atl, tsb});
  });
  return out;
}
function currentPMC(){ const s=pmc(); return s.length?s[s.length-1]:{ctl:0,atl:0,tsb:0}; }
function ctlRamp(){ // CTL change over last 7 days (per week)
  const s=pmc(); if(s.length<8) return 0; return s[s.length-1].ctl - s[s.length-8].ctl; }

/* ============================================================
   ACWR (acute:chronic) + monotony + strain  (injury signals)
   acute = mean daily load (7d), chronic = mean daily load (28d)
   monotony = weekMean / weekSD ; strain = weekSum * monotony
   ============================================================ */
function loadWindow(days){ const {map}=dailyLoads(); const arr=[]; const end=new Date(todayISO()+'T00:00');
  for(let i=days-1;i>=0;i--){ const d=new Date(end);d.setDate(d.getDate()-i);
    arr.push(map[isoLocal(d)]||0); } return arr; }
function acwr(){
  const a7=loadWindow(7), a28=loadWindow(28);
  const acute=a7.reduce((s,x)=>s+x,0)/7;
  const chronic=a28.reduce((s,x)=>s+x,0)/28;
  return chronic>0? acute/chronic : 0;
}
function monotonyStrain(){
  const w=loadWindow(7); const mean=w.reduce((s,x)=>s+x,0)/7;
  const sd=Math.sqrt(w.reduce((s,x)=>s+(x-mean)**2,0)/7)||0.001;
  const monotony=mean/sd; const weekSum=w.reduce((s,x)=>s+x,0);
  return {monotony, strain:weekSum*monotony, weekSum, mean, sd};
}

/* ============================================================
   Effective VO2max (Runalyze-style) — from HR/pace of aerobic runs
   VO2(v) = -4.60 + 0.182258 v + 0.000104 v^2   (Daniels, v m/min)
   %VO2max used ≈ %HRR (Karvonen equivalence)
   eVO2max_run = VO2(v) / %HRR ; current = recency+quality weighted mean
   ============================================================ */
function vo2FromV(v){ return -4.60 + 0.182258*v + 0.000104*v*v; }
function velFromVO2(vo2){ const a=0.000104,b=0.182258,c=-4.60-vo2;
  return (-b+Math.sqrt(b*b-4*a*c))/(2*a); }
function pctMax(tMin){ return 0.8 + 0.1894393*Math.exp(-0.012778*tMin) + 0.2989558*Math.exp(-0.1932605*tMin); }

function runVO2(a){
  const p=DB.profile;
  if(!a.hrAvg) return null;
  const HRr=clamp((a.hrAvg-p.hrRest)/(p.hrMax-p.hrRest),0.35,1.0);
  const v=speedMMin(a);
  const vo2=vo2FromV(v);
  const e = vo2/HRr;
  return (e>25 && e<95)? e : null;
}
function effectiveVO2max(asOf){
  const now=asOf||todayISO(); const cutoff=42; // 6 weeks
  let wsum=0, vsum=0; const contribs=[];
  DB.activities.forEach(a=>{
    const age=dayDiff(a.date,now); if(age<0||age>cutoff) return;
    const e=runVO2(a); if(e==null) return;
    // weight: recency (halflife 20d) x aerobic-quality (steady, ≥3km)
    const recency=Math.exp(-age/20);
    const quality = clamp(a.km/6,0.3,1) * (a.type==='easy'||a.type==='long'||a.type==='tempo'?1:0.8);
    const w=recency*quality;
    wsum+=w; vsum+=e*w; contribs.push({date:a.date,e,w});
  });
  const val = wsum>0? vsum/wsum : 0;
  contribs.sort((x,y)=>y.w-x.w);
  return {value:val, contribs:contribs.slice(0,6), samples:contribs.length};
}

/* ============================================================
   VDOT race prediction (Daniels) with endurance (Marathon-Shape)
   adjustment for long distances.
   ============================================================ */
function predictTime(vdot, meters){
  let t=meters/250; // min, initial guess
  for(let i=0;i<80;i++){
    const need=vdot*pctMax(t);
    const v=velFromVO2(need);
    const tNew=meters/v;
    if(Math.abs(tNew-t)<1e-5){t=tNew;break;}
    t=tNew;
  }
  return t*60; // seconds
}
/* Marathon Shape: is endurance base sufficient for this VO2max?
   required weekly km ≈ 1.889*VO2 - 8.2 ; required long ≈ 0.267*VO2 + 15.3
   shape% = 100*(2/3 * wk/reqWk + 1/3 * long/reqLong), capped 0..130 */
function enduranceBase(){
  const now=todayISO(); let km6=0, weeks=6, longMax=0;
  const perWeek={};
  DB.activities.forEach(a=>{ const age=dayDiff(a.date,now); if(age<0||age>42) return;
    const wk=Math.floor(age/7); perWeek[wk]=(perWeek[wk]||0)+a.km;
    if(age<=28) longMax=Math.max(longMax,a.km); });
  let wkSum=0,cnt=0; for(let i=0;i<weeks;i++){ wkSum+=(perWeek[i]||0); if(perWeek[i]!=null)cnt++; }
  const weeklyKm = wkSum/weeks;
  return {weeklyKm, longRun:longMax};
}
function marathonShape(vo2){
  if(vo2<=0) return {shape:0, reqWeekly:0, reqLong:0, weeklyKm:0, longRun:0};
  const {weeklyKm,longRun}=enduranceBase();
  const reqWeekly=Math.max(20,1.889*vo2-8.2);
  const reqLong=Math.max(10,0.267*vo2+15.3);
  const shape=clamp(100*((2/3)*(weeklyKm/reqWeekly)+(1/3)*(longRun/reqLong)),0,130);
  return {shape, reqWeekly, reqLong, weeklyKm, longRun};
}
/* endurance factor applied to VDOT for long distances when shape<100 */
function raceProjections(){
  const evo=perfVO2max().value;
  const ms=marathonShape(evo);
  const dists=[
    {name:'5K', m:5000, endWeight:0.1},
    {name:'10K', m:10000, endWeight:0.25},
    {name:'ハーフ', m:21097.5, endWeight:0.6},
    {name:'フル', m:42195, endWeight:1.0},
  ];
  return dists.map(d=>{
    const raw=predictTime(evo, d.m);
    // shape penalty scales with endWeight; full penalty halves nothing—applies slowdown
    const deficit=clamp((100-ms.shape)/100,0,1);
    const adjVO2 = evo * (1 - d.endWeight*deficit*0.14); // up to ~14% VO2 haircut on marathon
    const adj = predictTime(Math.max(20,adjVO2), d.m);
    return {...d, raw, adj, pace:adj/(d.m/1000)};
  });
}

/* ============================================================
   Efficiency Factor (durability proxy) — speed per HR beat
   EF = (m/min) / HRavg ; rising trend = aerobic development
   ============================================================ */
function efficiencyTrend(){
  const now=todayISO(); const pts=[];
  DB.activities.filter(a=>a.hrAvg && (a.type==='easy'||a.type==='long'))
    .forEach(a=>{ const age=dayDiff(a.date,now); if(age>84) return;
      pts.push({date:a.date, ef: speedMMin(a)/a.hrAvg}); });
  pts.sort((x,y)=>x.date<y.date?-1:1);
  return pts;
}

/* ============================================================
   Readiness composite (glass-box signature)
   fuses Form (TSB), Recovery (HRV/sleep/RHR), Load-risk (ACWR)
   ============================================================ */
function latestWellness(){
  if(!DB.wellness.length) return null;
  return [...DB.wellness].sort((a,b)=>a.date<b.date?1:-1)[0];
}
function wellnessBaseline(){
  const w=DB.wellness.slice(-42); if(w.length<5) return null;
  const avg=k=>{const v=w.map(x=>x[k]).filter(x=>x!=null); return v.reduce((s,x)=>s+x,0)/v.length;};
  return {hrv:avg('hrv'), rhr:avg('rhr'), sleep:avg('sleep')};
}
function formScore(tsb){
  // sweet spot for readiness: TSB in [+2,+15]. fatigue below, staleness above +25
  if(tsb>=2 && tsb<=15) return 100;
  if(tsb<2) return clamp(100 - (2-tsb)*3.0, 10, 100);
  return clamp(100 - (tsb-15)*1.4, 55, 100);
}
function readiness(){
  const c=currentPMC();
  const fs=formScore(c.tsb);
  const ratio=acwr();
  const loadScore = ratio===0?70 : (ratio>=0.8&&ratio<=1.3?100 : ratio<0.8?clamp(70+ratio*30,55,95):clamp(100-(ratio-1.3)*90,15,100));
  const w=latestWellness(), base=wellnessBaseline();
  let recScore=null, recBits=null;
  if(w && base && (w.hrv!=null||w.rhr!=null||w.sleep!=null)){
    const hrvZ = (base.hrv&&w.hrv!=null)? clamp((w.hrv-base.hrv)/(base.hrv*0.12),-2,2):0;
    const rhrZ = (base.rhr&&w.rhr!=null)? clamp((base.rhr-w.rhr)/(base.rhr*0.06),-2,2):0;
    const sleepZ = (base.sleep&&w.sleep!=null)? clamp((w.sleep-base.sleep)/1.2,-2,2):0;
    recScore = clamp(72 + (hrvZ*11 + rhrZ*7 + sleepZ*8),5,100);
    recBits={hrvZ,rhrZ,sleepZ,w,base};
  }
  // subjective 3-tap check-in (today only): legs / mood / sleep quality
  { const tw=DB.wellness.find(x=>x.date===todayISO());
    if(tw && (tw.soreness!=null||tw.mood!=null||tw.sleepQ!=null)){
      const adj=(tw.mood!=null?(tw.mood-3)*4:0) - (tw.soreness!=null?(tw.soreness-2)*5:0) + (tw.sleepQ!=null?(tw.sleepQ-3)*3:0);
      if(recScore==null) recScore=clamp(70+adj,5,100); else recScore=clamp(recScore+adj,5,100);
      recBits={...(recBits||{}), subj:{soreness:tw.soreness,mood:tw.mood,sleepQ:tw.sleepQ,adj}};
    } }
  let score, weights;
  if(recScore!=null){ weights={form:0.34,rec:0.46,load:0.20};
    score=fs*weights.form + recScore*weights.rec + loadScore*weights.load; }
  else { weights={form:0.6,rec:0,load:0.4};
    score=fs*weights.form + loadScore*weights.load; }
  score=Math.round(clamp(score,0,100));
  let band,verdict,advice,color;
  if(score>=78){band='PRIMED';color='var(--teal)';verdict='高強度に適した日';
    advice='インターバルやテンポ走、レースに向いた状態。予定した質の高いセッションを実行できます。';}
  else if(score>=58){band='STEADY';color='var(--lime)';verdict='中強度まで実行可';
    advice='通常のトレーニングは可能。強度は予定通りでよいが、体感が重ければ量を1割落とす余地を残します。';}
  else if(score>=40){band='CAUTION';color='var(--gold)';verdict='負荷を抑える日';
    advice='質の高いセッションは1〜2日後ろ倒しに。イージー走かクロストレーニングで回復を優先します。';}
  else {band='RECOVER';color='var(--coral)';verdict='回復を優先';
    advice='身体は回復途上です。完全休養か軽いジョグに留め、睡眠とHRVの回復を待ちます。';}
  return {score,band,verdict,advice,color,fs,recScore,loadScore,weights,recBits,tsb:c.tsb,ratio};
}

/* ============================================================
   DEMO SEEDER — ~24 weeks of plausible marathon build + taper
   so every chart/metric is populated on first open.
   ============================================================ */
function seedDemo(persist=true){
  const p={...DEFAULT_PROFILE};
  const acts=[], well=[];
  const R=rng(20260705);
  const end=new Date(); end.setHours(0,0,0,0);
  const DAYS=168;
  // build phase structure: base -> build -> peak -> taper
  for(let i=DAYS;i>=0;i--){
    const d=new Date(end); d.setDate(d.getDate()-i);
    const iso=isoLocal(d);
    const dow=d.getDay();
    const weeksToGo=i/7;
    // periodised weekly volume target (km) rising then tapering
    let phaseVol;
    if(weeksToGo>16) phaseVol=42;
    else if(weeksToGo>8) phaseVol=lerp(48,74,(16-weeksToGo)/8);
    else if(weeksToGo>2) phaseVol=lerp(74,82,(8-weeksToGo)/6);
    else phaseVol=lerp(70,34,(2-weeksToGo)/2); // taper
    // fitness drift improves HR economy over time
    const fitness=lerp(0,1,(DAYS-i)/DAYS);
    const rest = dow===1; // Monday rest
    if(rest){ pushWellness(); continue; }
    let type,km,factor;
    if(dow===6){ type='long'; km=phaseVol*0.32*(0.9+R()*0.2); factor=0.72; } // Sat long
    else if(dow===3){ // Wed quality
      if(weeksToGo<14 && R()>0.35){ type='interval'; km=8+R()*4; factor=0.9; }
      else { type='tempo'; km=9+R()*4; factor=0.84; }
    }
    else if(dow===4){ type='easy'; km=6+R()*3; factor=0.66; }
    else if(dow===2||dow===5){ type='easy'; km=phaseVol*0.15*(0.8+R()*0.4); factor=0.64; }
    else if(dow===0){ type='easy'; km=5+R()*4; factor=0.63; }
    else { pushWellness(); continue; }
    km=Math.max(3,round(km,1));
    // pace from threshold + factor + fitness (faster over time), with noise
    const basePace = p.thresholdPaceSec/ (factor+ (type==='interval'?0.15:0));
    const paceSec = basePace*(1 - fitness*0.05)*(0.98+R()*0.05);
    const durSec=Math.round(paceSec*km);
    // HR from intensity factor and improving economy
    const hrFrac = clamp(factor*(1.02-fitness*0.05)*(0.97+R()*0.05),0.5,0.98);
    const hrAvg=Math.round(p.hrRest+(p.hrMax-p.hrRest)*hrFrac);
    const elev=type==='long'?Math.round(km*8+R()*120):Math.round(km*5+R()*40);
    acts.push({id:'a'+iso+dow, date:iso, type, km, durSec, hrAvg,
      elevM:elev, rpe: Math.round(clamp(hrFrac*10,3,9)), note:''});
    pushWellness();

    function pushWellness(){
      // HRV/sleep/RHR respond to accumulated load (lower after hard weeks)
      const loadStress = clamp((phaseVol-40)/50,0,1);
      const hrv=Math.round(lerp(72,52,loadStress)+ (R()*10-5));
      const rhr=Math.round(lerp(43,49,loadStress)+ (R()*3-1.5));
      const sleep=round(lerp(7.6,6.6,loadStress)+ (R()*1.2-0.6),1);
      well.push({date:iso, hrv:clamp(hrv,35,90), rhr:clamp(rhr,38,56), sleep:clamp(sleep,4.5,9)});
    }
  }
  DB={profile:p, activities:acts, wellness:well, plan:null, planOverrides:{}, adjustLog:[], shoes:DB.shoes||[], env:DB.env||{temp:20,humidity:50,altitude:0}, races:DB.races||[]};
  return persist?save():true;
}

/* ============================================================
   FIT FILE PARSER (embedded) — validated against real Garmin files
   ============================================================ */
/* ============================================================
   FIT parser (pure JS, no deps) + per-activity analysis
   Validated in Node against real Garmin .fit files, then embedded.
   ============================================================ */
const FIT_EPOCH = 631065600; // sec between 1970-01-01 and 1989-12-31

const ELEM = {0:1,1:1,2:1,3:2,4:2,5:4,6:4,7:1,8:4,9:8,10:1,11:2,12:4,13:1,14:8,15:8,16:8};
const INVAL = {0:0xFF,1:0x7F,2:0xFF,3:0x7FFF,4:0xFFFF,5:0x7FFFFFFF,6:0xFFFFFFFF,
  7:0x00,10:0x00,11:0x00,12:0x00,13:0xFF,14:0x7FFFFFFFFFFFFFFFn,15:0xFFFFFFFFFFFFFFFFn,16:0n};

function readField(dv, off, size, baseByte, little){
  const idx = baseByte & 0x1F;
  const es = ELEM[idx] || 1;
  const count = Math.max(1, Math.floor(size/es));
  if(idx===7){ // string
    let s=''; for(let i=0;i<size;i++){ const c=dv.getUint8(off+i); if(c===0)break; s+=String.fromCharCode(c);} return s||null;
  }
  const vals=[];
  for(let i=0;i<count;i++){
    const o=off+i*es; let v;
    switch(idx){
      case 1: v=dv.getInt8(o); break;
      case 0: case 2: case 10: case 13: v=dv.getUint8(o); break;
      case 3: v=dv.getInt16(o,little); break;
      case 4: case 11: v=dv.getUint16(o,little); break;
      case 5: v=dv.getInt32(o,little); break;
      case 6: case 12: v=dv.getUint32(o,little); break;
      case 8: v=dv.getFloat32(o,little); break;
      case 9: v=dv.getFloat64(o,little); break;
      default: v=dv.getUint32(o,little);
    }
    if(INVAL[idx]!==undefined && v===INVAL[idx]) v=null;
    vals.push(v);
  }
  return count===1?vals[0]:vals;
}

function parseFit(bytes){
  const dv=new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const headerSize=bytes[0];
  const dataSize=dv.getUint32(4,true);
  const sig=String.fromCharCode(bytes[8],bytes[9],bytes[10],bytes[11]);
  if(sig!=='.FIT') throw new Error('FITファイルではありません');
  let pos=headerSize; const end=Math.min(headerSize+dataSize, bytes.length);
  const defs={};
  const out={records:[], sessions:[], laps:[], sport:null, startTime:null};
  let lastTs=0;
  while(pos<end){
    const h=bytes[pos++];
    if(h&0x80){ // compressed timestamp
      const lt=(h>>5)&0x03; const offset=h&0x1F;
      const def=defs[lt]; if(!def) break;
      lastTs=(lastTs & ~0x1F)+offset; if((lastTs&0x1F)<offset){} // approx
      const {vals,np}=readMsg(def,pos,dv);
      pos=np; if(vals[253]==null) vals[253]=lastTs;
      dispatch(def.gmsg, vals, out);
      continue;
    }
    const lt=h&0x0F;
    if(h&0x40){ // definition
      const little=bytes[pos+1]===0;
      const gmsg=dv.getUint16(pos+2,little);
      const nf=bytes[pos+4]; pos+=5;
      const fields=[];
      for(let i=0;i<nf;i++){ fields.push({fn:bytes[pos],size:bytes[pos+1],base:bytes[pos+2]}); pos+=3; }
      let devSize=0;
      if(h&0x20){ const nd=bytes[pos++]; for(let i=0;i<nd;i++){ devSize+=bytes[pos+1]; pos+=3; } }
      defs[lt]={gmsg,little,fields,devSize};
    } else { // data
      const def=defs[lt]; if(!def) break;
      const {vals,np}=readMsg(def,pos,dv);
      pos=np;
      if(vals[253]!=null) lastTs=vals[253];
      dispatch(def.gmsg, vals, out);
    }
  }
  return finalize(out);
}

function readMsg(def,pos,dv){
  const vals={};
  for(const f of def.fields){
    vals[f.fn]=readField(dv,pos,f.size,f.base,def.little);
    pos+=f.size;
  }
  pos+=def.devSize; // consume developer fields (keeps alignment)
  return {vals,np:pos};
}

function dispatch(gmsg, v, out){
  if(gmsg===20){ // record
    out.records.push({
      t:v[253], lat:v[0], lng:v[1], alt:v[2], hr:v[3], cad:v[4], dist:v[5], spd:v[6], pwr:v[7]
    });
  } else if(gmsg===18){ // session
    out.sessions.push(v);
    if(v[5]!=null) out.sport=v[5];
    if(v[2]!=null) out.startTime=v[2];
  } else if(gmsg===19){ // lap
    out.laps.push({t:v[253], start:v[2], elapsed:v[7], dist:v[9],
      avgSpd:v[13], maxSpd:v[14], avgHr:v[15], maxHr:v[16], avgCad:v[17], avgPwr:v[19], ascent:v[21]});
  }
}

/* scale decoders */
const altM = a => a==null?null : a/5 - 500;
const distM = d => d==null?null : d/100;
const spdMS = s => s==null?null : s/1000;
const semiToDeg = s => s==null?null : s*(180/2147483648);

/* Minetti grade-adjusted cost factor */
function gapFactor(grade){
  const i=Math.max(-0.30,Math.min(0.30,grade));
  const C=155.4*i**5 - 30.4*i**4 - 43.3*i**3 + 46.3*i**2 + 19.5*i + 3.6;
  return Math.max(0.5, C/3.6);
}

function finalize(raw){
  const recs=raw.records.filter(r=>r.t!=null);
  if(!recs.length) throw new Error('レコードがありません');
  const t0=recs[0].t;
  const s=raw.sessions[0]||{};
  // smooth altitude (moving avg 5)
  const alt=recs.map(r=>altM(r.alt));
  const altS=alt.map((_,i)=>{ let sum=0,n=0; for(let j=Math.max(0,i-4);j<=Math.min(alt.length-1,i+4);j++){ if(alt[j]!=null){sum+=alt[j];n++;} } return n?sum/n:null; });
  // build clean stream with pace & GAP.
  // grade is computed over a ~30 m distance window so altitude quantisation
  // noise (0.2 m steps) doesn't blow up the Minetti factor on flat runs.
  const dist=recs.map(r=>distM(r.dist));
  const GRADE_WIN=30; // metres
  function gradeAt(i){
    const di=dist[i], ai=altS[i]; if(di==null||ai==null) return 0;
    let j=i; while(j>0 && dist[j]!=null && (di-dist[j])<GRADE_WIN) j--;
    const dj=dist[j], aj=altS[j];
    if(dj==null||aj==null) return 0; const dd=di-dj; if(dd<5) return 0;
    return (ai-aj)/dd;
  }
  const stream=[];
  let ascent=0, prevAlt=null, gapEquivM=0;
  for(let i=0;i<recs.length;i++){
    const r=recs[i];
    const et=r.t-t0;
    const d=dist[i];
    const v=spdMS(r.spd);
    const a=altS[i];
    const grade=gradeAt(i);
    if(a!=null&&prevAlt!=null&&a>prevAlt) ascent+=(a-prevAlt); if(a!=null)prevAlt=a;
    const gap = v!=null ? v*gapFactor(grade) : null;         // instantaneous GAP speed (m/s)
    const dt = i>0 ? (recs[i].t-recs[i-1].t) : 0;             // seconds between samples
    if(gap!=null && dt>0 && dt<20) gapEquivM += gap*dt;       // accumulate equivalent-flat metres
    stream.push({et, d, v, gap, hr:r.hr, cad:r.cad!=null?r.cad*2:null, pwr:r.pwr, alt:a, grade});
  }
  const lastDist=dist.filter(x=>x!=null).pop();
  const totalDist = distM(s[9]) || (lastDist||0);
  const elapsed = (s[7]!=null?s[7]/1000:null) || (recs[recs.length-1].t - t0);
  const unixStart=(raw.startTime||t0)+FIT_EPOCH;
  const _d=new Date(unixStart*1000); // local timezone of the runner
  const date=`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;

  // moving samples (v>0.5 m/s)
  const mov=stream.filter(p=>p.v!=null&&p.v>0.5);
  // moving time: sum of deltas while actually moving (caps out signal stops / pauses)
  let movingSec=0;
  for(let i=1;i<stream.length;i++){ const dt=stream[i].t-stream[i-1].t;
    if(dt>0 && stream[i].v!=null && stream[i].v>0.5) movingSec+=Math.min(dt,15); }
  const timerSec=(s[8]!=null? s[8]/1000 : null); // FIT total_timer_time (pauses excluded)
  const avg=(arr,k)=>{const x=arr.map(p=>p[k]).filter(y=>y!=null); return x.length?x.reduce((a,b)=>a+b,0)/x.length:null;};

  // ---- aerobic decoupling (GAP-speed / HR), first half vs second half by moving time
  let decoupling=null;
  const withHr=mov.filter(p=>p.hr!=null&&p.gap!=null);
  if(withHr.length>60){
    const mid=Math.floor(withHr.length/2);
    const effHalf=(arr)=>{ const ef=arr.map(p=>p.gap/p.hr); return ef.reduce((a,b)=>a+b,0)/ef.length; };
    const e1=effHalf(withHr.slice(0,mid)), e2=effHalf(withHr.slice(mid));
    decoupling=(e1-e2)/e1*100;
  }
  // ---- HR time-in-zone (needs profile hrMax/hrRest at import; here raw seconds by fraction bins added later)
  // ---- mean-max curves (power & speed) via rolling window on 1Hz-ish samples
  function meanMax(key, durations){
    const xs=stream.map(p=>p[key]==null?0:p[key]);
    const ts=stream.map(p=>p.et);
    // resample to 1Hz
    const T=Math.floor(ts[ts.length-1]); if(T<5) return {};
    const g=new Float64Array(T+1);
    for(let s=0;s<=T;s++){ // nearest sample
      // linear index: assume ~1Hz; find by binary-ish (streams are ~1Hz)
      g[s]=xs[Math.min(xs.length-1, s)]||0;
    }
    const pre=new Float64Array(T+2); for(let s=0;s<=T;s++) pre[s+1]=pre[s]+g[s];
    const res={};
    durations.forEach(w=>{ if(w>T)return; let best=0; for(let s=0;s+w<=T+1;s++){ const m=(pre[s+w]-pre[s])/w; if(m>best)best=m; } res[w]=best; });
    return res;
  }
  const durs=[1,5,10,15,30,60,120,300,600,1200,1800,3600,5400];
  const pwrCurve = avg(mov,'pwr')!=null ? meanMax('pwr',durs) : null;
  const spdCurve = meanMax('v',durs);

  // ---- xPower / Variability Index (running power)
  let xPower=null, VI=null;
  const ap=avg(mov,'pwr');
  if(ap!=null){
    // 30s rolling avg then 4th power mean
    const p=stream.map(x=>x.pwr==null?0:x.pwr); const win=30; let acc=0; const roll=[];
    for(let i=0;i<p.length;i++){ acc+=p[i]; if(i>=win)acc-=p[i-win]; if(i>=win-1)roll.push(acc/win); }
    if(roll.length){ const m4=roll.reduce((a,b)=>a+b**4,0)/roll.length; xPower=Math.pow(m4,0.25); VI=xPower/ap; }
  }

  // downsample stream for storage/plots (<= 600 pts)
  const step=Math.max(1,Math.ceil(stream.length/600));
  const ds=[]; for(let i=0;i<stream.length;i+=step){ const p=stream[i];
    ds.push([Math.round(p.et), p.d==null?null:Math.round(p.d), p.v==null?null:Math.round(p.v*100)/100,
      p.gap==null?null:Math.round(p.gap*100)/100, p.hr, p.cad, p.pwr, p.alt==null?null:Math.round(p.alt*10)/10,
      Math.round(p.grade*1000)/1000]); }

  // ---- GPS polyline (downsampled ≤300 pts, 5-decimal ≈1 m precision)
  let gps=null;
  { const pts=recs.filter(r=>r.lat!=null&&r.lng!=null&&r.lat!==0x7FFFFFFF);
    if(pts.length>10){ const gstep=Math.max(1,Math.ceil(pts.length/300));
      gps=[]; for(let i=0;i<pts.length;i+=gstep){ const r=pts[i];
        gps.push([Math.round(semiToDeg(r.lat)*1e5)/1e5, Math.round(semiToDeg(r.lng)*1e5)/1e5]); }
      const last=pts[pts.length-1];
      const le=[Math.round(semiToDeg(last.lat)*1e5)/1e5, Math.round(semiToDeg(last.lng)*1e5)/1e5];
      const ge=gps[gps.length-1]; if(ge[0]!==le[0]||ge[1]!==le[1]) gps.push(le);
    } }

  // ---- best efforts over standard distances (two-pointer on full-res stream)
  const BEST_DISTS=[400,1000,1609.34,5000,10000,21097.5,42195];
  let bests=null;
  { const seq=stream.filter(p=>p.d!=null); // cumulative distance ascending
    if(seq.length>10){ bests={};
      for(const D of BEST_DISTS){ if((seq[seq.length-1].d - seq[0].d) < D) continue;
        let i=0,best=Infinity;
        for(let j=1;j<seq.length;j++){
          while(i<j-1 && (seq[j].d - seq[i+1].d) >= D) i++;
          if(seq[j].d - seq[i].d >= D){
            // linear interpolation of start point for exactness
            const over=(seq[j].d - seq[i].d) - D;
            const segD=seq[i+1]?(seq[i+1].d-seq[i].d):0, segT=seq[i+1]?(seq[i+1].et-seq[i].et):0;
            const tAdj=(segD>0&&over>0&&over<segD)? seq[i].et + segT*(over/segD) : seq[i].et;
            const t=seq[j].et - tAdj;
            if(t>0 && t<best) best=t;
          }
        }
        if(best<Infinity) bests[D]=Math.round(best*10)/10;
      }
      if(!Object.keys(bests).length) bests=null;
    } }

  const laps=raw.laps.map(l=>({
    dist:distM(l.dist), elapsed:l.elapsed!=null?l.elapsed/1000:null,
    avgHr:l.avgHr, maxHr:l.maxHr, avgSpd:spdMS(l.avgSpd), avgCad:l.avgCad!=null?l.avgCad*2:null, avgPwr:l.avgPwr,
    ascent:l.ascent }));

  return {
    date, sport:raw.sport, unixStart,
    km: totalDist/1000, durSec: (movingSec>60? Math.round(movingSec) : Math.round(timerSec||elapsed)), elapsedSec: Math.round(elapsed),
    avgHr: s[16]||Math.round(avg(mov,'hr')||0)||null,
    maxHr: s[17]||Math.max(...mov.map(p=>p.hr||0))||null,
    avgPwr: s[20]!=null?s[20]:(ap!=null?Math.round(ap):null),   // session avg_power = field 20
    maxPwr: s[21]!=null?s[21]:(mov.length?Math.max(...mov.map(p=>p.pwr||0)):null), // field 21
    cadence: s[18]!=null? s[18]*2 : (Math.round(avg(mov,'cad')||0)||null),          // field 18 (one-leg rpm)
    ascentM: Math.round(s[22]!=null?s[22]:ascent),
    calories: s[11]||null,
    decoupling, xPower: xPower!=null?Math.round(xPower):null, VI: VI!=null?Math.round(VI*1000)/1000:null,
    gapEquivKm: gapEquivM/1000,   // equivalent flat distance; GAP pace = durSec / gapEquivKm
    pwrCurve, spdCurve, durs,
    stream: ds, laps, gps, bests,
    hasStream:true
  };
}

/* ============================================================
   SVG chart builders (dependency-free, responsive via viewBox)
   ============================================================ */
const NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){ const e=document.createElementNS(NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

function pmcChart(){
  const s=pmc(); if(s.length<2) return '<div class="empty">データがありません</div>';
  const W=760,H=240,padL=8,padR=8,padT=14,padB=22;
  const view=s.slice(-120);
  const xs=i=>padL+(i/(view.length-1))*(W-padL-padR);
  const ctlMax=Math.max(...view.map(d=>d.ctl))*1.15||1;
  const loadMax=Math.max(...view.map(d=>d.load))*1.1||1;
  const tsbMax=Math.max(...view.map(d=>Math.abs(d.tsb)))*1.2||1;
  const yC=v=>H-padB-(v/ctlMax)*(H-padT-padB);
  const yL=v=>H-padB-(v/loadMax)*(H-padT-padB);
  const yT=v=>{const mid=(H-padT-padB)/2+padT; return mid-(v/tsbMax)*(H-padT-padB)/2;};
  let bars='';
  view.forEach((d,i)=>{ if(d.load<=0) return; const x=xs(i), y=yL(d.load);
    bars+=`<rect x="${x-1.4}" y="${y}" width="2.8" height="${H-padB-y}" rx="1" fill="#232E42"/>`; });
  const line=(key,y,color,w)=>{ let p=''; view.forEach((d,i)=>{ p+=(i?'L':'M')+xs(i).toFixed(1)+' '+y(d[key]).toFixed(1)+' '; });
    return `<path d="${p}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linejoin="round"/>`; };
  // CTL area
  let area='M'+xs(0)+' '+yC(view[0].ctl); view.forEach((d,i)=>area+=' L'+xs(i).toFixed(1)+' '+yC(d.ctl).toFixed(1));
  area+=` L${xs(view.length-1)} ${H-padB} L${xs(0)} ${H-padB} Z`;
  // TSB zero line
  const zeroY=yT(0);
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="none" style="height:240px">
    <defs><linearGradient id="ctlg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8C7DFF" stop-opacity=".28"/><stop offset="1" stop-color="#8C7DFF" stop-opacity="0"/>
    </linearGradient></defs>
    ${bars}
    <path d="${area}" fill="url(#ctlg)"/>
    ${line('ctl',yC,'#8C7DFF',2.4)}
    ${line('atl',yC,'#FF6E5B',1.6)}
    <line x1="${padL}" x2="${W-padR}" y1="${zeroY}" y2="${zeroY}" stroke="#33E1C4" stroke-opacity=".25" stroke-dasharray="3 4"/>
    ${line('tsb',yT,'#33E1C4',1.8)}
  </svg>`;
}

function paceCurveChart(){
  // best pace (sec/km) sustained for each distance bucket
  const buckets=[1,2,3,5,8,10,15,21.0975,30,42.195];
  const best={};
  DB.activities.forEach(a=>{ const ps=paceFromRun(a);
    buckets.forEach(b=>{ if(a.km>=b*0.92){ if(!best[b]||ps<best[b]) best[b]=ps; } }); });
  const pts=buckets.filter(b=>best[b]).map(b=>({d:b,p:best[b]}));
  if(pts.length<3) return '<div class="empty">データがありません</div>';
  const W=760,H=210,padL=44,padR=12,padT=14,padB=28;
  const dmin=Math.log(pts[0].d), dmax=Math.log(pts[pts.length-1].d);
  const pmin=Math.min(...pts.map(p=>p.p))*0.96, pmax=Math.max(...pts.map(p=>p.p))*1.04;
  const x=d=>padL+((Math.log(d)-dmin)/(dmax-dmin))*(W-padL-padR);
  const y=p=>padT+((p-pmin)/(pmax-pmin))*(H-padT-padB);
  let path='',dots='';
  pts.forEach((pt,i)=>{ path+=(i?'L':'M')+x(pt.d).toFixed(1)+' '+y(pt.p).toFixed(1)+' ';
    dots+=`<circle cx="${x(pt.d).toFixed(1)}" cy="${y(pt.p).toFixed(1)}" r="3.2" fill="#33E1C4"/>`; });
  let ax='';[pmin,(pmin+pmax)/2,pmax].forEach(v=>{ ax+=`<text x="6" y="${y(v)+3}" fill="#5E6a82" font-size="10" font-family="IBM Plex Mono">${paceStr(v)}</text>`; });
  let xl='';[1,5,10,21.0975,42.195].forEach(d=>{ if(d>=pts[0].d&&d<=pts[pts.length-1].d)
    xl+=`<text x="${x(d)}" y="${H-8}" fill="#5E6a82" font-size="10" text-anchor="middle" font-family="IBM Plex Mono">${d<10?d+'k':d<22?d+'k':(d<30?'半':'フル')}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:210px">
    <path d="${path}" fill="none" stroke="#33E1C4" stroke-width="2.2" stroke-linejoin="round"/>
    ${dots}${ax}${xl}
    <text x="${padL}" y="11" fill="#5E6a82" font-size="9" font-family="IBM Plex Mono">min/km</text>
  </svg>`;
}

function efChart(){
  const pts=efficiencyTrend(); if(pts.length<3) return '<div class="empty">HRデータ付きのイージー走が必要です</div>';
  const W=760,H=170,padL=10,padR=10,padT=14,padB=18;
  const min=Math.min(...pts.map(p=>p.ef))*0.98,max=Math.max(...pts.map(p=>p.ef))*1.02;
  const x=i=>padL+(i/(pts.length-1))*(W-padL-padR);
  const y=v=>H-padB-((v-min)/(max-min))*(H-padT-padB);
  let path='';pts.forEach((p,i)=>path+=(i?'L':'M')+x(i).toFixed(1)+' '+y(p.ef).toFixed(1)+' ');
  // linear regression trendline
  const n=pts.length; let sx=0,sy=0,sxy=0,sxx=0;
  pts.forEach((p,i)=>{sx+=i;sy+=p.ef;sxy+=i*p.ef;sxx+=i*i;});
  const b=(n*sxy-sx*sy)/(n*sxx-sx*sx), a=(sy-b*sx)/n;
  const trend=`M${x(0)} ${y(a)} L${x(n-1)} ${y(a+b*(n-1))}`;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:170px">
    <path d="${trend}" stroke="#F5B23E" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>
    <path d="${path}" fill="none" stroke="#9BD860" stroke-width="2" stroke-linejoin="round"/>
  </svg>`;
}

function weeklyBars(){
  const now=todayISO(); const weeks={};
  DB.activities.forEach(a=>{ const age=dayDiff(a.date,now); if(age<0||age>84) return;
    const wk=Math.floor(age/7); weeks[wk]=(weeks[wk]||0)+a.km; });
  const arr=[]; for(let i=11;i>=0;i--) arr.push(round(weeks[i]||0,0));
  const W=760,H=150,padB=18,padT=10,padL=6,padR=6;
  const max=Math.max(...arr,1); const bw=(W-padL-padR)/arr.length;
  let bars='';arr.forEach((v,i)=>{ const h=(v/max)*(H-padT-padB); const x=padL+i*bw+bw*0.18;
    const col=i===arr.length-1?'#33E1C4':'#2D3A52';
    bars+=`<rect x="${x}" y="${H-padB-h}" width="${bw*0.64}" height="${h}" rx="3" fill="${col}"/>
    <text x="${x+bw*0.32}" y="${H-6}" fill="#5E6a82" font-size="9" text-anchor="middle" font-family="IBM Plex Mono">${v}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" style="height:150px">${bars}</svg>`;
}

function zoneDonut(){
  // time-in-zone across last 42d by HR fraction
  const p=DB.profile, now=todayISO(); const z=[0,0,0,0,0];
  DB.activities.forEach(a=>{ if(!a.hrAvg) return; const age=dayDiff(a.date,now); if(age>42) return;
    const f=(a.hrAvg-p.hrRest)/(p.hrMax-p.hrRest);
    let zi=f<0.6?0:f<0.7?1:f<0.8?2:f<0.9?3:4; z[zi]+=a.durSec; });
  const total=z.reduce((s,x)=>s+x,0)||1;
  const cols=['#33E1C4','#5FD6A8','#9BD860','#F5B23E','#FF6E5B'];
  const R=54,C=2*Math.PI*R; let off=0,arcs='';
  z.forEach((v,i)=>{ const frac=v/total; const len=frac*C;
    arcs+=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${cols[i]}" stroke-width="16"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off+=len; });
  const labels=['Z1 回復','Z2 有酸素','Z3 中程度','Z4 閾値','Z5 VO2'];
  let leg='';z.forEach((v,i)=>{ leg+=`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);margin:5px 0">
    <span class="dot" style="background:${cols[i]}"></span>${labels[i]}
    <span class="mono" style="margin-left:auto;color:var(--ink)">${Math.round(v/total*100)}%</span></div>`; });
  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <svg viewBox="0 0 140 140" style="width:140px;height:140px;flex:0 0 auto">${arcs}</svg>
    <div style="flex:1;min-width:150px">${leg}</div></div>`;
}

/* readiness dial — SIGNATURE element: chronograph bezel + zone-shifting arc */
function readinessDial(rd){
  const size=240,cx=120,cy=120,R=96;
  const C=2*Math.PI*R; const frac=rd.score/100;
  // lane-line bezel ticks (like a track's lanes / chrono bezel)
  let ticks='';
  for(let i=0;i<=60;i++){ const ang=(-90+i*6)*Math.PI/180; const big=i%5===0;
    const r1=R+12, r2=R+(big?20:16);
    const x1=cx+Math.cos(ang)*r1,y1=cy+Math.sin(ang)*r1,x2=cx+Math.cos(ang)*r2,y2=cy+Math.sin(ang)*r2;
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
      stroke="${i<=frac*60?rd.color:'#232E42'}" stroke-width="${big?2:1.2}" stroke-linecap="round" opacity="${i<=frac*60?0.9:0.5}"/>`; }
  return `<div class="dial">
    <svg viewBox="0 0 ${size} ${size}" style="width:100%;height:100%">
      ${ticks}
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1C2536" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${rd.color}" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="${(frac*C).toFixed(1)} ${C}" transform="rotate(-90 ${cx} ${cy})"/>
    </svg>
    <div class="verdict">
      <div class="score" style="color:${rd.color}">${rd.score}</div>
      <div class="label" style="color:${rd.color}">${rd.band}</div>
      <div class="sub">${rd.verdict}</div>
    </div></div>`;
}

function adjustmentOption(kind, base, risk){
  const safeKm=Math.max(4,Math.round((base.km||8)*0.55));
  const shortKm=Math.max(5,Math.round((base.km||8)*0.8));
  const opts={
    keep:{tag:'KEEP',cat:base.cat,km:base.km,title:base.currentTitle||base.title,body:'予定どおり実施します。上振れは避け、体感が悪ければその場でEasy化します。',color:'var(--teal)'},
    shorten:{tag:'SHORTEN',cat:'easy',km:shortKm,title:`20%短縮 ${shortKm}km`,body:'距離を2割落とし、強度はEasyまで。疲労を残しにくい変更です。',color:'var(--gold)'},
    easy:{tag:'EASY',cat:'easy',km:Math.max(6,Math.round((base.km||8)*0.7)),title:`Easy ${Math.max(6,Math.round((base.km||8)*0.7))}km`,body:'目的を有酸素維持へ変更。LT/VO2刺激は入れません。',color:'var(--lime)'},
    protected:{tag:'PROTECT',cat:'easy',km:safeKm,title:`Protected Easy ${safeKm}km`,body:'脚の反応確認を優先。痛み・張りが出たら即終了します。',color:'var(--gold)'},
    bike:{tag:'BIKE',cat:'bike',km:0,title:'Bike 30–45分',body:'心肺だけ軽く動かし、着地衝撃を抜きます。脚部負荷が高い日に有効です。',color:'var(--teal)'},
    rest:{tag:'REST',cat:'rest',km:0,title:'Rest / Mobility',body:'走らずに回復を優先します。痛み・張りがある場合は最も合理的です。',color:'var(--coral)'},
    move:{tag:'MOVE',cat:'move',km:0,title:'明日に移動',body:'今日の負荷は入れず、明日の状態を見て再判断します。',color:'var(--violet)'}
  };
  return opts[kind]||opts.easy;
}
function applyTodayAdjustment(kind){
  const base=plannedWorkoutV77(); const risk=loadRiskV77(); const o=adjustmentOption(kind,base,risk);
  const date=todayISO(); const prev=DB.planOverrides&&DB.planOverrides[date]?{...DB.planOverrides[date]}:null;
  DB.planOverrides=DB.planOverrides||{}; DB.adjustLog=DB.adjustLog||[];
  DB.planOverrides[date]={...o,date,original:base.currentTitle||base.title,reason:risk.reasons.slice(0,3),createdAt:new Date().toISOString()};
  DB.adjustLog.push({date,kind,from:base.currentTitle||base.title,to:o.title,at:new Date().toISOString()});
  const saved=save(); closeGB(); renderToday();
  if(saved) flashUndo(`今日のメニューを「${o.title}」に変更しました`,()=>{
    if(prev) DB.planOverrides[date]=prev; else delete DB.planOverrides[date];
    const undoSaved=save(); renderToday(); if(!undoSaved) notifySaveResult(false,'');
  });
  else notifySaveResult(false,'');
}
function clearTodayAdjustment(){
  const date=todayISO(); if(DB.planOverrides&&DB.planOverrides[date]){ const prev=DB.planOverrides[date]; delete DB.planOverrides[date]; const saved=save(); renderToday();

    else notifySaveResult(false,''); }
}

/* ---- Strava Worker preview UI (does not write meridian.v1) ---- */
const STRAVA_WORKER_URL_KEY='runos.stravaWorkerUrl.v1';
const DEFAULT_STRAVA_WORKER_URL='https://runos-strava-worker.mtk0808.workers.dev';
const STRAVA_PER_PAGE=30;
let STRAVA_ACTIVITY_PREVIEWS=[];
let STRAVA_SELECTED_IDS=new Set();
let STRAVA_PAGING={page:0,perPage:STRAVA_PER_PAGE,hasMore:false,loading:false,reachedEnd:false};
function escapeHTML(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function exportRunosBackup(prefix='runos-backup'){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const fname=`${prefix}-${todayISO()}.json`;
  const u=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=u; a.download=fname; a.click(); URL.revokeObjectURL(u);
}
function getStravaWorkerUrl(){
  try{ return localStorage.getItem(STRAVA_WORKER_URL_KEY)||DEFAULT_STRAVA_WORKER_URL; }
  catch(err){ console.warn('[RunOS Strava] Worker URL read failed',err); return DEFAULT_STRAVA_WORKER_URL; }
}
function normalizeStravaWorkerUrl(url){
  const v=String(url||'').trim().replace(/\/+$/,'');
  if(!/^https?:\/\//i.test(v)) throw new Error('Worker URLは http(s) で始めてください');
  return v;
}
function saveStravaWorkerUrl(url){
  const v=normalizeStravaWorkerUrl(url);
  try{ localStorage.setItem(STRAVA_WORKER_URL_KEY,v); return {ok:true,url:v}; }
  catch(err){ console.warn('[RunOS Strava] Worker URL save failed',err); return {ok:false,url:v,error:err}; }
}
function stravaStatus(message,kind='info'){
  const box=el('stravaWorkerStatus'); if(!box) return;
  const color=kind==='error'?'var(--coral)':kind==='ok'?'var(--teal)':kind==='warn'?'var(--gold)':'var(--ink-2)';
  box.textContent=message; box.style.color=color;
}
function stravaErrorMessage(err){
  const code=err&&err.error;
  if(code==='not_connected') return 'Strava未接続です。先に「接続開始」を開いて認可してください。';
  if(code==='token_storage_unavailable') return 'WorkerのKV設定が未完了です（STRAVA_TOKEN_KV）。';
  if(code==='worker_config_missing') return `Worker設定が不足しています: ${(err.missing||[]).join(', ')}`;
  if(code==='cors_forbidden') return 'CORSで拒否されました。RunOS legacy PWAの公開URLがWorkerに許可されているか確認してください。';
  if(code==='strava_api_error') return `Strava APIエラー (${err.status||'unknown'})`;
  return (err&&err.message)||'Strava Workerへの接続に失敗しました';
}
async function stravaFetch(path){
  const base=normalizeStravaWorkerUrl(el('stravaWorkerUrl')?el('stravaWorkerUrl').value:getStravaWorkerUrl());
  let res, data, text;
  try{
    res=await fetch(base+path,{headers:{Accept:'application/json'},cache:'no-store'});
    text=await res.text();
  }catch(err){
    console.error('[RunOS Strava] fetch failed',err);
    throw new Error('Workerへ接続できませんでした。CORS、ネットワーク、Worker URLを確認してください。');
  }
  try{ data=text?JSON.parse(text):{}; }catch(err){ data={message:text||''}; }
  if(!res.ok){ console.warn('[RunOS Strava] worker error',res.status,data); throw data; }
  return data;
}
function stravaAthleteName(a){
  if(!a) return '—';
  return [a.firstname,a.lastname].filter(Boolean).join(' ') || a.username || (a.id?`Athlete ${a.id}`:'—');
}
function stravaExternalId(preview){
  const raw=preview&&preview.rawSummary||{};
  return preview&&preview.externalId ? String(preview.externalId) : (raw.id!=null?`strava:${raw.id}`:null);
}
function stravaPreviewKey(preview){
  const ext=stravaExternalId(preview);
  if(ext) return ext;
  const a=preview&&preview.runosActivity||{}, raw=preview&&preview.rawSummary||{};
  return [a.date||raw.start_date_local||raw.start_date||'',a.km||raw.distance||'',a.durSec||raw.moving_time||'',a.note||raw.name||''].join('|');
}
function stravaStartMs(preview){
  const raw=preview&&preview.rawSummary||{};
  const t=Date.parse(raw.start_date_local||raw.start_date||'');
  return Number.isFinite(t)?t:null;
}
function existingStartMs(a){
  const t=Date.parse(a.startDateLocal||a.startTime||a.startedAt||a.date||'');
  return Number.isFinite(t)?t:null;
}
function findStravaDuplicate(preview){
  const a=preview&&preview.runosActivity||{};
  const externalId=stravaExternalId(preview);
  const sourceId=externalId&&externalId.replace(/^strava:/,'');
  const exact=(DB.activities||[]).find(x=>externalId&&(x.externalId===externalId||x.sourceId===externalId||x.stravaActivityId===sourceId));
  if(exact) return {kind:'exact',activity:exact,message:'取り込み済み'};
  const km=Number(a.km||0),dur=Number(a.durSec||0),date=a.date;
  if(!km||!dur||!date) return null;
  const cStart=stravaStartMs(preview);
  const approx=(DB.activities||[]).find(x=>{
    const xkm=Number(x.km||0),xdur=Number(x.durSec||0);
    if(!xkm||!xdur) return false;
    const distClose=Math.abs(xkm-km)/Math.max(km,xkm)<=0.02;
    const durClose=Math.abs(xdur-dur)/Math.max(dur,xdur)<=0.02;
    if(!distClose||!durClose) return false;
    const xStart=existingStartMs(x);
    const nearStart=cStart&&xStart&&Math.abs(cStart-xStart)<=2*60*60*1000;
    return x.date===date||nearStart;
  });
  return approx?{kind:'approx',activity:approx,message:'重複の可能性あり'}:null;
}
function stravaCanImport(preview,dup){
  return !!(preview&&preview.importable&&preview.runosActivity)&&!(dup&&dup.kind==='exact');
}
function mergeStravaPreviews(previews,reset=false){
  if(reset){ STRAVA_ACTIVITY_PREVIEWS=[]; STRAVA_SELECTED_IDS=new Set(); }
  const existing=new Set(STRAVA_ACTIVITY_PREVIEWS.map(stravaPreviewKey));
  let added=0;
  (previews||[]).forEach(p=>{
    const key=stravaPreviewKey(p);
    if(existing.has(key)) return;
    existing.add(key); STRAVA_ACTIVITY_PREVIEWS.push(p); added++;
    const dup=findStravaDuplicate(p);
    if(stravaCanImport(p,dup)&&!dup) STRAVA_SELECTED_IDS.add(key);
  });
  return added;
}
function stravaSelectionStats(){
  const stats={displayed:STRAVA_ACTIVITY_PREVIEWS.length,importable:0,selected:0,exact:0,approx:0,imported:0};
  STRAVA_ACTIVITY_PREVIEWS.forEach(p=>{
    const dup=findStravaDuplicate(p), can=stravaCanImport(p,dup), key=stravaPreviewKey(p);
    if(p&&p.importable) stats.importable++;
    if(dup&&dup.kind==='exact'){ stats.exact++; stats.imported++; }
    if(dup&&dup.kind==='approx') stats.approx++;
    if(can&&STRAVA_SELECTED_IDS.has(key)) stats.selected++;
  });
  return stats;
}
function updateStravaSelectionSummary(){
  const s=stravaSelectionStats();
  const box=el('stravaSelectionSummary');
  if(box) box.innerHTML=`表示 ${s.displayed}件 · 取込可能 ${s.importable}件 · 選択 ${s.selected}件 · 取込済み ${s.imported}件 · exact duplicate ${s.exact}件 · 近似duplicate ${s.approx}件`;
  const importBtn=el('stravaImportSelected'); if(importBtn) importBtn.disabled=s.selected===0;
  const more=el('stravaLoadMore'); if(more){ more.disabled=STRAVA_PAGING.loading||!STRAVA_PAGING.hasMore; more.textContent=STRAVA_PAGING.loading?'取得中…':(STRAVA_PAGING.hasMore?'さらに読み込む':'これ以上ありません'); }
}
function wireStravaSelectionControls(){
  document.querySelectorAll('[data-strava-select]').forEach(cb=>cb.onchange=()=>{
    const p=STRAVA_ACTIVITY_PREVIEWS[parseInt(cb.dataset.stravaSelect)];
    const key=stravaPreviewKey(p);
    if(cb.checked) STRAVA_SELECTED_IDS.add(key); else STRAVA_SELECTED_IDS.delete(key);
    updateStravaSelectionSummary();
  });
  const setAll=(mode)=>{
    STRAVA_ACTIVITY_PREVIEWS.forEach(p=>{
      const dup=findStravaDuplicate(p), key=stravaPreviewKey(p);
      if(!stravaCanImport(p,dup)){ STRAVA_SELECTED_IDS.delete(key); return; }
      if(mode==='clear') STRAVA_SELECTED_IDS.delete(key);
      else if(mode==='safe') { if(!dup) STRAVA_SELECTED_IDS.add(key); else STRAVA_SELECTED_IDS.delete(key); }
      else if(mode==='all') STRAVA_SELECTED_IDS.add(key);
    });
    renderStravaActivities(null,{preserve:true});
  };
  const all=el('stravaSelectAll'); if(all) all.onclick=()=>setAll('all');
  const safe=el('stravaSelectSafe'); if(safe) safe.onclick=()=>setAll('safe');
  const clear=el('stravaClearSelection'); if(clear) clear.onclick=()=>setAll('clear');
}

    const a=p.runosActivity||{};

    const km=Number(a.km||0);
    const dur=Number(a.durSec||0);
    const pace=(km>0&&dur>0)?paceStr(dur/km):'—';
    const ok=!!p.importable;
    const dup=findStravaDuplicate(p);
    const can=stravaCanImport(p,dup);
    const key=stravaPreviewKey(p);
    const checked=can&&STRAVA_SELECTED_IDS.has(key)?'checked':'';
    const disabled=can?'':'disabled';
    const status=dup?dup.message:(ok?'選択可':'skip');
    const statusColor=dup? (dup.kind==='exact'?'var(--ink-3)':'var(--gold)') : (ok?'var(--teal)':'var(--gold)');
    return `<tr>
      <td><input type="checkbox" data-strava-select="${i}" ${checked} ${disabled} style="width:auto"></td>
      <td class="mono">${escapeHTML(a.date||String(raw.start_date_local||raw.start_date||'').slice(0,10)||'—')}</td>
      <td>${escapeHTML(a.note||raw.name||'—')}</td>
      <td class="n mono">${km?round(km,2)+'km':'—'}</td>
      <td class="n mono">${dur?hms(dur):'—'}</td>
      <td class="n mono">${pace}${pace!=='—'?'/km':''}</td>
      <td class="n mono">${a.hrAvg||'—'}</td>
      <td style="color:${statusColor}">${escapeHTML(status)}${!ok&&p.skipReason?`<div class="hint">${escapeHTML(p.skipReason)}</div>`:''}${dup&&dup.kind==='approx'?'<div class="hint">初期状態では未選択です</div>':''}</td>
    </tr>`; }).join('')}</tbody></table></div>
    <div class="row-actions" style="margin-top:10px">

function stravaPreviewToActivity(preview){
  const a=preview&&preview.runosActivity||{}, raw=preview&&preview.rawSummary||{};
  const km=Number(a.km), durSec=Math.round(Number(a.durSec));
  if(!a.date||!isFinite(km)||km<=0||!isFinite(durSec)||durSec<60) return null;
  const externalId=stravaExternalId(preview);
  const sourceId=externalId&&externalId.replace(/^strava:/,'');
  const id=externalId?`strava_${String(externalId).replace(/[^a-zA-Z0-9_-]/g,'_')}`:undefined;
  const act=normalizeActivity({id,date:a.date,type:a.type||'easy',km,durSec,
    hrAvg:a.hrAvg||null,hrMax:a.hrMax||null,elevM:a.elevM||null,cadence:a.cadence||null,
    note:a.note||raw.name||'',source:'strava_api'});
  act.externalId=externalId;
  act.sourceId=externalId;
  act.stravaActivityId=sourceId||null;
  act.source='strava_api';
  act.sourceName='Strava API';
  act.startDateLocal=raw.start_date_local||null;
  act.importedAt=new Date().toISOString();
  return act;
}
function importSelectedStravaActivities(){
  if(STORAGE_RECOVERY&&STORAGE_RECOVERY.active){ stravaStatus(saveFailureText(),'error'); return; }
  const selected=[...document.querySelectorAll('[data-strava-select]:checked')].map(x=>parseInt(x.dataset.stravaSelect)).filter(i=>!isNaN(i));
  if(!selected.length){ stravaStatus('取り込む活動を選択してください','warn'); return; }
  if(!confirm(`選択した ${selected.length} 件を取り込みます。先にJSONバックアップを書き出すことを強く推奨します。\n\nOKでバックアップを書き出してから次の確認へ進みます。`)) return;
  try{ exportRunosBackup('runos-before-strava-import'); }catch(err){ console.warn('[RunOS Strava] backup export failed',err); }
  if(!confirm('バックアップのダウンロード開始を確認してから実行してください。\n\nStrava活動をRunOSへ取り込みますか？')) return;
  const beforeActivities=(DB.activities||[]).slice();
  const beforeIntegrations=JSON.parse(JSON.stringify(DB.integrations||{}));
  let added=0,skipped=0,dups=0,failed=0;
  const seen=new Set();
  selected.forEach(i=>{
    const p=STRAVA_ACTIVITY_PREVIEWS[i];
    if(!p||!p.importable){ skipped++; return; }
    const dup=findStravaDuplicate(p);
    if(dup&&dup.kind==='exact'){ dups++; return; }
    const ext=stravaExternalId(p);
    if(ext&&seen.has(ext)){ dups++; return; }
    const act=stravaPreviewToActivity(p);
    if(!act){ failed++; return; }
    if(ext) seen.add(ext);
    DB.activities.push(act); added++;
  });
  if(!added){ DB.activities=beforeActivities; stravaStatus(`取り込み対象なし（重複 ${dups}件 / スキップ ${skipped}件 / 失敗 ${failed}件）`,'warn'); renderStravaActivities(null,{preserve:true}); return; }
  DB.activities.sort((a,b)=>a.date<b.date?-1:1);
  DB.integrations=DB.integrations||{};
  DB.integrations.stravaApi={...(DB.integrations.stravaApi||{}),lastImport:todayISO(),imported:((DB.integrations.stravaApi&&DB.integrations.stravaApi.imported)||0)+added};
  const saved=save();
  if(!saved){
    DB.activities=beforeActivities;
    DB.integrations=beforeIntegrations;
    stravaStatus(saveFailureText(),'error');
    renderStravaActivities(null,{preserve:true});
    return;
  }
  stravaStatus(`取り込み完了: ${added}件 / 重複スキップ ${dups}件 / スキップ ${skipped}件 / 失敗 ${failed}件`,'ok');
  flash(`Strava: ${added}件取り込みました`);
  renderStravaActivities(null,{preserve:true});
}
function wireStravaImportUI(){
  const b=el('stravaExportBackup'); if(b) b.onclick=()=>{ try{ exportRunosBackup('runos-before-strava-import'); stravaStatus('バックアップを書き出しました','ok'); }catch(err){ stravaStatus('バックアップ書き出しに失敗しました','error'); } };
  const i=el('stravaImportSelected'); if(i) i.onclick=importSelectedStravaActivities;
  const more=el('stravaLoadMore'); if(more) more.onclick=()=>loadStravaActivitiesPage(STRAVA_PAGING.page+1,true);
}
async function loadStravaActivitiesPage(page=1,append=false){
  if(STRAVA_PAGING.loading) return;
  STRAVA_PAGING.loading=true; updateStravaSelectionSummary();
  stravaStatus(append?`Strava活動 ${page}ページ目を取得中…`:'Strava活動を取得中…','info');
  try{
    const data=await stravaFetch(`/activities?page=${page}&per_page=${STRAVA_PER_PAGE}`);
    const before=STRAVA_ACTIVITY_PREVIEWS.length;
    renderStravaActivities(data,{append});
    const added=STRAVA_ACTIVITY_PREVIEWS.length-before;
    if(!added&&append) STRAVA_PAGING.hasMore=false;
    const s=stravaSelectionStats();
    stravaStatus(STRAVA_PAGING.hasMore?`活動を取得しました（表示 ${s.displayed}件 / 選択 ${s.selected}件）`:`活動を取得しました（表示 ${s.displayed}件）。これ以上ありません`,'ok');
  }catch(err){ stravaStatus(stravaErrorMessage(err),'error'); }
  finally{ STRAVA_PAGING.loading=false; updateStravaSelectionSummary(); }
}
function wireStravaWorkerUI(){
  const input=el('stravaWorkerUrl'); if(input) input.value=getStravaWorkerUrl();
  const saveBtn=el('stravaWorkerSave');
  if(saveBtn) saveBtn.onclick=()=>{
    try{
      const r=saveStravaWorkerUrl(input.value);
      if(r.ok) stravaStatus('Worker URLを保存しました（meridian.v1には保存していません）','ok');
      else stravaStatus('Worker URLを保存できませんでした。このセッションでは入力値を使います。','warn');
      if(input) input.value=r.url;
    }catch(err){ stravaStatus(err.message,'error'); }
  };
  const startBtn=el('stravaAuthStart');
  if(startBtn) startBtn.onclick=()=>{
    try{
      const base=normalizeStravaWorkerUrl(input.value);
      const w=window.open(base+'/auth/start','_blank','noopener');
      if(w) stravaStatus('Strava認可タブを開きました。接続後にこの画面へ戻り「接続確認」を押してください。','info');
      else stravaStatus('ポップアップがブロックされました。Worker URL + /auth/start を直接開いてください。','warn');
    }catch(err){ stravaStatus(err.message,'error'); }
  };
  const athleteBtn=el('stravaCheckAthlete');
  if(athleteBtn) athleteBtn.onclick=async()=>{
    stravaStatus('接続状態を確認中…','info');
    try{ const data=await stravaFetch('/athlete'); renderStravaAthlete(data); stravaStatus('Strava接続を確認しました','ok'); }
    catch(err){ stravaStatus(stravaErrorMessage(err),'error'); }
  };
  const actsBtn=el('stravaFetchActivities');
  if(actsBtn) actsBtn.onclick=async()=>{
    STRAVA_ACTIVITY_PREVIEWS=[]; STRAVA_SELECTED_IDS=new Set(); STRAVA_PAGING={page:0,perPage:STRAVA_PER_PAGE,hasMore:false,loading:false,reachedEnd:false};
    await loadStravaActivitiesPage(1,false);
  };
}
