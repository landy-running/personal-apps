  push('平均心拍', a.hrAvg,'bpm'); push('最大心拍', a.hrMax,'bpm');
  push('平均パワー', a.avgPwr,'W'); if(wkg) push('W/kg', wkg);
  if(a.xPower) push('xPower', a.xPower,'W'); if(a.VI) push('VI', a.VI);
  push('ケイデンス', a.cadence,'spm'); push('獲得標高', a.elevM,'m');
  if(a.decoupling!=null) push('デカップリング', round(a.decoupling,1),'%');
  if(a.calories) push('カロリー', a.calories,'kcal');

  let body=`<button class="back" onclick="location.hash='log'">← 記録一覧へ</button>`;

  // PR badges held by this run
  const held=prHolderSet(a.id);
  if(held.length) body+=`<div class="statusline" style="margin-bottom:12px">${held.map(r=>`<span class="pill teal">🏆 ${r.label} 自己ベスト ${hms(r.t)}</span>`).join('')}</div>`;

  body+=`<div class="hero-stats">${hs.join('')}</div>`;

  // Training Effect + recovery + previous-similar comparison strip
  {
    const {te}=trainingEffect(a); const rh=recoveryHours(te);
    const prev=[...DB.activities].filter(x=>x.id!==a.id&&x.type===a.type&&x.date<a.date)
      .sort((x,y)=>x.date<y.date?1:-1)[0];
    let cmp='';
    if(prev){ const dp=(a.durSec/a.km)-(prev.durSec/prev.km);
      const efA=a.hrAvg?(a.km*1000/(a.durSec/60))/a.hrAvg:null, efP=prev.hrAvg?(prev.km*1000/(prev.durSec/60))/prev.hrAvg:null;
      cmp=`<div class="ss"><div class="k">前回の${typeJP(a.type)}比 (${fmtDate(prev.date)})</div>
        <div class="v" style="font-size:16px;color:${dp<=0?'var(--teal)':'var(--gold)'}">${dp<=0?'▲':'▼'} ${Math.abs(Math.round(dp))}秒/km</div>
        ${efA&&efP?`<div class="hint" style="margin-top:4px">効率 ${efA>=efP?'+':''}${round((efA/efP-1)*100,1)}%</div>`:''}</div>`; }
    body+=`<div class="subscores gb" data-gb="te" style="margin-bottom:16px">
      <div class="ss"><div class="k">Training Effect</div><div class="v">${round(te,1)} <small style="font-size:11px;color:var(--ink-2)">${teLabel(te)}</small></div>
        <div class="bar"><i style="width:${te/5*100}%;background:${te>=4.5?'var(--coral)':te>=3?'var(--gold)':'var(--teal)'}"></i></div></div>
      <div class="ss"><div class="k">推奨回復時間</div><div class="v">${rh}<small style="font-size:11px;color:var(--ink-2)"> h</small></div></div>
      ${cmp||'<div class="ss"><div class="k">前回比</div><div class="v" style="color:var(--ink-3)">—</div></div>'}
    </div>`;
  }

  // GPS route
  if(a.gps&&a.gps.length>5){
    body+=`<div class="card" style="margin-bottom:16px;padding:10px"><h3 style="margin:4px 6px 8px">Route</h3>${routeMapSVG(a.gps)}
      <div class="legend" style="margin:6px"><span><span class="dot" style="background:#33E1C4"></span>スタート</span><span><span class="dot" style="background:#FF6E5B"></span>フィニッシュ</span></div></div>`;
  }

  if(a.hasStream&&a.stream&&a.stream.length>2){
    // stream chart with toggles
    const chips=Object.keys(SERIES).map(k=>{ const sp=SERIES[k]; const on=streamActive.has(k);
      return `<button class="tg ${on?'on':''}" data-series="${k}"><span class="dot" style="background:${sp.color}"></span>${sp.label}</button>`; }).join('');
    body+=`<div class="card"><h3>Stream</h3>
      <div class="toggles" id="seriesToggles">${chips}</div>
      <div id="streamHost">${streamChart(a)}</div>
      <div class="hint" style="margin-top:8px">グラフ上をなぞると各地点の値を表示。標高は背景の帯。</div></div>`;

    // decoupling + gap verdict
    if(a.decoupling!=null){
      const dc=a.decoupling; const st=dc<5?'teal':dc<8?'gold':'coral';
      const msg=dc<5?'優秀 — 後半も効率を保てています(有酸素耐性が高い)':dc<8?'良好 — 軽度のドリフト':'ドリフト大 — 距離への耐性づくりが必要';
      body+=`<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:16px">
        <div class="card gb" data-gb="decoupling"><h3>Aerobic Decoupling</h3>
          <div class="verdict-line"><span class="big" style="color:var(--${st})">${round(dc,1)}%</span>
          <span style="font-size:13px;color:var(--ink-2)">${msg}</span></div>
          <div class="hint" style="margin-top:10px">前半と後半の「GAP速度÷心拍」効率の低下率。&lt;5%が理想。</div></div>
        <div class="card"><h3>HR Zones (実測)</h3>${zoneBarsFromStream(a)}</div></div>`;
    } else {
      body+=`<div class="card" style="margin-top:16px"><h3>HR Zones (実測)</h3>${zoneBarsFromStream(a)}</div>`;
    }

    // interval auto-detection (only surfaces for structured workouts)
    const det=detectIntervals(a); if(det) body+=intervalCard(det);
    // splits
    if(a.laps&&a.laps.length>1) body+=`<div class="card" style="margin-top:16px"><h3>Splits · ${a.laps.length}ラップ</h3>${splitTable(a)}</div>`;
    // power curve for this run
    if(a.pwrCurve) body+=`<div class="card" style="margin-top:16px"><h3>Power Curve · この走行</h3>${durationCurveChart(a.pwrCurve,'power')}
      <div class="hint" style="margin-top:8px">各持続時間で出せた最大平均パワー。1秒〜全体まで。</div></div>`;
    // W'bal in-session (anaerobic reserve dynamics)
    body+=`<div class="card gb" data-gb="wbal" style="margin-top:16px"><h3>W′ Balance · 無酸素予備の推移</h3>
      <div class="hint" style="margin-bottom:10px">臨界速度(CS)を超えると無酸素予備(W′)が減り、下回ると回復します。ゼロに近づくほど「もう出せない」状態。インターバルの配分が適切だったかが分かります。</div>
      ${wPrimeChart(a)}</div>`;
  } else {
    body+=`<div class="card"><div class="empty">この記録は手動入力のため詳細ストリームはありません。<br>FITファイルを取り込むと、ペース・心拍・パワー・標高・ラップ・デカップリングまで解析します。</div></div>`;
  }
  // shoe assignment
  { const shoes=activeShoes(); const cur=(DB.shoes||[]).find(s=>s.id===a.shoeId);
    const rec=recommendShoe((()=>{try{return categoryV77(a).type}catch(e){return a.type}})());
    body+=`<div class="card" style="margin-top:16px"><h3>使用シューズ</h3>
      ${shoes.length?`<div class="formgrid" style="grid-template-columns:2fr 1fr"><div class="field"><label>この走行の一足</label>
        <select id="actShoe"><option value="">未割り当て</option>
        ${shoes.map(s=>`<option value="${s.id}" ${a.shoeId===s.id?'selected':''}>${shoeShort(s)}（${round(shoeMileage(s),0)}km）</option>`).join('')}</select></div>
        <div class="field"><label>&nbsp;</label><button class="btn" id="actShoeSave" style="width:100%">保存</button></div></div>
        ${rec?`<div class="hint" style="margin-top:6px">この種別(${WORKOUT_JP[rec.status?categoryV77(a).type:'easy']||''})のおすすめ: <span style="color:var(--teal)">${shoeShort(rec.shoe)}</span> — ${rec.why}</div>`:''}`
      :`<div class="hint">設定でシューズを登録すると、この走行に一足を割り当てて走行距離を自動集計できます。</div>`}
    </div>`;
  }
  host.innerHTML=body;
  // wire toggles + hover
  if(a.hasStream){
    document.querySelectorAll('#seriesToggles .tg').forEach(b=>b.onclick=()=>{
      const k=b.dataset.series; if(streamActive.has(k))streamActive.delete(k); else streamActive.add(k);
      el('streamHost').innerHTML=streamChart(a); wireStreamHover(a); renderActivityDetail(id); });
    wireStreamHover(a);
  }
  { const sb=el('actShoeSave'); if(sb) sb.onclick=()=>{ const v=el('actShoe').value; a.shoeId=v||null; notifySaveResult(save(),'シューズを割り当てました'); renderActivityDetail(id); }; }
  wireGB();
}
function zoneBarsFromStream(a){
  const {z,tot}=hrZonesFromStream(a.stream);
  const cols=['#33E1C4','#5FD6A8','#9BD860','#F5B23E','#FF6E5B'];
  const labels=['Z1','Z2','Z3','Z4','Z5'];
  let bars='',leg='';
  z.forEach((v,i)=>{ const pct=v/tot*100;
    bars+=`<div style="flex:${v||0.001};background:${cols[i]}" title="${labels[i]} ${Math.round(pct)}%"></div>`;
    leg+=`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-2)"><span class="dot" style="background:${cols[i]}"></span>${labels[i]} ${Math.round(pct)}%</span>`; });
  return `<div class="zbar" style="height:26px">${bars}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">${leg}</div>`;
}
function splitTable(a){
  const rows=a.laps.map((l,i)=>{ const pace=l.avgSpd?1000/l.avgSpd:(l.dist&&l.elapsed?l.elapsed/(l.dist/1000):null);
    return `<tr><td class="mono">${i+1}</td><td class="n">${l.dist?round(l.dist/1000,2):'—'}</td>
      <td class="n">${l.elapsed?hms(l.elapsed):'—'}</td><td class="n">${pace?paceStr(pace):'—'}</td>
      <td class="n">${l.avgHr||'—'}</td><td class="n">${l.avgPwr||'—'}</td><td class="n">${l.ascent!=null?Math.round(l.ascent):'—'}</td></tr>`; }).join('');
  // pace bar mini
  const paces=a.laps.map(l=>l.avgSpd?1000/l.avgSpd:null).filter(x=>x);
  const pmin=Math.min(...paces),pmax=Math.max(...paces);
  const mini=a.laps.map(l=>{ const pc=l.avgSpd?1000/l.avgSpd:null; if(!pc)return '<div style="flex:1"></div>';
    const h=100-((pc-pmin)/((pmax-pmin)||1))*70; // faster=taller
    return `<div style="flex:1;display:flex;align-items:flex-end"><div style="width:100%;height:${h}%;background:var(--teal);border-radius:2px;min-height:4px"></div></div>`; }).join('');
  return `<div style="display:flex;gap:3px;height:44px;margin-bottom:12px">${mini}</div>
    <div style="overflow-x:auto"><table><thead><tr><th>ラップ</th><th class="n">km</th><th class="n">時間</th><th class="n">ペース</th><th class="n">HR</th><th class="n">W</th><th class="n">上昇</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ============================================================
   Router + nav + chrome
   ============================================================ */
const VIEWS=[
  {id:'today', title:'Today', sub:'今日のコンディションと意思決定', icon:'M3 12h4l3 8 4-16 3 8h4'},
  {id:'coach', title:'Coach', sub:'あなた専用の分析とメニュー処方', icon:'M12 2l2.2 4.8L19.5 8l-4 3.6.9 5.4L12 14.8 7.6 17l.9-5.4-4-3.6 5.3-1.2z'},
  {id:'fitness', title:'Fitness', sub:'体力・疲労・調子の推移', icon:'M4 19V5M4 19h16M8 15l3-4 3 3 4-6'},
  {id:'plan', title:'Season', sub:'シーズン設計・目標レース・自己ベスト', icon:'M6 3v18M6 4h11l-2 4 2 4H6'},
  {id:'log', title:'Log', sub:'ランの記録', icon:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4'},
  {id:'insights', title:'Insights', sub:'高度分析と診断', icon:'M12 3a9 9 0 100 18 9 9 0 000-18zM12 8v4l3 2'},
  {id:'library', title:'Library', sub:'トレーニング科学の知見', icon:'M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2zM14 3v6h6M8 13h8M8 17h5'},
  {id:'settings', title:'Settings', sub:'プロフィールとデータ', icon:'M12 15a3 3 0 100-6 3 3 0 000 6zM19 12a7 7 0 00-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 00-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 00-1.7 1l-2.4-1-2 3.4L5 11a7 7 0 000 2l-2 1.6 2 3.4 2.4-1a7 7 0 001.7 1l.4 2.5h4l.4-2.5a7 7 0 001.7-1l2.4 1 2-3.4-2-1.6a7 7 0 00.1-1z'},
];
const RENDER={today:renderToday,coach:renderCoach,fitness:renderFitness,plan:renderPlan,log:renderLog,insights:renderInsights,library:renderLibrary,settings:renderSettings};

function buildNav(){
  const ico=d=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
  el('nav').innerHTML=VIEWS.map(v=>`<a href="#${v.id}" data-v="${v.id}">${ico(v.icon)}<span>${v.title}</span></a>`).join('');
  el('tabbar').innerHTML=VIEWS.filter(v=>v.id!=='settings').map(v=>`<a href="#${v.id}" data-v="${v.id}">${ico(v.icon)}<span>${v.title}</span></a>`).join('');
}
function route(){
  const hash=location.hash.slice(1)||'today';
  if(hash.startsWith('activity/')){
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
    el('view-activity').classList.add('on');
    document.querySelectorAll('[data-v]').forEach(x=>x.classList.toggle('on',x.dataset.v==='log'));
    renderActivityDetail(decodeURIComponent(hash.slice(9)));
    window.scrollTo(0,0); return;
  }
  let id=hash==='races'?'plan':hash;
  if(!VIEWS.find(v=>v.id===id)) id='today';
  const v=VIEWS.find(x=>x.id===id);
  el('viewTitle').textContent=v.title; el('viewSub').textContent=v.sub;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  el('view-'+id).classList.add('on');
  document.querySelectorAll('[data-v]').forEach(a=>a.classList.toggle('on',a.dataset.v===id));
  RENDER[id]();
  window.scrollTo(0,0);
}
function flash(msg){ const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--teal-dim);color:var(--ink);padding:11px 18px;border-radius:11px;font-size:13px;z-index:60;box-shadow:var(--shadow)';
  document.body.appendChild(t); setTimeout(()=>t.remove(),1800); }
function tickClock(){ el('clock').textContent=fmtDateLong(todayISO()); }

/* ---------- boot ---------- */
function boot(){
  load();
  buildNav();
  tickClock();
  window.addEventListener('hashchange',route);
  el('drawerX').onclick=closeGB; el('scrim').onclick=closeGB;
  el('seedBtn').onclick=()=>{ if(confirm('デモデータを再生成します。現在のデータは上書きされます。')){ const saved=seedDemo(); route(); notifySaveResult(saved,'デモデータを再生成しました'); } };
  el('wipeBtn').onclick=()=>{ if(confirm('全データを消去します。よろしいですか？')){ DB={profile:{...DEFAULT_PROFILE},activities:[],wellness:[],plan:null,planOverrides:{},adjustLog:[],shoes:[],env:{temp:20,humidity:50,altitude:0},races:[]}; const saved=save(); route(); notifySaveResult(saved,'消去しました'); } };
  route();
}
document.addEventListener('DOMContentLoaded',boot);

</script>
