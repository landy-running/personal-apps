name = "runos-strava-worker"
main = "src/index.js"
compatibility_date = "2026-07-10"

# This worker connects to Strava OAuth via Cloudflare Worker.
# Do not put STRAVA_CLIENT_SECRET or refresh tokens in this file.
#
# Production candidates:
# - STRAVA_CLIENT_ID: Cloudflare environment variable
# - STRAVA_REDIRECT_URI: Cloudflare environment variable
# - STRAVA_CLIENT_SECRET: Cloudflare secret
# - TOKEN_STORAGE: "kv"

[vars]
TOKEN_STORAGE = "kv"
RUNOS_LEGACY_PWA_ORIGIN = "https://runos-legacy.pages.dev"
LOCAL_DEV_ORIGINS = "http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173"
STRAVA_REDIRECT_URI = "https://runos-strava-worker.mtk0808.workers.dev/auth/callback"

# Replace these placeholder IDs with Cloudflare KV namespace IDs before deploy.
[[kv_namespaces]]
binding = "STRAVA_TOKEN_KV"
id = "6e847b4bac4c4ef39a8a1f018a8414dd"
preview_id = "replace-with-preview-kv-namespace-id"
