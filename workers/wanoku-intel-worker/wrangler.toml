name = "wanoku-intel-worker"
main = "src/index.js"
compatibility_date = "2026-07-01"

[vars]
WANOKU_PWA_ORIGIN = "https://wanoku-pwa.pages.dev"
LOCAL_DEV_ORIGINS = "http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173"

[[d1_databases]]
binding = "WANOKU_INTEL_D1"
database_name = "wanoku-intel"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[triggers]
crons = ["0 */3 * * *"]
